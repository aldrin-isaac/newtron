name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Read the Go toolchain version from go.mod so this workflow
          # stays in lockstep with what the codebase actually compiles
          # against.
          go-version-file: go.mod
          # actions/setup-go's cache is keyed on go.sum; opting in
          # shaves a minute or two off cold builds with no maintenance
          # cost.
          cache: true

      # auth-design.md L2b: pkg/httputil/pamauth links against libpam
      # via cgo for the PAM-backed user-to-service authentication path.
      # Install libpam0g-dev so the cgo bindings can find pam_appl.h
      # at build time. Operators not using PAM still get the binding
      # compiled in; the runtime --auth-pam-service flag controls
      # whether it's invoked.
      - name: Install PAM development headers
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: go build ./...
        run: go build ./...

      - name: go vet ./...
        run: go vet ./...

      # -race catches the kind of concurrency regression the engine-
      # layer refactor (#101) just protected against. -count=1
      # disables the test cache so failures aren't masked across runs.
      - name: go test -race ./...
        run: go test -race ./... -count=1 -timeout 5m
