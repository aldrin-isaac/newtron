name: deprovision
description: |
  Deprovision all services and infrastructure from both switches.
  Services are removed with individual reverse actions (RemoveService per interface).
  Baseline infrastructure (setup-device) has no individual reverse — config reload
  restores CONFIG_DB to saved defaults, wiping loopback, BGP, and VTEP config.
requires: [provision]
after: [dataplane]

steps:
  # =========================================================================
  # Reverse of ApplyService — per-interface, reverse dependency order
  # Forward:  iface.ApplyService(ctx, serviceName, opts)
  # Reverse:  iface.RemoveService(ctx)
  # =========================================================================

  # Remove EVPN overlay services first (have VXLAN dependencies). Under the
  # delivery-point flip the irb service binds to the IRB, so it is removed from
  # Vlan400 (switch1) / Vlan401 (switch2), not the access port.
  - name: remove-overlay-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/remove-service

  - name: remove-overlay-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan401/remove-service

  - name: remove-l2-extend-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/remove-service

  - name: remove-l2-extend-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/remove-service

  # Remove local services
  - name: remove-local-bridge-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet8/remove-service

  - name: remove-local-bridge-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet8/remove-service

  # Local IRB also binds to its IRB (Vlan100), not the access port.
  - name: remove-local-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan100/remove-service

  - name: remove-local-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan100/remove-service

  # Remove transit (underlay BGP) last
  - name: remove-transit-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet0/remove-service

  - name: remove-transit-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet0/remove-service

  # Baseline infrastructure (setup-device) has no individual reverse.
  # Reprovisioning (CompositeOverwrite) is the collective reverse.
  # config reload restores saved state (not factory) since every API write
  # calls config save — it cannot clean up baseline infrastructure.

  # ====================================================================
  # Bridge-domain teardown (§15 symmetry with the provisioning setup). The
  # composite reaped the L3 it delivered — the SVI gateways, the shared VRF, and
  # the L3VNI — on remove-service above (reap-on-last-consumer). What survives is
  # the L2 bridge domain, torn down by its own owners: unconfigure-interface
  # (membership) → unbind-macvpn (L2 overlay) → delete-vlan. Shared VLANs
  # (Ethernet4/8/12) run on both switches; Ethernet16 differs per switch.
  # ====================================================================
  # Local IRB (Vlan100): the SVI was reaped by remove-service — only the
  # membership and VLAN remain.
  - name: unconfigure-eth4
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/unconfigure-interface

  - name: delete-vlan100
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 100}

  - name: unconfigure-eth8
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet8/unconfigure-interface

  - name: delete-vlan200
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 200}

  - name: unconfigure-eth12
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/unconfigure-interface

  - name: unbind-macvpn300
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/unbind-macvpn
    params: {vlan_id: 300}

  - name: delete-vlan300
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 300}

  # Overlay IRB (Vlan400 sw1 / Vlan401 sw2): the SVI, the shared Vrf_IRB, and the
  # L3VNI were all reaped by remove-service on the last consumer — only the L2
  # overlay, membership, and VLAN remain below.
  - name: unconfigure-eth16
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet16/unconfigure-interface

  - name: unbind-macvpn400-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/unbind-macvpn
    params: {vlan_id: 400}

  - name: delete-vlan400-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 400}

  - name: unbind-macvpn401-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/unbind-macvpn
    params: {vlan_id: 401}

  - name: delete-vlan401-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 401}
