name: service-lifecycle
description: |
  Composite service operations: apply-service, refresh-service, remove-service.
  Tests svc-evpn-irb on sw1:Eth3 + sw2:Eth3 with dataplane verification,
  then svc-bridged on sw1:Eth1. Exercises the full service lifecycle API.
requires: [teardown-overlay]

steps:
  # The operator authors only the membership container — the VLAN and its member
  # ports. apply-service is a composite: it assembles the rest of the bridge
  # domain it delivers — the L2VNI overlay (from the service's macvpn), the VRF +
  # L3VNI (from its ipvpn), and the anycast SVI gateway (from the macvpn's
  # anycast_ip/anycast_mac) — binds on the IRB (Vlan400), and fans the filter to
  # the members. The fabric is not pre-authored (irb-service-redesign.md §3).
  - name: create-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/create-vlan
    params: {id: 400}

  - name: member-eth3-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet3/configure-interface
    params: {vlan_id: 400, tagged: true}

  # 8a: Apply svc-evpn-irb on the IRB (Vlan400) — the composite assembles
  # macvpn/VRF/SVI and binds to the gateway. The anycast gateway comes from the
  # SVC_VLAN400 macvpn (§7); no per-apply gateway params needed.
  - name: apply-svc-evpn-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/apply-service
    params: {service: svc-evpn-irb}

  - name: apply-svc-evpn-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/apply-service
    params: {service: svc-evpn-irb}

  # Verify service binding — the sub-resource of the IRB identity (§5).
  - name: verify-binding-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  - name: verify-binding-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  # Per-member policy (§38 real-device witness): svc-evpn-irb carries
  # ingress_filter FILTER_IRB. The service binds on the IRB, but its ACL is bound
  # to the VLAN's member ports (§4, §7) — the device must accept an ACL_TABLE
  # whose ports are the members. Ethernet3 is single-VLAN, so rules are
  # unqualified (no VLAN_ID) — per-port == per-VLAN.
  - name: capture-irb-acl-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice
    capture:
      acl: .ingress_acl

  # The ACL binds to the member (Ethernet3), never the IRB (Vlan400).
  - name: verify-acl-binds-member-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/ACL_TABLE/{{captured.acl}}
    expect:
      jq: '.ports | contains("Ethernet3") and (contains("Vlan400") | not)'

  # The rule is unqualified — no VLAN_ID (single-VLAN member, §7).
  - name: verify-acl-rule-unqualified-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/ACL_RULE/{{captured.acl}}%7CRULE_10
    expect:
      jq: '.PACKET_ACTION == "FORWARD" and (has("VLAN_ID") | not)'

  # Verify VLAN 400 created
  - name: verify-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan400-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  # Verify VLAN member (tagged for apply-service)
  - name: verify-vlan-member-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet3/exists
    expect:
      jq: '.exists == true'

  # Verify VXLAN tunnel map
  - name: verify-tunnel-map-400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50400_Vlan400
    expect:
      jq: '.vlan == "Vlan400" and .vni == "50400"'

  # Verify VLAN_INTERFACE (SVI with VRF)
  - name: verify-svi-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400
    expect:
      jq: '.vrf_name == "Vrf_IRB"'

  # The composite sourced the anycast gateway from the SVC_VLAN400 macvpn (§7).
  - name: verify-svi-anycast-ip-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400%7C10.4.0.1%2F24/exists
    expect:
      jq: '.exists == true'

  - name: verify-sag-anycast-mac-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/SAG_GLOBAL/IPv4
    expect:
      jq: '.gwmac == "00:00:00:01:04:00"'

  # Configure host sub-interfaces while waiting (overlap with EVPN convergence)
  - name: host3-configure-subintf
    action: host-exec
    devices: [host3]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.3/24 dev eth0.400; ip link set eth0.400 up"

  - name: host6-configure-subintf
    action: host-exec
    devices: [host6]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.6/24 dev eth0.400; ip link set eth0.400 up"

  # Wait for EVPN VXLAN convergence. teardown-overlay's VRF deletion causes
  # frrcfgd to reconfigure FRR, which drops the overlay eBGP session. The
  # session needs ~60-90s to re-establish (TCP connect retry timer + BGP open),
  # then orchagent programs ASIC_DB, then BGP advertises VNIs to the peer.
  - name: wait-evpn-convergence
    action: wait
    duration: 90s

  # Verify EVPN BGP sessions re-established after overlay rebuild
  - name: verify-evpn-bgp-sessions
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 10s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  # Prime NGDP ARP from SVI (retry loop handles stragglers)
  - name: prime-arp-svi-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.3"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-svi-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.6"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host3↔host6 EVPN IRB ping
  - name: host3-ping-host6
    action: host-exec
    devices: [host3]
    command: "ping -c 5 -W 2 10.4.0.6"
    expect:
      success_rate: 0.8

  - name: host6-ping-host3
    action: host-exec
    devices: [host6]
    command: "ping -c 5 -W 2 10.4.0.3"
    expect:
      success_rate: 0.8

  # 8b: Refresh service on the IRB — binding still present, no SVI bounce (§4).
  - name: refresh-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/refresh-service

  - name: refresh-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/refresh-service

  - name: verify-binding-after-refresh-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  # The composed SVI survives the refresh (deliveryOnly — no flap, §48, #624).
  - name: verify-svi-survives-refresh-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400/exists
    expect:
      jq: '.exists == true'

  # 8c: Remove service from the IRB (both switches)
  - name: remove-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/remove-service

  - name: remove-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/remove-service

  - name: verify-binding-removed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == false'

  - name: verify-binding-removed-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == false'

  # The per-member ACL is torn down with the binding — removeSharedACL deletes
  # the last user's rules (§4), leaving no orphan rule to drift.
  - name: verify-acl-removed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/ACL_TABLE/{{captured.acl}}/exists
    expect:
      jq: '.exists == false'

  # The SVI is reaped by remove-service — the composite created it, so it owns the
  # teardown on the last consumer (reap-on-last-consumer, §15). The VRF and L3VNI
  # go the same way; the VLAN, its L2VNI, and membership survive (§3).
  - name: verify-svi-reaped-on-remove-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400/exists
    expect:
      jq: '.exists == false'

  # The shared VRF is reaped too — sw1 was its last ipvpn consumer (§15).
  - name: verify-vrf-reaped-on-remove-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # Bridge-domain teardown (§15): remove-service already reaped the SVI, VRF, and
  # L3VNI, so the operator tears down only what survived — the L2VNI overlay, the
  # membership, and the VLAN container.
  - name: unbind-macvpn400-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/unbind-macvpn
    params: {vlan_id: 400}

  - name: teardown-eth3-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet3/unconfigure-interface

  - name: delete-vlan400-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 400}

  - name: verify-vlan400-removed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan400-removed-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  # 8d: Apply svc-bridged on sw1:Eth1 — the composite assembles the bridge domain
  # (VLAN 200, no VNI) and this port's access membership; nothing pre-authored.
  - name: apply-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet1/apply-service
    params: {service: svc-bridged, vlan: 200}

  - name: verify-bridged-binding-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1%7Cservice/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan200-composed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth1-composed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan200%7CEthernet1/exists
    expect:
      jq: '.exists == true'

  # 8e: Remove svc-bridged — the composite reaps this port's membership and the
  # VLAN it created on the last consumer (§24: per-interface membership dies with
  # the service; the shared VLAN is reaped once childless). No manual teardown.
  - name: remove-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet1/remove-service

  - name: verify-bridged-binding-removed
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1%7Cservice/exists
    expect:
      jq: '.exists == false'

  - name: verify-member-eth1-reaped
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan200%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan200-reaped
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'
