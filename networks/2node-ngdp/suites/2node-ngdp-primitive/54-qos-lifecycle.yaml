name: qos-lifecycle
description: |
  Self-contained QoS lifecycle on sw1:Ethernet11 (config-only, no host wired).
  Tests bind-qos and unbind-qos primitives with CONFIG_DB verification for
  per-interface (PORT_QOS_MAP) and device-wide (DSCP_TO_TC_MAP) entries.
requires: [setup-device]

steps:
  # Create interface intent anchor (I4: parent for QoS sub-resource)
  - name: configure-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet11/configure-interface

  - name: bind-qos-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet11/bind-qos
    params: {policy: test-4q}

  - name: verify-port-qos-map
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/PORT_QOS_MAP/Ethernet11/exists
    expect:
      jq: '.exists == true'

  - name: verify-dscp-tc-map
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/DSCP_TO_TC_MAP/TEST_4Q/exists
    expect:
      jq: '.exists == true'

  - name: unbind-qos-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet11/unbind-qos

  - name: verify-port-qos-map-removed
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/PORT_QOS_MAP/Ethernet11/exists
    expect:
      jq: '.exists == false'

  # Cleanup: remove the interface intent
  - name: unconfigure-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet11/unconfigure-interface
