name: L0-secret-store-resolves
description: |
  auth-design.md L0: profile loaded with a ${secret:KEY} reference
  must resolve at network load time. If the server lacks --secret-store
  the registration FAILS, this scenario can't run, and the failure mode
  is visible at suite startup (newtrun: connecting to server: network
  registration failed). When this scenario runs at all, L0 already
  passed implicitly; we then read the profile back to assert the
  resolved value reached the wire shape consumers see.

steps:
  - name: list-profiles-shows-switch1
    action: newtron
    method: GET
    url: /nodes
    expect:
      jq: 'any(.[]; . == "switch1")'

  - name: read-switch1-profile-resolved-secret
    action: newtron
    method: GET
    url: /nodes/switch1
    expect:
      jq: '.ssh_pass != null and (.ssh_pass | startswith("${secret:") | not)'
