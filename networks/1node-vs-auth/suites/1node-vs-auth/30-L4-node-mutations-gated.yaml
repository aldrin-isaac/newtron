name: L4-node-mutations-gated-mallory
description: |
  auth-design.md L4: Node-level mutations gate behind the verb-family
  permissions. Mallory's portion of this split-per-identity scenario:
  mallory (no group) is denied on vlan.create, vrf.create, and acl.create.
  Uses ?mode=topology so the gate fires before any device transport.
  Commits in topology mode are in-memory only — the suite never touches
  a real device.

requires: [L3-spec-mutations-gated-alice, L3-spec-mutations-gated-bob, L3-spec-mutations-gated-mallory]
as: mallory

steps:
  # vlan.create — denied caller (mallory: no group)
  - name: mallory-create-vlan-denied
    action: newtron
    method: POST
    url: /nodes/switch1/create-vlan?mode=topology
    params: {id: 100}
    expect_failure: true

  # vrf.create — denied caller
  - name: mallory-create-vrf-denied
    action: newtron
    method: POST
    url: /nodes/switch1/create-vrf?mode=topology
    params: {name: Vrf_mallory}
    expect_failure: true

  # acl.create — denied caller
  - name: mallory-create-acl-denied
    action: newtron
    method: POST
    url: /nodes/switch1/create-acl?mode=topology
    params: {name: acl-mallory, type: L3, stage: ingress}
    expect_failure: true

---
name: L4-node-mutations-gated-bob
description: |
  auth-design.md L4: Node-level mutations gate behind the verb-family
  permissions. Bob's portion of this split-per-identity scenario:
  bob (ops, has vlan.create, vrf.create, acl.create) is allowed on all
  three families. Also includes the ungated read endpoint (reads stay
  ungated per §3 criterion 2). Uses ?mode=topology; commits are
  in-memory only.

requires: [L4-node-mutations-gated-mallory]
as: bob

steps:
  # vlan.create — allowed caller (bob: ops, has vlan.create)
  - name: bob-create-vlan-allowed
    action: newtron
    method: POST
    url: /nodes/switch1/create-vlan?mode=topology
    params: {id: 200}

  # vrf.create — allowed caller (bob: ops, has vrf.create)
  - name: bob-create-vrf-allowed
    action: newtron
    method: POST
    url: /nodes/switch1/create-vrf?mode=topology
    params: {name: Vrf_bob}

  # acl.create — allowed caller
  - name: bob-create-acl-allowed
    action: newtron
    method: POST
    url: /nodes/switch1/create-acl?mode=topology
    params: {name: acl-bob, type: L3, stage: ingress}

  # Read endpoint — ungated per §3 criterion 2. The runner attaches
  # bob's Bearer (scenario-level as:); succeeds because reads don't
  # gate on permissions, not because the caller is bob in particular.
  - name: read-vlans-allowed
    action: newtron
    method: GET
    url: /nodes/switch1/vlans?mode=topology
