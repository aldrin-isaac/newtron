name: L3-permission-families-root
description: |
  Coverage expansion: the original 20-L3-spec-mutations-gated scenario
  only walks the spec.author + qos.create + filter.create families.
  Root's portion of this split-per-identity scenario: super_user bypass —
  root is in super_users; every check returns nil without consulting the
  permissions map. Even a normally-denied action succeeds.

requires: [L0-secret-store-resolves]
as: root

steps:
  # super_user bypass — root is in super_users; every check returns nil
  # without consulting the permissions map. Even a normally-denied action
  # (a permission the spec doesn't grant to any group) succeeds.
  - name: root-creates-zone-bypass
    action: newtron
    method: POST
    url: /create-zone
    params: {name: zone-root-bypass}

  - name: root-deletes-zone-bypass
    action: newtron
    method: POST
    url: /delete-zone
    params: {name: zone-root-bypass}

---
name: L3-permission-families-mallory
description: |
  Coverage expansion: the original 20-L3-spec-mutations-gated scenario
  only walks the spec.author + qos.create + filter.create families.
  Mallory's portion of this split-per-identity scenario: mallory (not in
  any group) is denied on node mutations, zone mutations, and topology
  mutations. Verifies the spec.author gate reaches handlers beyond
  services/qos/filters.

requires: [L3-permission-families-root]
as: mallory

steps:
  # Node mutations — mallory denied
  - name: mallory-create-node-denied
    action: newtron
    method: POST
    url: /create-node
    params: {name: node-mallory, mgmt_ip: "127.0.0.1", loopback_ip: "10.0.0.99", zone: amer, platform: sonic-vs}
    expect_failure: true

  # Zone mutations
  - name: mallory-create-zone-denied
    action: newtron
    method: POST
    url: /create-zone
    params: {name: zone-mallory}
    expect_failure: true

  # Topology mutations — exercises the network.go gates (separate from
  # spec_ops.go gates the original suite hits). Note the device-name
  # populates Context.Device on the gate, distinct from Context.Resource.
  - name: mallory-add-topology-device-denied
    action: newtron
    method: POST
    url: /topology/create-node
    params:
      name: mallory-switch
      device:
        ports: {Ethernet0: {admin_status: "up"}}
    expect_failure: true

---
name: L3-permission-families-alice
description: |
  Coverage expansion: the original 20-L3-spec-mutations-gated scenario
  only walks the spec.author + qos.create + filter.create families.
  Alice's portion of this split-per-identity scenario: alice (spec-team
  has spec.author) is allowed on node mutations and zone mutations.
  Verifies the spec.author gate reaches handlers beyond services/qos/filters.

requires: [L3-permission-families-mallory]
as: alice

steps:
  # Node mutations — alice (spec-team has spec.author) succeeds.
  # Verifies the spec.author gate reaches handlers beyond
  # services/qos/filters.
  - name: alice-create-node-allowed
    action: newtron
    method: POST
    url: /create-node
    params: {name: node-alice, mgmt_ip: "127.0.0.1", loopback_ip: "10.0.0.98", zone: amer, platform: sonic-vs}

  - name: alice-cleanup-node
    action: newtron
    method: POST
    url: /delete-node
    params: {name: node-alice}

  # Zone mutations
  - name: alice-create-zone-allowed
    action: newtron
    method: POST
    url: /create-zone
    params: {name: zone-alice}

  - name: alice-cleanup-zone
    action: newtron
    method: POST
    url: /delete-zone
    params: {name: zone-alice}
