name: L6-audit-verify
description: |
  auth-design.md L6 (integrity half): walks the audit log via
  `bin/newtron audit verify <path>` and confirms the hash chain
  matches end to end. Earlier scenarios in this suite emitted a few
  dozen events; this final scenario closes the chain by checking
  them.

  Requires --audit AND --audit-integrity on the server;
  without integrity, every entry has empty ID and the verifier
  short-circuits clean without actually proving anything. The
  README documents the deployment shape.

  Audit log path is hard-coded to /tmp/1node-vs-auth-audit.jsonl.
  The operator's --audit flag must be set.

requires: [L5-resource-scoping-alice, L5-resource-scoping-bob]

steps:
  - name: audit-verify-chain
    action: newtron-cli
    command: "audit verify /tmp/1node-vs-auth-audit.jsonl"
    expect:
      # The CLI prints "verified N entries; chain head = ..." on a
      # clean chain. Match on the "verified" keyword and any non-zero
      # count.
      contains: "verified"
