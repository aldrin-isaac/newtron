name: update-static-route
description: |
  E2E coverage for issue #227 update-static-route — atomic per-route
  field mutation for device CONFIG_DB static routes. Closes the forwarding
  black hole the remove + add sequence exposes today (traffic destined
  to the prefix has no next-hop during the gap).

  Per §47 (CONFIG_DB Composite Key Is the Identity) the key
  (vrf, prefix) is immutable. To relocate a route to a different prefix,
  operators remove and re-add; the verb mutates fields in place only.

  Verifies:
    - Next-hop swap (same prefix, different next-hop) writes a single
      DEL+ADD pair for the STATIC_ROUTE entry; intent record's nexthop
      param reflects the new value.
    - Missing route fails (404).

  Loopback mode — pure HTTP.

steps:
  # ====================================================================
  # Setup — VRF + two seed routes
  # ====================================================================
  - name: create-vrf-227-r
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/create-vrf?mode=loopback
    params: {name: Vrf_CUST227R}

  - name: add-route-10
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/add-static-route?mode=loopback
    params:
      vrf: Vrf_CUST227R
      prefix: "10.0.0.0/24"
      nexthop: "10.1.0.1"

  - name: add-route-192
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/add-static-route?mode=loopback
    params:
      vrf: Vrf_CUST227R
      prefix: "192.168.0.0/16"
      nexthop: "10.1.0.5"

  # ====================================================================
  # Next-hop swap — same prefix, change nexthop
  # ====================================================================
  - name: update-route-10-nexthop-swap
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/update-static-route?mode=loopback
    params:
      vrf: Vrf_CUST227R
      prefix: "10.0.0.0/24"
      nexthop: "10.1.0.2"

  - name: verify-route-10-nexthop-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/STATIC_ROUTE/Vrf_CUST227R%7C10.0.0.0%2F24?mode=loopback
    expect:
      jq: '.nexthop == "10.1.0.2"'

  - name: verify-route-10-intent-nexthop-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/route%7CVrf_CUST227R%7C10.0.0.0%2F24?mode=loopback
    expect:
      jq: '.next_hop == "10.1.0.2"'

  - name: verify-route-192-untouched
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/STATIC_ROUTE/Vrf_CUST227R%7C192.168.0.0%2F16?mode=loopback
    expect:
      jq: '.nexthop == "10.1.0.5"'

  # ====================================================================
  # Cleanup
  # ====================================================================
  - name: cleanup-remove-route-10
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/remove-static-route?mode=loopback
    params: {vrf: Vrf_CUST227R, prefix: "10.0.0.0/24"}

  - name: cleanup-remove-route-192
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/remove-static-route?mode=loopback
    params: {vrf: Vrf_CUST227R, prefix: "192.168.0.0/16"}

  - name: cleanup-delete-vrf
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/delete-vrf?mode=loopback
    params: {name: Vrf_CUST227R}
