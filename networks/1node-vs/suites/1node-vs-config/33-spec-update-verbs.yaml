name: spec-update-verbs
description: |
  E2E coverage for the three per-item update verbs that landed in PRs
  #215 / #216 / #217 (issues #209 / #210 / #211).

  Per §47 (CONFIG_DB Composite Key Is the Identity — extended to spec-
  side identity) the per-item key is immutable; these verbs mutate
  fields in place only. Renumbering / relocating an item is remove + add.

  Exercises:
    - update-filter-rule       — modify rule fields in place
    - update-route-policy-rule — modify rule fields in place
    - update-qos-queue         — modify queue fields in place

  Loopback mode — these are pure network-spec mutations (no device traffic),
  so they validate the API surface end-to-end without needing a real ASIC.
  No requires: — independent of device setup since these are network-scoped
  spec operations.

steps:
  # ====================================================================
  # update-filter-rule (#209 / PR #215)
  # ====================================================================
  - name: create-filter-for-update-rule
    action: newtron
    method: POST
    url: /create-filter
    params:
      name: TEST_FILTER_UPD
      type: ipv4

  - name: add-filter-rule-10
    action: newtron
    method: POST
    url: /add-filter-rule
    params:
      filter: TEST_FILTER_UPD
      seq: 10
      action: permit
      src_prefix: "10.0.0.0/8"

  - name: add-filter-rule-20
    action: newtron
    method: POST
    url: /add-filter-rule
    params:
      filter: TEST_FILTER_UPD
      seq: 20
      action: deny
      src_prefix: "192.168.0.0/16"

  - name: update-filter-rule-action-in-place
    action: newtron
    method: POST
    url: /update-filter-rule
    params:
      filter: TEST_FILTER_UPD
      seq: 20
      action: permit
      src_prefix: "192.168.0.0/16"

  - name: verify-filter-rule-action-updated
    action: newtron
    url: /filters/TEST_FILTER_UPD
    expect:
      jq: '.rules[] | select(.seq == 20) | .action == "permit"'

  - name: cleanup-test-filter-upd
    action: newtron
    method: POST
    url: /delete-filter
    params: {name: TEST_FILTER_UPD}

  # ====================================================================
  # update-route-policy-rule (#210 / PR #216)
  # ====================================================================
  - name: create-rp-for-update-rule
    action: newtron
    method: POST
    url: /create-route-policy
    params:
      name: TEST_RP_UPD
      description: "route-policy update-rule test"

  - name: add-rp-rule-10
    action: newtron
    method: POST
    url: /add-route-policy-rule
    params:
      policy: TEST_RP_UPD
      seq: 10
      action: permit
      set:
        local_pref: 200

  - name: add-rp-rule-20
    action: newtron
    method: POST
    url: /add-route-policy-rule
    params:
      policy: TEST_RP_UPD
      seq: 20
      action: deny

  - name: update-rp-rule-action-in-place
    action: newtron
    method: POST
    url: /update-route-policy-rule
    params:
      policy: TEST_RP_UPD
      seq: 20
      action: permit

  - name: verify-rp-rule-action-updated
    action: newtron
    url: /route-policies/TEST_RP_UPD
    expect:
      jq: '.rules[] | select(.seq == 20) | .action == "permit"'

  - name: cleanup-test-rp-upd
    action: newtron
    method: POST
    url: /delete-route-policy
    params: {name: TEST_RP_UPD}

  # ====================================================================
  # update-qos-queue (#211 / PR #217)
  # ====================================================================
  - name: create-qos-for-update-queue
    action: newtron
    method: POST
    url: /create-qos-policy
    params:
      name: TEST_QOS_UPD
      description: "qos update-queue test"

  - name: add-qos-queue-0
    action: newtron
    method: POST
    url: /add-qos-queue
    params:
      policy: TEST_QOS_UPD
      queue_id: 0
      type: strict
      dscp: [46]
      name: voice

  - name: add-qos-queue-1
    action: newtron
    method: POST
    url: /add-qos-queue
    params:
      policy: TEST_QOS_UPD
      queue_id: 1
      type: dwrr
      weight: 80
      dscp: [0]
      name: best-effort

  - name: update-qos-queue-weight-in-place
    action: newtron
    method: POST
    url: /update-qos-queue
    params:
      policy: TEST_QOS_UPD
      queue_id: 1
      type: dwrr
      weight: 60
      dscp: [0]
      name: best-effort

  - name: verify-qos-queue-weight-updated
    action: newtron
    url: /qos-policies/TEST_QOS_UPD
    expect:
      jq: '.queues[] | select(.queue_id == 1) | .weight == 60'

  - name: cleanup-test-qos-upd
    action: newtron
    method: POST
    url: /delete-qos-policy
    params: {name: TEST_QOS_UPD}

