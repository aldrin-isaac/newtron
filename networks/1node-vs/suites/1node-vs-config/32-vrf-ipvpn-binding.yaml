name: vrf-ipvpn-binding
description: |
  IP-VPN bind/unbind lifecycle. The on-device SONiC VRF name is derived
  from the IP-VPN name as "Vrf_"+name (sonic-vrf.yang) — `vrf create`
  materializes the empty VRF (Vrf_BIND) and `vrf bind-ipvpn BIND`
  overlays the L3VNI + EVPN config onto it.
requires: [setup-device]

steps:
  # --- Setup: IP-VPN spec (BIND) + its derived VRF (Vrf_BIND) ---
  - name: create-ipvpn
    action: newtron-cli
    command: "evpn ipvpn create BIND --l3vni 10099 --loopback"

  - name: create-vrf
    action: newtron-cli
    devices: [switch1]
    command: "vrf create Vrf_BIND --loopback"

  # --- Bind IP-VPN BIND → derives and binds onto VRF Vrf_BIND ---
  - name: bind-ipvpn
    action: newtron-cli
    devices: [switch1]
    command: "vrf bind-ipvpn BIND --loopback"

  - name: verify-ipvpn-intent
    action: newtron-cli
    devices: [switch1]
    command: "configdb exists NEWTRON_INTENT ipvpn|BIND --loopback"
    expect:
      jq: '.exists == true'

  # --- Unbind IP-VPN ---
  - name: unbind-ipvpn
    action: newtron-cli
    devices: [switch1]
    command: "vrf unbind-ipvpn BIND --loopback"

  - name: verify-ipvpn-unbound
    action: newtron-cli
    devices: [switch1]
    command: "configdb exists NEWTRON_INTENT ipvpn|BIND --loopback"
    expect:
      jq: '.exists == false'

  # --- Cleanup ---
  - name: delete-vrf
    action: newtron-cli
    devices: [switch1]
    command: "vrf delete Vrf_BIND --loopback"

  - name: delete-ipvpn
    action: newtron-cli
    command: "evpn ipvpn delete BIND --loopback"
