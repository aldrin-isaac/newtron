name: vrf-ipvpn-binding
description: |
  IP-VPN bind/unbind lifecycle. The IP-VPN name IS the SONiC VRF
  name (§13 / §32; sonic-vrf.yang) — `vrf create` materializes the
  empty VRF and `vrf bind-ipvpn` overlays the L3VNI + EVPN config.
requires: [setup-device]

steps:
  # --- Setup: IP-VPN spec + VRF (same name on both) ---
  - name: create-ipvpn
    action: newtron-cli
    command: "evpn ipvpn create Vrf_BIND --l3vni 10099 --loopback"

  - name: create-vrf
    action: newtron-cli
    devices: [switch1]
    command: "vrf create Vrf_BIND --loopback"

  # --- Bind IP-VPN (single name — it's the VRF name AND the IP-VPN name) ---
  - name: bind-ipvpn
    action: newtron-cli
    devices: [switch1]
    command: "vrf bind-ipvpn Vrf_BIND --loopback"

  - name: verify-ipvpn-intent
    action: newtron-cli
    devices: [switch1]
    command: "configdb exists NEWTRON_INTENT ipvpn|Vrf_BIND --loopback"
    expect:
      jq: '.exists == true'

  # --- Unbind IP-VPN ---
  - name: unbind-ipvpn
    action: newtron-cli
    devices: [switch1]
    command: "vrf unbind-ipvpn Vrf_BIND --loopback"

  - name: verify-ipvpn-unbound
    action: newtron-cli
    devices: [switch1]
    command: "configdb exists NEWTRON_INTENT ipvpn|Vrf_BIND --loopback"
    expect:
      jq: '.exists == false'

  # --- Cleanup ---
  - name: delete-vrf
    action: newtron-cli
    devices: [switch1]
    command: "vrf delete Vrf_BIND --loopback"

  - name: delete-ipvpn
    action: newtron-cli
    command: "evpn ipvpn delete Vrf_BIND --loopback"
