name: update-bgp-evpn-peer
description: |
  E2E coverage for issue #227 update-bgp-evpn-peer — atomic per-overlay-
  peer field mutation. Closes the EVPN session blip the remove + add
  sequence exposes today (MAC withdraw across the fabric during the gap,
  full re-exchange after re-establishment).

  Per §47 (CONFIG_DB Composite Key Is the Identity) the key
  (default, neighbor_ip) is immutable. To change the neighbor IP,
  operators remove and re-add the peer; the verb mutates fields in
  place only.

  Verifies:
    - In-place AS / description change delivers a single Replace of the
      BGP_NEIGHBOR row at the same key (§48 — never a DEL); intent
      record's params reflect new values; neighbor_ip unchanged.
    - The evpn flag crosses the wire on BOTH verbs: the l2vpn evpn AF row
      exists after the add AND survives the update. RCA-049's root cause
      was this flag dropping at the wire (wrapper, then handler) — the
      update regenerated an entry set without the AF row and cs.Replace
      delivered that as a row DELETE, killing the session on the deployed
      fabric. This is the fast loopback regression gate for that boundary.

  Loopback mode — pure HTTP.

steps:
  # ====================================================================
  # Setup — re-run setup-device with source_ip so EVPN peer group exists
  # ====================================================================
  - name: setup-device-with-source-ip
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/setup-device?mode=loopback
    params:
      fields:
        hostname: switch1
        bgp_asn: "65001"
        hwsku: Force10-S6000
        type: LeafRouter
      source_ip: "10.0.0.1"

  - name: add-evpn-peer-original
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/add-bgp-evpn-peer?mode=loopback
    params:
      neighbor_ip: "10.227.2.2"
      remote_as: 65002
      description: "old-overlay-peer"
      evpn: true

  - name: verify-original-bgp-neighbor
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65002"'

  - name: verify-evpn-af-created
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR_AF/default%7C10.227.2.2%7Cl2vpn_evpn?mode=loopback
    expect:
      jq: '.admin_status == "true"'

  # In-place change
  - name: update-evpn-peer-in-place
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/update-bgp-evpn-peer?mode=loopback
    params:
      neighbor_ip: "10.227.2.2"
      remote_as: 65099
      description: "new-overlay-peer"
      evpn: true

  # The AF row must SURVIVE the update — the RCA-049 regression deleted it.
  - name: verify-evpn-af-survives-update
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR_AF/default%7C10.227.2.2%7Cl2vpn_evpn?mode=loopback
    expect:
      jq: '.admin_status == "true"'

  - name: verify-asn-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65099"'

  - name: verify-intent-asn-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/evpn-peer%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65099" and .description == "new-overlay-peer"'

  - name: cleanup-remove-evpn-peer
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/remove-bgp-evpn-peer?mode=loopback
    params: {ip: "10.227.2.2"}
