name: update-bgp-evpn-peer
description: |
  E2E coverage for issue #227 update-bgp-evpn-peer — atomic per-overlay-
  peer mutation. Closes the EVPN session blip the remove + add sequence
  exposes today (MAC withdraw across the fabric during the gap, full
  re-exchange after re-establishment).

  Verifies:
    - In-place AS / description change writes a single DEL+ADD pair for
      the BGP_NEIGHBOR row at the same key; intent record's params
      reflect new values; neighbor_ip unchanged.
    - Re-key (new_neighbor_ip) relocates both BGP_NEIGHBOR and the
      evpn-peer|<ip> intent resource atomically.

  Loopback mode — pure HTTP.

steps:
  # ====================================================================
  # Setup — re-run setup-device with source_ip so EVPN peer group exists
  # ====================================================================
  - name: setup-device-with-source-ip
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/setup-device?mode=loopback
    params:
      fields:
        hostname: switch1
        bgp_asn: "65001"
        hwsku: Force10-S6000
        type: LeafRouter
      source_ip: "10.0.0.1"

  - name: add-evpn-peer-original
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/add-bgp-evpn-peer?mode=loopback
    params:
      neighbor_ip: "10.227.2.2"
      remote_as: 65002
      description: "old-overlay-peer"

  - name: verify-original-bgp-neighbor
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65002"'

  # In-place change
  - name: update-evpn-peer-in-place
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/update-bgp-evpn-peer?mode=loopback
    params:
      neighbor_ip: "10.227.2.2"
      remote_as: 65099
      description: "new-overlay-peer"

  - name: verify-asn-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65099"'

  - name: verify-intent-asn-updated
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/evpn-peer%7C10.227.2.2?mode=loopback
    expect:
      jq: '.asn == "65099" and .description == "new-overlay-peer"'

  # Re-key
  - name: update-evpn-peer-rekey
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/update-bgp-evpn-peer?mode=loopback
    params:
      neighbor_ip: "10.227.2.2"
      remote_as: 65099
      description: "new-overlay-peer"
      new_neighbor_ip: "10.227.2.5"

  - name: verify-old-bgp-neighbor-gone
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.2/exists?mode=loopback
    expect:
      jq: '.exists == false'

  - name: verify-new-bgp-neighbor-exists
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.227.2.5?mode=loopback
    expect:
      jq: '.asn == "65099"'

  - name: verify-old-intent-gone
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/evpn-peer%7C10.227.2.2/exists?mode=loopback
    expect:
      jq: '.exists == false'

  - name: verify-new-intent-exists
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/evpn-peer%7C10.227.2.5/exists?mode=loopback
    expect:
      jq: '.exists == true'

  - name: cleanup-remove-evpn-peer
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/remove-bgp-evpn-peer?mode=loopback
    params: {ip: "10.227.2.5"}
