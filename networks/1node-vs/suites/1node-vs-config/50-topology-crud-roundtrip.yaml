name: topology-crud-roundtrip
description: |
  newtron#393: topology membership follows the node definition. Creating a node
  spec auto-places its topology entry (a /setup-device bring-up step); deleting
  the node spec removes the placement. A link is the only independent reference
  that blocks delete — the reference-aware reverse (DESIGN_PRINCIPLES §15).

  Round-trip for a fictional switch2:
    1. create-node — spec + auto-placed /setup-device entry, in one call.
    2. a link to switch1 blocks delete-node until the link is removed first.
    3. delete-link, then delete-node — placement and spec go together.
  Pure spec mutation — no device interaction.

steps:
  - name: create-switch2-node-spec
    action: newtron
    method: POST
    url: /create-node
    params:
      name: switch2
      mgmt_ip: "127.0.0.1"
      loopback_ip: "10.0.0.2"
      zone: amer
      platform: sonic-vs
      underlay_asn: 65002

  - name: verify-switch2-auto-placed
    action: newtron
    method: GET
    url: /topology
    expect:
      # create-node placed switch2 with a single /setup-device bring-up step —
      # no separate topology authoring call was needed (#393).
      jq: '.nodes.switch2 != null and .nodes.switch2.steps[0].url == "/setup-device"'

  - name: create-link-sw1-sw2
    action: newtron
    method: POST
    url: /topology/create-link
    params:
      a: "switch1:Ethernet0"
      z: "switch2:Ethernet0"
    expect:
      jq: '.a == "switch1:Ethernet0" and .z == "switch2:Ethernet0"'

  - name: link-prevents-node-delete
    action: newtron
    method: POST
    url: /delete-node
    params:
      name: switch2
    expect_failure: true
    expect:
      contains: "has 1 reference"

  - name: delete-link-by-single-endpoint
    action: newtron
    method: POST
    url: /topology/delete-link
    params:
      endpoint: "switch1:Ethernet0"
    expect:
      jq: '.deleted == "switch1:Ethernet0"'

  - name: delete-switch2-node-spec
    action: newtron
    method: POST
    url: /delete-node
    params:
      name: switch2
    expect:
      jq: '.status == "deleted"'

  - name: verify-switch2-removed
    action: newtron
    method: GET
    url: /topology
    expect:
      # placement and spec both gone; the link went with the first delete.
      jq: '(.nodes.switch2 // null) == null and (.links // [] | length) == 0'
