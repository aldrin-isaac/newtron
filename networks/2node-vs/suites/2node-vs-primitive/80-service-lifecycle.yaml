name: service-lifecycle
description: |
  Composite service operations: apply-service, refresh-service, remove-service.
  Tests svc-evpn-irb on sw1:Eth3 + sw2:Eth3 with dataplane verification,
  then svc-bridged on sw1:Eth1. Exercises the full service lifecycle API.
requires: [teardown-overlay]

steps:
  # Bridge domain + gateway for the evpn-irb service (VLAN 400 = SVC_VLAN400).
  # Under the delivery-point flip an irb-type service binds to the IRB, so the
  # operator authors the full bridge domain — L2 overlay (bind-macvpn),
  # membership (configure-interface), L3 overlay (create-vrf + bind-ipvpn), and
  # the gateway (configure-irb) — before the service binds
  # (irb-service-redesign.md §3, §6). The service no longer creates any of it.
  - name: create-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/create-vlan
    params: {id: 400}

  - name: bind-macvpn400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/bind-macvpn
    params: {vlan_id: 400, macvpn: SVC_VLAN400}

  - name: member-eth12-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/configure-interface
    params: {vlan_id: 400, tagged: true}

  - name: create-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/create-vrf
    params: {name: Vrf_IRB}

  - name: bind-ipvpn-irb
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/bind-ipvpn
    params: {ipvpn: IRB}

  # The SVI gateway — configure-irb is its sole author (§6): VRF binding,
  # anycast IP, and anycast MAC all come from here, not from the service.
  - name: configure-irb-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/configure-irb
    params: {vlan_id: 400, vrf: Vrf_IRB, ip_address: "10.4.0.1/24", anycast_mac: "00:00:00:01:04:00"}

  # 8a: Apply svc-evpn-irb on the IRB (Vlan400), both switches — the flip: the
  # service binds to the gateway, not to an access port.
  - name: apply-svc-evpn-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/apply-service
    params: {service: svc-evpn-irb}

  - name: apply-svc-evpn-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/apply-service
    params: {service: svc-evpn-irb}

  # Verify service binding — the sub-resource of the IRB identity (§5).
  - name: verify-binding-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  - name: verify-binding-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  # Verify VLAN 400 created
  - name: verify-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan400-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  # Verify VLAN member (tagged for apply-service)
  - name: verify-vlan-member-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet12/exists
    expect:
      jq: '.exists == true'

  # Verify VXLAN tunnel map
  - name: verify-tunnel-map-400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50400_Vlan400
    expect:
      jq: '.vlan == "Vlan400" and .vni == "50400"'

  # Verify VLAN_INTERFACE (SVI with VRF)
  - name: verify-svi-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400
    expect:
      jq: '.vrf_name == "Vrf_IRB"'

  # Configure host sub-interfaces while waiting (overlap with EVPN convergence)
  - name: host3-configure-subintf
    action: host-exec
    devices: [host3]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.3/24 dev eth0.400; ip link set eth0.400 up"

  - name: host6-configure-subintf
    action: host-exec
    devices: [host6]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.6/24 dev eth0.400; ip link set eth0.400 up"

  # Wait for CONFIG_DB daemons (intfmgrd, vrfmgrd, orchagent) to process
  # the new entries from apply-svc-evpn-irb. VRF creation + SVI IP assignment
  # + VXLAN tunnel map programming take time on sonic-vs.
  - name: wait-daemon-processing
    action: wait
    duration: 15s

  # Verify EVPN BGP sessions are still established. Overlay BGP config
  # (VTEP, peer group, neighbors) survives teardown-overlay — only VLANs,
  # VRFs, and MAC-VPN bindings are removed. CheckBGPSessions derives
  # expected overlay peers from the device intent + resolved node spec.
  - name: verify-evpn-bgp-sessions
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 10s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  # Prime ARP from SVI — poll with generous timeout for VRF/SVI readiness
  - name: prime-arp-svi-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.3"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-svi-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.6"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host3↔host6 EVPN IRB ping
  - name: host3-ping-host6
    action: host-exec
    devices: [host3]
    command: "ping -c 5 -W 2 10.4.0.6"
    expect:
      success_rate: 0.8

  - name: host6-ping-host3
    action: host-exec
    devices: [host6]
    command: "ping -c 5 -W 2 10.4.0.3"
    expect:
      success_rate: 0.8

  # 8b: Refresh service on the IRB — verify no error, binding still present.
  # The single-binding refresh converges the gateway with no SVI bounce: the
  # SVI is configure-irb's, so refresh re-renders only the binding (§4).
  - name: refresh-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/refresh-service

  - name: refresh-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/refresh-service

  - name: verify-binding-after-refresh-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == true'

  # 8c: Remove service from the IRB (both switches)
  - name: remove-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/remove-service

  - name: remove-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Vlan400/remove-service

  - name: verify-binding-removed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == false'

  - name: verify-binding-removed-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CVlan400%7Cservice/exists
    expect:
      jq: '.exists == false'

  # The SVI survives remove-service — configure-irb owns it (§6). It goes only
  # when the operator unconfigures the IRB.
  - name: verify-svi-survives-remove-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_INTERFACE/Vlan400/exists
    expect:
      jq: '.exists == true'

  # Bridge-domain + gateway teardown (§15), reverse of setup: the operator tears
  # down what it authored — the IRB, then the L3 overlay, then the L2 membership
  # and VLAN. Only after all of it is Vlan400 gone.
  - name: unconfigure-irb-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/unconfigure-irb
    params: {vlan_id: 400}

  - name: unbind-ipvpn-irb-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/unbind-ipvpn
    params: {ipvpn: IRB}

  - name: delete-vrf-irb-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vrf
    params: {name: Vrf_IRB}

  - name: teardown-eth12-vlan400
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/unconfigure-interface

  - name: unbind-macvpn400-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/unbind-macvpn
    params: {vlan_id: 400}

  - name: delete-vlan400-teardown
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 400}

  - name: verify-vlan400-removed-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan400-removed-sw2
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  # 8d: Apply svc-bridged on sw1:Eth1 — bridge domain first (VLAN 200, no VNI).
  - name: create-vlan200
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/create-vlan
    params: {id: 200}

  - name: member-eth4-vlan200
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/configure-interface
    params: {vlan_id: 200, tagged: false}

  - name: apply-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/apply-service
    params: {service: svc-bridged}

  - name: verify-bridged-binding-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet4%7Cservice/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan200-sw1
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == true'

  # 8e: Remove svc-bridged from sw1:Eth1
  - name: remove-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/remove-service

  - name: verify-bridged-binding-removed
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet4%7Cservice/exists
    expect:
      jq: '.exists == false'

  # Bridge-domain teardown (§15) before asserting the VLAN is gone.
  - name: teardown-eth4-vlan200
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/unconfigure-interface

  - name: delete-vlan200-teardown
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/delete-vlan
    params: {id: 200}

  - name: verify-vlan200-removed
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'
