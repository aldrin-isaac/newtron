name: bridged
description: |
  VLAN 100 L2 bridging on switch1: Ethernet4 (→host1) and Ethernet12 (→host3) as
  untagged members, Ethernet8 as a tagged member (config-only verification).
  Verifies VLAN creation, member configuration (tagging modes), and that the NGDP
  dataplane bridges traffic between the two untagged host-facing ports (pure L2).
requires: [boot-ssh]

steps:
  - name: create-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/create-vlan
    params: {id: 100}

  - name: configure-bridged-eth4-untagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet4/configure-interface
    params: {vlan_id: 100, tagged: false}

  - name: configure-bridged-eth12-untagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet12/configure-interface
    params: {vlan_id: 100, tagged: false}

  - name: configure-bridged-eth8-tagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/interfaces/Ethernet8/configure-interface
    params: {vlan_id: 100, tagged: true}

  - name: verify-vlan100-exists
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth1-untagged
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet4
    expect:
      jq: '.tagging_mode == "untagged"'

  - name: verify-member-eth2-tagged
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet8
    expect:
      jq: '.tagging_mode == "tagged"'

  - name: verify-member-eth3-untagged
    action: newtron
    devices: [switch1]
    url: /nodes/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet12
    expect:
      jq: '.tagging_mode == "untagged"'

  # Poll ASIC_DB for VLAN + VLAN_MEMBER SAI objects.
  #
  # 180s budget (RCA-047): `bridged` is the first ASIC-verification
  # scenario in the suite, so on a cold-deployed lab it races the
  # orchagent's initial SAI backlog while ~8 sibling scenarios
  # (setup-device, routed, bgp-underlay, ...) flood the same two
  # switches concurrently. SAI programming converges reliably (~15s
  # in isolation) but can exceed 60s under that concurrent cold-boot
  # load. The poll exits early on success, so the larger budget is
  # free on warm runs and only absorbs the cold worst case.
  - name: poll-asic-vlan-ready
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 1 KEYS 'ASIC_STATE:SAI_OBJECT_TYPE_VLAN:*' | wc -l"}
    poll:
      timeout: 180s
      interval: 5s
    expect:
      jq: '.output | gsub("[\\n\\s]";"") | tonumber >= 2'

  - name: poll-asic-vlanmember-ready
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 1 KEYS 'ASIC_STATE:SAI_OBJECT_TYPE_VLAN_MEMBER:*' | wc -l"}
    poll:
      timeout: 180s
      interval: 5s
    expect:
      jq: '.output | gsub("[\\n\\s]";"") | tonumber >= 2'

  # Wait for NGDP bridge plane
  - name: wait-bridge-plane
    action: wait
    duration: 45s

  - name: host1-configure-ip
    action: host-exec
    devices: [host1]
    command: "ip addr add 10.100.0.1/24 dev eth0 2>/dev/null || true"

  - name: host3-configure-ip
    action: host-exec
    devices: [host3]
    command: "ip addr add 10.100.0.3/24 dev eth0 2>/dev/null || true"

  - name: host1-ping-host3
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 10.100.0.3"
    expect:
      success_rate: 0.8

  - name: host3-ping-host1
    action: host-exec
    devices: [host3]
    command: "ping -c 3 -W 2 10.100.0.1"
    expect:
      success_rate: 0.8
