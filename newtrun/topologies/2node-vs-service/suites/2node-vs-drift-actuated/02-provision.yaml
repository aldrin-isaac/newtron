name: provision
description: |
  Provision both switches via topology provisioner. Establishes a known
  CONFIG_DB baseline for drift detection to compare against.
requires: [boot-ssh]

steps:
  - name: provision-switches
    action: topology-reconcile
    devices: [switch1, switch2]

  - name: reload-config
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/reload-config

  - name: wait-after-reload
    action: wait
    duration: 15s

  - name: restart-bgp
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/restart-daemon
    params: {daemon: bgp}
    poll:
      timeout: 30s
      interval: 5s

  - name: wait-bgp-instance
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: verify-bgp
    action: newtron
    devices: [switch1, switch2]
    url: /nodes/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
