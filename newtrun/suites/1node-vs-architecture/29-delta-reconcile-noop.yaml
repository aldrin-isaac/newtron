name: delta-reconcile-noop
description: |
  Delta reconcile on a clean device: zero drift → zero changes.
  Verifies that delta reconcile is safe and idempotent when no drift exists.
topology: 1node-vs
requires: [delta-reconcile-topology]

steps:
  # Verify zero drift before
  - name: verify-zero-drift-before
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift
    expect:
      jq: 'length == 0'

  # Delta reconcile on clean device
  - name: delta-reconcile-noop
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/intent/reconcile?reconcile=delta
    expect:
      jq: '.mode == "delta" and .applied == 0'

  - name: verify-containers-healthy
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "docker ps --format '{{.Names}}' | grep -cE '^(swss|syncd|bgp)$'"}
    expect:
      jq: '.output | contains("3")'

  # Still zero drift after
  - name: verify-zero-drift-after
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift
    expect:
      jq: 'length == 0'
