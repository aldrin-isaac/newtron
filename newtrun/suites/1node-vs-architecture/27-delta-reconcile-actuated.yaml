name: delta-reconcile-actuated
description: |
  Delta reconcile in actuated mode: patches only drifted entries without
  config reload. Injects all 3 drift types (missing, extra, modified),
  verifies delta reconcile fixes them surgically.

  Delta mode is the default for actuated reconcile. No config reload,
  no BGP restart needed — CONFIG_DB is patched in-place.
topology: 1node-vs
requires: [save-roundtrip]

steps:
  # Inject drift: all 3 types
  - name: inject-missing
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 DEL 'LOOPBACK_INTERFACE|Loopback0|10.0.0.1/32'"}

  - name: inject-extra
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 HSET 'VLAN|Vlan888' vlanid 888"}

  - name: inject-modified
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 HSET 'BGP_GLOBALS|default' local_asn 88888"}

  # Verify drift exists
  - name: verify-drift-before
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift
    expect:
      jq: 'length >= 3'

  # Delta reconcile (actuated default — no ?reconcile param needed)
  - name: delta-reconcile
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/intent/reconcile?reconcile=delta
    expect:
      jq: '.mode == "delta" and .applied >= 3'

  - name: verify-containers-healthy
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "docker ps --format '{{.Names}}' | grep -cE '^(swss|syncd|bgp)$'"}
    expect:
      jq: '.output | contains("3")'

  # Verify missing entry restored
  - name: verify-loopback-restored
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0%7C10.0.0.1%2F32/exists
    expect:
      jq: '.exists == true'

  # Verify extra entry removed
  - name: verify-extra-vlan-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan888/exists
    expect:
      jq: '.exists == false'

  # Verify modified entry corrected
  - name: verify-asn-corrected
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001"'

  # Verify zero drift after
  - name: verify-zero-drift
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift
    expect:
      jq: 'length == 0'

  # Verify writes unblocked (drift guard cleared)
  - name: write-unblocked
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vlan
    params: {id: 801}

  - name: cleanup-vlan
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 801}
