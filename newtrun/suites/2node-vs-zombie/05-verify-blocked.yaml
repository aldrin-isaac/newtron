name: verify-blocked
description: |
  Verify that the zombie intent blocks normal write operations.
  This is the critical safety test: ErrDeviceZombieIntent must prevent
  any CONFIG_DB mutation until the zombie is resolved.

  Uses expect_failure to assert that apply-service FAILS with the zombie
  error. Without this test, the zombie detection mechanism is unproven.
topology: 2node-vs-service
requires: [inject-zombie]

steps:
  # Attempt create-vlan on the zombied device — MUST fail with zombie error.
  # create-vlan goes through Execute() which checks zombie intent during Lock().
  - name: create-vlan-blocked-by-zombie
    action: create-vlan
    devices: [switch1]
    vlan_id: 999
    expect_failure: true
    expect:
      contains: "zombie"

  # Verify switch2 (no zombie) is NOT blocked — read operations still work
  - name: switch2-not-blocked
    action: detect-drift
    devices: [switch2]
