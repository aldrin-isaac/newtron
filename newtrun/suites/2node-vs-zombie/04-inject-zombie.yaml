name: inject-zombie
description: |
  Inject a synthetic zombie intent into CONFIG_DB, simulating a crashed
  newtron process. Creates:
    - A zombie operation intent at NEWTRON_INTENT|switch1 with two operations:
      1. create-vlan (completed): VLAN 500 was created before crash
      2. create-vrf (started, not completed): VRF ZOMBIE_VRF partially created
    - The CONFIG_DB entries those operations would have created (VLAN|Vlan500,
      VRF|ZOMBIE_VRF) so rollback has something to clean up.
  Uses the exact serialization format from statedb.go WriteIntent.
topology: 2node-vs-service
requires: [provision]

steps:
  # Write the CONFIG_DB entries that the zombie operations would have created
  - name: create-zombie-vlan
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 HSET 'VLAN|Vlan500' vlanid 500"}

  - name: create-zombie-vrf
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 HSET 'VRF|ZOMBIE_VRF' vrf_name ZOMBIE_VRF"}

  # Write the zombie intent record — JSON operations array in a single field
  - name: write-zombie-intent
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params:
      command: >-
        sudo redis-cli -n 4 HSET 'NEWTRON_INTENT|switch1'
        holder 'crashed@test'
        created '2026-03-15T00:00:00Z'
        phase ''
        rollback_holder ''
        rollback_started ''
        operations '[{"name":"create-vlan","params":{"vlan_id":"500"},"reverse_op":"device.delete-vlan","started":"2026-03-15T00:00:01Z","completed":"2026-03-15T00:00:02Z"},{"name":"create-vrf","params":{"vrf":"ZOMBIE_VRF"},"reverse_op":"device.delete-vrf","started":"2026-03-15T00:00:03Z"}]'

  # Verify the intent was written correctly
  - name: verify-intent-holder
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 4 HGET 'NEWTRON_INTENT|switch1' holder"}
    expect:
      jq: '.output | contains("crashed@test")'

  # Verify the zombie VLAN exists
  - name: verify-zombie-vlan-exists
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan500
    expect:
      jq: '.vlanid == "500"'

  # Verify the zombie VRF exists
  - name: verify-zombie-vrf-exists
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/ZOMBIE_VRF
    expect:
      jq: '.vrf_name == "ZOMBIE_VRF"'
