name: boot-ssh
description: |
  Verify SSH reachability and SwSS readiness on both switches.
topology: 2node-vs-service
requires: []

steps:
  - name: ssh-echo-switch1
    action: ssh-command
    devices: [switch1]
    command: "echo ok"
    expect:
      contains: "ok"
      timeout: 120s
      poll_interval: 5s

  - name: ssh-echo-switch2
    action: ssh-command
    devices: [switch2]
    command: "echo ok"
    expect:
      contains: "ok"
      timeout: 120s
      poll_interval: 5s

  - name: swss-ready
    action: ssh-command
    devices: [switch1, switch2]
    command: >-
      up=$(systemctl show swss.service --property=ActiveEnterTimestampMonotonic --value);
      now=$(cat /proc/uptime | awk '{printf "%.0f", $1 * 1000000}');
      elapsed=$(( (now - up) / 1000000 ));
      [ "$elapsed" -ge 120 ] && echo "swss ready (${elapsed}s uptime)" || echo "swss not ready (${elapsed}s < 120s)"
    expect:
      contains: "swss ready"
      timeout: 300s
      poll_interval: 10s
