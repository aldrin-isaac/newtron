name: verify-unblocked
description: |
  After zombie rollback, verify normal operations work again.
  Then test clear-zombie as an alternative resolution path:
    - Inject a second zombie
    - Verify it blocks operations
    - Clear it (without rollback) — CONFIG_DB entries remain
    - Verify operations are unblocked
    - Verify the zombie's CONFIG_DB entries still exist (clear != rollback)
topology: 2node-vs-service
requires: [rollback-zombie]

steps:
  # --- Part 1: Verify rollback unblocked operations ---

  # Prove operations are unblocked: create-vlan succeeds (no zombie)
  - name: create-vlan-unblocked
    action: create-vlan
    devices: [switch1]
    vlan_id: 997

  - name: delete-vlan-unblocked
    action: delete-vlan
    devices: [switch1]
    vlan_id: 997

  # Drift check proves provisioned state survived the rollback
  - name: verify-drift-clean
    action: verify-drift
    devices: [switch1]
    expect:
      status: "clean"

  # --- Part 2: Test clear-zombie (alternative to rollback) ---

  # Inject a second zombie intent
  - name: inject-second-zombie-vlan
    action: ssh-command
    devices: [switch1]
    command: "sudo redis-cli -n 4 HSET 'VLAN|Vlan600' vlanid 600"

  - name: inject-second-zombie-intent
    action: ssh-command
    devices: [switch1]
    command: >-
      sudo redis-cli -n 4 HSET 'NEWTRON_INTENT|switch1'
      holder 'crashed2@test'
      created '2026-03-15T01:00:00Z'
      phase ''
      rollback_holder ''
      rollback_started ''
      operations '[{"name":"create-vlan","params":{"vlan_id":"600"},"reverse_op":"device.delete-vlan","started":"2026-03-15T01:00:01Z","completed":"2026-03-15T01:00:02Z"}]'

  # Verify second zombie blocks operations
  - name: verify-blocked-again
    action: create-vlan
    devices: [switch1]
    vlan_id: 999
    expect_failure: true
    expect:
      contains: "zombie"

  # Clear zombie WITHOUT rollback — the operator's "I know what I'm doing" path
  - name: clear-zombie-intent
    action: clear-zombie
    devices: [switch1]

  # Verify intent is gone
  - name: verify-cleared
    action: ssh-command
    devices: [switch1]
    command: "sudo redis-cli -n 4 EXISTS 'NEWTRON_INTENT|switch1'"
    expect:
      contains: "0"

  # Verify VLAN 600 STILL EXISTS — clear doesn't rollback, just removes intent
  - name: verify-vlan600-survives-clear
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan600
    expect:
      fields:
        vlanid: "600"

  # Clean up the leftover VLAN manually
  - name: cleanup-vlan600
    action: ssh-command
    devices: [switch1]
    command: "sudo redis-cli -n 4 DEL 'VLAN|Vlan600'"

  # Verify operations unblocked after clear — create-vlan should succeed now
  - name: create-vlan-after-clear
    action: create-vlan
    devices: [switch1]
    vlan_id: 998

  # Clean up the test VLAN
  - name: cleanup-vlan998
    action: delete-vlan
    devices: [switch1]
    vlan_id: 998
