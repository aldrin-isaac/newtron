name: loopback
description: Configure Loopback0 IP on both switches using configure-loopback primitive.
topology: 2node-ngdp
requires: [boot-ssh]

steps:
  - name: configure-loopback
    action: configure-loopback
    devices: all

  - name: verify-loopback-switch1
    action: verify-config-db
    devices: [switch1]
    table: LOOPBACK_INTERFACE
    key: "Loopback0"
    expect:
      exists: true

  - name: verify-loopback-switch2
    action: verify-config-db
    devices: [switch2]
    table: LOOPBACK_INTERFACE
    key: "Loopback0"
    expect:
      exists: true
