name: teardown-infra
description: |
  Tear down all infrastructure using deprovision primitives: EVPN overlay,
  underlay BGP neighbors, interface IPs, BGP globals, and loopback.
topology: 2node-ngdp
requires: [service-lifecycle]

steps:
  # 1. Teardown EVPN overlay
  - name: teardown-vtep-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/teardown-vtep

  - name: teardown-vtep-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/teardown-vtep

  - name: verify-vxlan-tunnel-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1/exists
    expect:
      jq: '.exists == false'

  - name: verify-vxlan-nvo-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1/exists
    expect:
      jq: '.exists == false'

  - name: verify-bgp-l2vpn-af-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == false'

  # 2. Remove underlay BGP neighbors
  - name: bgp-remove-neighbor-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-neighbor
    params: {ip: "10.1.0.1"}

  - name: bgp-remove-neighbor-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-neighbor
    params: {ip: "10.1.0.0"}

  - name: verify-underlay-neighbor-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  - name: verify-underlay-neighbor-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == false'

  # 3. Remove underlay IPs from Ethernet0
  - name: remove-ip-eth0-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-ip
    params: {ip: "10.1.0.0/31"}

  - name: remove-ip-eth0-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-ip
    params: {ip: "10.1.0.1/31"}

  - name: verify-eth0-ip-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-eth0-ip-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  # 4. Remove BGP globals
  - name: remove-bgp-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-bgp

  - name: remove-bgp-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-bgp

  - name: verify-bgp-globals-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default/exists
    expect:
      jq: '.exists == false'

  - name: verify-bgp-globals-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default/exists
    expect:
      jq: '.exists == false'

  - name: verify-bgp-af-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cipv4_unicast/exists
    expect:
      jq: '.exists == false'

  - name: verify-route-redistribute-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ROUTE_REDISTRIBUTE/default%7Cconnected%7Cbgp%7Cipv4/exists
    expect:
      jq: '.exists == false'

  # 5. Remove loopback
  - name: remove-loopback-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-loopback

  - name: remove-loopback-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-loopback

  - name: verify-loopback-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == false'

  - name: verify-loopback-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == false'
