name: teardown-infra
description: |
  Tear down per-interface infrastructure. Granular reverse operations handle
  BGP neighbors and interface IPs. Baseline infrastructure (setup-device) has
  no individual reverse — reprovisioning (CompositeOverwrite) is the
  collective reverse. config reload restores saved state (not factory) since
  every API write calls config save.
topology: 2node-ngdp
requires: [service-lifecycle]

steps:
  # 1. Remove underlay BGP neighbors (valid individual reverse)
  - name: bgp-remove-neighbor-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-peer
    params: {ip: "10.1.0.1"}

  - name: bgp-remove-neighbor-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-peer
    params: {ip: "10.1.0.0"}

  - name: verify-underlay-neighbor-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  - name: verify-underlay-neighbor-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == false'

  # 2. Remove underlay IPs from Ethernet0 (valid individual reverse)
  - name: unconfigure-eth0-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/unconfigure-interface

  - name: unconfigure-eth0-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/unconfigure-interface

  - name: verify-eth0-ip-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-eth0-ip-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  # Baseline infrastructure (loopback, BGP globals, VTEP) is NOT torn down
  # here — setup-device has no individual reverse. These entries persist
  # until reprovisioning.
