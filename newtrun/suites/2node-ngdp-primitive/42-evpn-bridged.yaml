name: evpn-bridged
description: |
  EVPN L2 bridging: VLAN 300 with VNI 50300 across switch1 and switch2.
  Ethernet2 on both switches (→host2 and →host5) are access members.
  Hosts communicate via L2 bridged over VXLAN — verifies the complete
  EVPN L2 control and data plane path.
topology: 2node-ngdp
requires: [evpn-verify]

steps:
  - name: create-vlan300-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vlan
    params: {id: 300}

  - name: create-vlan300-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/create-vlan
    params: {id: 300}

  - name: configure-bridged-sw1-eth2
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet2/configure-interface
    params: {vlan_id: 300, tagged: false}

  - name: configure-bridged-sw2-eth2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet2/configure-interface
    params: {vlan_id: 300, tagged: false}

  - name: bind-macvpn-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/bind-macvpn
    params: {vlan_id: 300, macvpn: vlan300}

  - name: bind-macvpn-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/bind-macvpn
    params: {vlan_id: 300, macvpn: vlan300}

  - name: verify-vlan300-exists
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan300-member-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan300%7CEthernet2/exists
    expect:
      jq: '.exists == true'

  - name: verify-tunnel-map-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50300_Vlan300
    expect:
      jq: '.vlan == "Vlan300" and .vni == "50300"'

  - name: verify-tunnel-map-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50300_Vlan300
    expect:
      jq: '.vlan == "Vlan300" and .vni == "50300"'

  - name: verify-arp-suppress-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan300/exists
    expect:
      jq: '.exists == true'

  - name: wait-vxlan-ready
    action: wait
    duration: 15s

  - name: host2-configure-ip
    action: host-exec
    devices: [host2]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 10.3.0.2/24 dev eth0"

  - name: host5-configure-ip
    action: host-exec
    devices: [host5]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 10.3.0.5/24 dev eth0"

  - name: host2-ping-host5
    action: host-exec
    devices: [host2]
    command: "ping -c 5 -W 2 10.3.0.5"
    expect:
      success_rate: 0.8

  - name: host5-ping-host2
    action: host-exec
    devices: [host5]
    command: "ping -c 5 -W 2 10.3.0.2"
    expect:
      success_rate: 0.8
