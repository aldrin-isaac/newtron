name: evpn-irb
description: |
  EVPN IRB: create Vrf_IRB with L3VNI, configure SVI for VLAN 300 as
  distributed anycast gateway. Verify IRB gateway reachability and L2
  bridging still works. Includes configure/unconfigure-interface sub-lifecycle.
topology: 2node-ngdp
requires: [evpn-bridged]

steps:
  # Create IRB VRF on both
  - name: create-vrf-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vrf
    params: {name: Vrf_IRB}

  - name: create-vrf-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/create-vrf
    params: {name: Vrf_IRB}

  # Bind IP-VPN
  - name: bind-ipvpn-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/bind-ipvpn
    params: {vrf: Vrf_IRB, ipvpn: evpn-irb-vrf}

  - name: bind-ipvpn-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/bind-ipvpn
    params: {vrf: Vrf_IRB, ipvpn: evpn-irb-vrf}

  # CONFIG_DB verification: VRF with VNI
  - name: verify-vrf-irb-vni
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB
    expect:
      jq: '.vni == "50002"'

  - name: verify-bgp-globals-vrf
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/Vrf_IRB
    expect:
      jq: '.local_asn == "65001"'

  - name: verify-bgp-af-l2vpn-evpn
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/Vrf_IRB%7Cl2vpn_evpn
    expect:
      jq: '."advertise-ipv4-unicast" == "true"'

  - name: verify-evpn-rt
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_EVPN_RT/Vrf_IRB%7CL2VPN_EVPN%7C65000:50002/exists
    expect:
      jq: '.exists == true'

  - name: verify-route-redistribute
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ROUTE_REDISTRIBUTE/Vrf_IRB%7Cconnected%7Cbgp%7Cipv4/exists
    expect:
      jq: '.exists == true'

  # Configure SVI with VRF and anycast gateway
  - name: configure-svi-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/configure-svi
    params:
      vlan_id: 300
      ip_address: "10.3.0.1/24"
      vrf: Vrf_IRB

  - name: configure-svi-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/configure-svi
    params:
      vlan_id: 300
      ip_address: "10.3.0.1/24"
      vrf: Vrf_IRB

  - name: verify-svi-vrf-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan300
    expect:
      jq: '.vrf_name == "Vrf_IRB"'

  - name: verify-svi-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan300%7C10.3.0.1%2F24/exists
    expect:
      jq: '.exists == true'

  - name: wait-svi-ready
    action: wait
    duration: 15s

  # Prime NGDP ARP
  - name: prime-arp-sw1-svi
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan300 10.3.0.2"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-sw2-svi
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan300 10.3.0.5"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host→SVI gateway
  - name: host2-ping-svi-gateway
    action: host-exec
    devices: [host2]
    command: "ping -c 3 -W 2 10.3.0.1"
    expect:
      success_rate: 0.8

  - name: host5-ping-svi-gateway
    action: host-exec
    devices: [host5]
    command: "ping -c 3 -W 2 10.3.0.1"
    expect:
      success_rate: 0.8

  # L2 bridging still works
  - name: host2-ping-host5-l2
    action: host-exec
    devices: [host2]
    command: "ping -c 5 -W 2 10.3.0.5"
    expect:
      success_rate: 0.8

  - name: host5-ping-host2-l2
    action: host-exec
    devices: [host5]
    command: "ping -c 5 -W 2 10.3.0.2"
    expect:
      success_rate: 0.8

  # Sub-lifecycle: configure-interface Eth3→Vrf_IRB on sw1
  - name: configure-ethernet3
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/configure-interface
    params: {vrf: Vrf_IRB}

  - name: verify-eth3-in-vrf
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet3
    expect:
      jq: '.vrf_name == "Vrf_IRB"'

  - name: unconfigure-ethernet3
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/unconfigure-interface
    params: {vrf: Vrf_IRB}

  - name: verify-eth3-vrf-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet3
    expect:
      jq: '(.vrf_name // "") == ""'
