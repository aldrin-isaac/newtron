name: routed
description: |
  L3 routing in Vrf_local on switch2: create VRF, bind Ethernet1 (→host4),
  assign IP, and verify host4 can reach the gateway. Demonstrates full
  primitive build-up: VRF → interface binding → IP → dataplane.
topology: 2node-ngdp
requires: [boot-ssh]

steps:
  - name: create-vrf-local
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/create-vrf
    params: {name: Vrf_local}

  - name: bind-ethernet1-to-vrf
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/set-vrf
    params: {vrf: Vrf_local}

  - name: set-ip-ethernet1
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/set-ip
    params: {ip: "10.20.1.1/31"}

  - name: verify-vrf-exists
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_local/exists
    expect:
      jq: '.exists == true'

  - name: verify-interface-vrf
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1
    expect:
      jq: '.vrf_name == "Vrf_local"'

  - name: verify-ip-assigned
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == true'

  - name: wait-ethernet1-ip
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show Ethernet1"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | contains("10.20.1.1")'

  - name: host4-configure-ip
    action: host-exec
    devices: [host4]
    command: "ip addr add 10.20.1.0/31 dev eth0 2>/dev/null || true"

  - name: host4-add-default-route
    action: host-exec
    devices: [host4]
    command: "ip route add default via 10.20.1.1 dev eth0 2>/dev/null || true"

  - name: prime-ngdp-arp-ethernet1
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Ethernet1 10.20.1.0"}
    poll:
      timeout: 30s
      interval: 5s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 3s

  - name: host4-ping-gateway
    action: host-exec
    devices: [host4]
    command: "ping -c 3 -W 2 10.20.1.1"
    expect:
      success_rate: 0.8
