name: verify-clean
description: |
  Comprehensive CONFIG_DB audit: verify that ALL entries created during the test
  suite have been cleaned up by deprovision primitives. Read-only verification.
topology: 2node-ngdp
requires: [teardown-infra]

steps:
  # Baseline infrastructure (LOOPBACK_INTERFACE, BGP_GLOBALS/default,
  # BGP_GLOBALS_AF/default, BGP_NEIGHBOR, ROUTE_REDISTRIBUTE/default,
  # VXLAN_TUNNEL, VXLAN_EVPN_NVO) is NOT checked here — setup-device has
  # no individual reverse. These persist until reprovisioning.

  # BGP_NEIGHBOR — only check underlay peers that were individually removed
  - name: verify-no-bgp-neighbor-underlay-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-bgp-neighbor-underlay-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == false'

  # INTERFACE (base entries + IP sub-entries)
  - name: verify-no-eth0-base
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-eth1-base
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-eth0-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-eth0-ip-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-eth1-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1%7C10.20.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-eth1-ip-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == false'

  # VLAN
  - name: verify-no-vlan100
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan200
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan300-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan300-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan400-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  # VLAN_MEMBER
  - name: verify-no-vlan100-eth1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan300-eth2-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan300%7CEthernet2/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan300-eth2-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan300%7CEthernet2/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan400-eth3-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan400-eth3-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  # VLAN_INTERFACE
  - name: verify-no-vlan100-intf
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan300-intf
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vlan400-intf
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan400/exists
    expect:
      jq: '.exists == false'

  # VRF
  - name: verify-no-vrf-local
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_local/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vrf-irb-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-vrf-irb-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # NEWTRON_INTENT
  - name: verify-no-binding-eth1-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-binding-eth3-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-binding-eth3-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  # VXLAN_TUNNEL_MAP
  - name: verify-no-tunnel-map-300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50300_Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-tunnel-map-400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50400_Vlan400/exists
    expect:
      jq: '.exists == false'

  # SUPPRESS_VLAN_NEIGH
  - name: verify-no-suppress-300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-suppress-400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan400/exists
    expect:
      jq: '.exists == false'

  # BGP_GLOBALS_EVPN_RT
  - name: verify-no-evpn-rt-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_EVPN_RT/Vrf_IRB%7CL2VPN_EVPN%7C65000%3A50002/exists
    expect:
      jq: '.exists == false'

  # BGP_EVPN_VNI (from bind-macvpn and service-lifecycle)
  - name: verify-no-bgp-evpn-vni-50300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_EVPN_VNI/default%7C50300/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-bgp-evpn-vni-50400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_EVPN_VNI/default%7C50400/exists
    expect:
      jq: '.exists == false'

  # BGP_GLOBALS (VRF-level from bind-ipvpn)
  - name: verify-no-bgp-globals-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # BGP_GLOBALS_AF (VRF-level from bind-ipvpn)
  - name: verify-no-bgp-af-vrf-irb-ipv4
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/Vrf_IRB%7Cipv4_unicast/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-bgp-af-vrf-irb-l2vpn
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/Vrf_IRB%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == false'

  # ROUTE_REDISTRIBUTE (VRF-level from bind-ipvpn)
  - name: verify-no-redistribute-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/ROUTE_REDISTRIBUTE/Vrf_IRB%7Cconnected%7Cbgp%7Cipv4/exists
    expect:
      jq: '.exists == false'

  # SAG_GLOBAL
  - name: verify-no-sag-global
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SAG_GLOBAL/IPv4/exists
    expect:
      jq: '.exists == false'

  # STATIC_ROUTE
  - name: verify-no-static-route
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/STATIC_ROUTE/Vrf_local%7C10.99.0.0%2F24/exists
    expect:
      jq: '.exists == false'

  # PORTCHANNEL
  - name: verify-no-portchannel-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-portchannel-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == false'

  # PORTCHANNEL_MEMBER
  - name: verify-no-portchannel-member-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-portchannel-member-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # ACL_TABLE
  - name: verify-no-acl-table
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_TABLE/TEST_ACL/exists
    expect:
      jq: '.exists == false'

  # NEWTRON_INTENT (spec-authoring scenario)
  - name: verify-no-binding-eth10-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet10/exists
    expect:
      jq: '.exists == false'

  # ROUTE_MAP (from spec-authoring scenario)
  - name: verify-no-route-map
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ROUTE_MAP
    expect:
      jq: 'length == 0'

  # PREFIX_SET (from spec-authoring scenario)
  - name: verify-no-prefix-set
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PREFIX_SET
    expect:
      jq: 'length == 0'

  # BGP_PEER_GROUP — service-created groups should be gone.
  # The EVPN peer group (default|EVPN) from setup-device persists.
  - name: verify-no-bgp-peer-group-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_PEER_GROUP/default%7CSVC_EVPN_IRB/exists
    expect:
      jq: '.exists == false'

  - name: verify-no-bgp-peer-group-af-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_PEER_GROUP_AF/default%7CSVC_EVPN_IRB%7Cipv4_unicast/exists
    expect:
      jq: '.exists == false'

  # PORT_QOS_MAP
  - name: verify-no-qos-map
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT_QOS_MAP/Ethernet11/exists
    expect:
      jq: '.exists == false'
