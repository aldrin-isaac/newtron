name: service-lifecycle
description: |
  Composite service operations: apply-service, refresh-service, remove-service.
  Tests svc-evpn-irb on sw1:Eth3 + sw2:Eth3 with dataplane verification,
  then svc-bridged on sw1:Eth1. Exercises the full service lifecycle API.
topology: 2node-ngdp
requires: [teardown-overlay]

steps:
  # 8a: Apply svc-evpn-irb on Eth3 (both switches)
  - name: apply-svc-evpn-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/apply-service
    params: {service: svc-evpn-irb}

  - name: apply-svc-evpn-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/apply-service
    params: {service: svc-evpn-irb}

  # Verify service binding
  - name: verify-binding-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == true'

  - name: verify-binding-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == true'

  # Verify VLAN 400 created
  - name: verify-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan400-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == true'

  # Verify VLAN member (tagged for apply-service)
  - name: verify-vlan-member-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet3/exists
    expect:
      jq: '.exists == true'

  # Verify VXLAN tunnel map
  - name: verify-tunnel-map-400-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50400_Vlan400
    expect:
      jq: '.vlan == "Vlan400" and .vni == "50400"'

  # Verify VLAN_INTERFACE (SVI with VRF)
  - name: verify-svi-vlan400-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan400
    expect:
      jq: '.vrf_name == "Vrf_IRB"'

  # Configure host sub-interfaces while waiting (overlap with EVPN convergence)
  - name: host3-configure-subintf
    action: host-exec
    devices: [host3]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.3/24 dev eth0.400; ip link set eth0.400 up"

  - name: host6-configure-subintf
    action: host-exec
    devices: [host6]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.6/24 dev eth0.400; ip link set eth0.400 up"

  # Wait for EVPN VXLAN convergence. teardown-overlay's VRF deletion causes
  # frrcfgd to reconfigure FRR, which drops the overlay eBGP session. The
  # session needs ~60-90s to re-establish (TCP connect retry timer + BGP open),
  # then orchagent programs ASIC_DB, then BGP advertises VNIs to the peer.
  - name: wait-evpn-convergence
    action: wait
    duration: 90s

  # Verify EVPN BGP sessions re-established after overlay rebuild
  - name: verify-evpn-bgp-sessions
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 10s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  # Prime NGDP ARP from SVI (retry loop handles stragglers)
  - name: prime-arp-svi-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.3"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-svi-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan400 10.4.0.6"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host3↔host6 EVPN IRB ping
  - name: host3-ping-host6
    action: host-exec
    devices: [host3]
    command: "ping -c 5 -W 2 10.4.0.6"
    expect:
      success_rate: 0.8

  - name: host6-ping-host3
    action: host-exec
    devices: [host6]
    command: "ping -c 5 -W 2 10.4.0.3"
    expect:
      success_rate: 0.8

  # 8b: Refresh service — verify no error, binding still present
  - name: refresh-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/refresh-service

  - name: refresh-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/refresh-service

  - name: verify-binding-after-refresh-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == true'

  # 8c: Remove service from both Eth3
  - name: remove-svc-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/remove-service

  - name: remove-svc-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/remove-service

  - name: verify-binding-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  - name: verify-binding-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan400-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan400-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  # 8d: Apply svc-bridged on sw1:Eth1
  - name: apply-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/apply-service
    params: {service: svc-bridged}

  - name: verify-bridged-binding-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1/exists
    expect:
      jq: '.exists == true'

  - name: verify-vlan200-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == true'

  # 8e: Remove svc-bridged from sw1:Eth1
  - name: remove-svc-bridged-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/remove-service

  - name: verify-bridged-binding-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan200-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'
