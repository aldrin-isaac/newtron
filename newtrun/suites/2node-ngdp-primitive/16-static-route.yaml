name: static-route
description: |
  Self-contained static route lifecycle: add a static route to Vrf_local,
  verify CONFIG_DB entry, then remove it and verify removal.
topology: 2node-ngdp
requires: [routed]

steps:
  - name: add-static-route
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/vrf/Vrf_local/route
    params:
      prefix: "10.99.0.0/24"
      nexthop: "10.20.1.0"

  - name: verify-static-route-added
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/STATIC_ROUTE/Vrf_local%7C10.99.0.0%2F24
    expect:
      jq: '.nexthop == "10.20.1.0"'

  - name: remove-static-route
    action: newtron
    devices: [switch2]
    method: DELETE
    url: /node/{{device}}/vrf/Vrf_local/route/10.99.0.0/24

  - name: verify-static-route-removed
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/STATIC_ROUTE/Vrf_local%7C10.99.0.0%2F24/exists
    expect:
      jq: '.exists == false'
