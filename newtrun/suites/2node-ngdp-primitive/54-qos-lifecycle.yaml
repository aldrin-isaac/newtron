name: qos-lifecycle
description: |
  Self-contained QoS lifecycle on sw1:Ethernet11 (config-only, no host wired).
  Tests apply-qos and remove-qos primitives with CONFIG_DB verification for
  per-interface (PORT_QOS_MAP) and device-wide (DSCP_TO_TC_MAP) entries.
topology: 2node-ngdp
requires: [setup-device]

steps:
  # Create interface intent anchor (I4: parent for QoS sub-resource)
  - name: configure-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet11/configure-interface

  - name: apply-qos-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet11/apply-qos
    params: {policy: test-4q}

  - name: verify-port-qos-map
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT_QOS_MAP/Ethernet11/exists
    expect:
      jq: '.exists == true'

  - name: verify-dscp-tc-map
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/DSCP_TO_TC_MAP/TEST_4Q/exists
    expect:
      jq: '.exists == true'

  - name: remove-qos-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet11/remove-qos

  - name: verify-port-qos-map-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT_QOS_MAP/Ethernet11/exists
    expect:
      jq: '.exists == false'

  # Cleanup: remove the interface intent
  - name: unconfigure-ethernet11
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet11/unconfigure-interface
