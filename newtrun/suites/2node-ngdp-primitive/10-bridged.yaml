name: bridged
description: |
  VLAN 100 L2 bridging on switch1: Ethernet1 (→host1) and Ethernet3 (→host3) as
  untagged members, Ethernet2 as a tagged member (config-only verification).
  Verifies VLAN creation, member configuration (tagging modes), and that the NGDP
  dataplane bridges traffic between the two untagged host-facing ports (pure L2).
topology: 2node-ngdp
requires: [boot-ssh]

steps:
  - name: create-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vlan
    params: {id: 100}

  - name: configure-bridged-eth1-untagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/configure-interface
    params: {vlan_id: 100, tagged: false}

  - name: configure-bridged-eth3-untagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet3/configure-interface
    params: {vlan_id: 100, tagged: false}

  - name: configure-bridged-eth2-tagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet2/configure-interface
    params: {vlan_id: 100, tagged: true}

  - name: verify-vlan100-exists
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth1-untagged
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet1
    expect:
      jq: '.tagging_mode == "untagged"'

  - name: verify-member-eth2-tagged
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet2
    expect:
      jq: '.tagging_mode == "tagged"'

  - name: verify-member-eth3-untagged
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet3
    expect:
      jq: '.tagging_mode == "untagged"'

  # Poll ASIC_DB for VLAN SAI objects (30s timeout)
  - name: poll-asic-vlan-ready
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 1 KEYS 'ASIC_STATE:SAI_OBJECT_TYPE_VLAN:*' | wc -l"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | gsub("[\\n\\s]";"") | tonumber >= 2'

  - name: poll-asic-vlanmember-ready
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo redis-cli -n 1 KEYS 'ASIC_STATE:SAI_OBJECT_TYPE_VLAN_MEMBER:*' | wc -l"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | gsub("[\\n\\s]";"") | tonumber >= 2'

  # Wait for NGDP bridge plane
  - name: wait-bridge-plane
    action: wait
    duration: 45s

  - name: host1-configure-ip
    action: host-exec
    devices: [host1]
    command: "ip addr add 10.100.0.1/24 dev eth0 2>/dev/null || true"

  - name: host3-configure-ip
    action: host-exec
    devices: [host3]
    command: "ip addr add 10.100.0.3/24 dev eth0 2>/dev/null || true"

  - name: host1-ping-host3
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 10.100.0.3"
    expect:
      success_rate: 0.8

  - name: host3-ping-host1
    action: host-exec
    devices: [host3]
    command: "ping -c 3 -W 2 10.100.0.1"
    expect:
      success_rate: 0.8
