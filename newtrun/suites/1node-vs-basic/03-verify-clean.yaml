name: verify-clean
description: |
  Verify no leftover CONFIG_DB entries from the test suite. Confirms that
  service-lifecycle and vlan-vrf scenarios cleaned up after themselves.
topology: 1node-vs
requires: [service-lifecycle, vlan-vrf]

steps:
  # No service binding leftovers
  - name: verify-no-binding-eth0
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  # No VLAN leftovers
  - name: verify-no-vlan100
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  # No VRF leftovers
  - name: verify-no-vrf-test
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_test/exists
    expect:
      jq: '.exists == false'

  # No BGP neighbor leftovers
  - name: verify-no-bgp-neighbor
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  # Confirm no test VLANs in kernel
  - name: verify-no-kernel-vlans
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip link show | grep -c 'Vlan100' || echo 0"}
    expect:
      jq: '.output | contains("0")'
