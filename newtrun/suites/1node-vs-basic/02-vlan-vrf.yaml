name: vlan-vrf
description: |
  VLAN and VRF lifecycle: create VLAN 100 with a tagged member, create VRF,
  then tear down and verify all entries removed. Tests disaggregated primitives
  on a single switch.
topology: 1node-vs
requires: [boot-ssh]

steps:
  # Create VLAN 100
  - name: create-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vlan
    params: {id: 100}

  - name: verify-vlan100
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == true'

  # Add Ethernet0 as tagged member
  - name: add-member-eth0-tagged
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/add-vlan-member
    params: {id: 100, interface: Ethernet0, tagged: true}

  - name: verify-vlan-member
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet0
    expect:
      jq: '.tagging_mode == "tagged"'

  # Create VRF
  - name: create-vrf-test
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-vrf
    params: {name: Vrf_test}

  - name: verify-vrf
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_test/exists
    expect:
      jq: '.exists == true'

  # Tear down: remove VLAN member, delete VLAN, delete VRF
  - name: remove-member-eth0
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-vlan-member
    params: {id: 100, interface: Ethernet0}

  - name: verify-member-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  - name: delete-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 100}

  - name: verify-vlan100-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: delete-vrf-test
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vrf
    params: {name: Vrf_test}

  - name: verify-vrf-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_test/exists
    expect:
      jq: '.exists == false'
