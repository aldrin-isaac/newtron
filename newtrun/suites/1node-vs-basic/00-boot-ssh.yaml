name: boot-ssh
description: Verify SSH reachability on switch1

steps:
  - name: ssh-echo-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /nodes/{{device}}/ssh-command
    params: {command: "echo ok"}
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: '.output | contains("ok")'
