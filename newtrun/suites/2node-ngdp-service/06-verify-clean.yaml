name: verify-clean
description: |
  Verify that CONFIG_DB is clean after full deprovision.
  For every forward action there must be a reverse action — this suite
  verifies that every CONFIG_DB entry written during provision has been
  removed. Organized by table to trace operational symmetry.
topology: 2node-ngdp-service
requires: [deprovision]

steps:
  # =========================================================================
  # NEWTRON_INTENT — one per provisioned interface
  # Forward: ApplyService → binding entry
  # Reverse: RemoveService → deletes binding
  # =========================================================================

  - name: no-binding-eth0
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth1
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth2
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet2/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth3
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth4
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # INTERFACE — routed service (transit) creates base + IP sub-entry
  # Forward: enableIpRouting + assignIpAddress
  # Reverse: RemoveService → unassignIpAddress + disableIpRouting
  # =========================================================================

  - name: no-interface-eth0
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0/exists
    expect:
      jq: '.exists == false'

  # switch1: 10.1.0.0/31, switch2: 10.1.0.1/31
  - name: no-interface-eth0-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: no-interface-eth0-ip-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN — one per macvpn (100, 200, 300, 400, 401, 3998 L3VNI)
  # Forward: createVlan
  # Reverse: RemoveService → destroyVlan (last user gate)
  # =========================================================================

  - name: no-vlan100
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan200
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan401
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan401/exists
    expect:
      jq: '.exists == false'

  # L3VNI VLAN for Vrf_IRB (evpn-irb shared VRF)
  - name: no-vlan3998
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan3998/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN_MEMBER — one per interface+VLAN binding
  # Forward: createVlanMember
  # Reverse: RemoveService → deleteVlanMember
  # =========================================================================

  # local-irb: Ethernet1 tagged member of Vlan100
  - name: no-vlan-member-100-eth1
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet1/exists
    expect:
      jq: '.exists == false'

  # local-bridge: Ethernet2 untagged member of Vlan200
  - name: no-vlan-member-200-eth2
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan200%7CEthernet2/exists
    expect:
      jq: '.exists == false'

  # l2-extend: Ethernet3 untagged member of Vlan300
  - name: no-vlan-member-300-eth3
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan300%7CEthernet3/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-a: Ethernet4 tagged member of Vlan400 (switch1 only)
  - name: no-vlan-member-400-eth4
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan400%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-b: Ethernet4 tagged member of Vlan401 (switch2 only)
  - name: no-vlan-member-401-eth4
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan401%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN_INTERFACE — SVI for irb and evpn-irb services
  # Forward: createSVI + assignSviIp / createAnycastSVI
  # Reverse: RemoveService → deleteSviIp + deleteSVI
  # =========================================================================

  # local-irb SVI on Vlan100
  - name: no-svi-vlan100
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-a SVI on Vlan400 (switch1)
  - name: no-svi-vlan400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan400/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-b SVI on Vlan401 (switch2)
  - name: no-svi-vlan401
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan401/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SAG_GLOBAL — anycast gateway MAC (shared across all evpn-irb SVIs)
  # Forward: createSagGlobal (first anycast MAC user)
  # Reverse: RemoveService → deleteSagGlobal (last anycast MAC user)
  # =========================================================================

  - name: no-sag-global
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SAG_GLOBAL/IPv4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VRF — shared VRF for evpn-irb
  # Forward: createVrf
  # Reverse: RemoveService → destroyVrf (last IPVPN user)
  # =========================================================================

  - name: no-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VXLAN_TUNNEL_MAP — VNI-to-VLAN/VRF mappings
  # Forward: createVniMap
  # Reverse: RemoveService → deleteVniMap
  # =========================================================================

  # l2-extend: VNI 10300 → Vlan300
  - name: no-vni-map-10300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10300_Vlan300/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-a: VNI 10400 → Vlan400
  - name: no-vni-map-10400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10400_Vlan400/exists
    expect:
      jq: '.exists == false'

  # overlay-irb-b: VNI 10401 → Vlan401
  - name: no-vni-map-10401
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10401_Vlan401/exists
    expect:
      jq: '.exists == false'

  # L3VNI: VNI 50400 → Vrf_IRB
  - name: no-vni-map-50400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50400_Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SUPPRESS_VLAN_NEIGH — ARP suppression on EVPN VLANs
  # Forward: enableArpSuppression
  # Reverse: RemoveService → disableArpSuppression
  # =========================================================================

  - name: no-arp-suppress-vlan300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: no-arp-suppress-vlan400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan400/exists
    expect:
      jq: '.exists == false'

  - name: no-arp-suppress-vlan401
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan401/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_EVPN_VNI — per-VNI BGP config (route targets)
  # Forward: createBgpEvpnVni
  # Reverse: RemoveService → deleteBgpEvpnVni
  # =========================================================================

  - name: no-bgp-evpn-vni-10300
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_EVPN_VNI/default%7C10300/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-evpn-vni-10400
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_EVPN_VNI/default%7C10400/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-evpn-vni-10401
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_EVPN_VNI/default%7C10401/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_GLOBALS — VRF-level BGP globals from bind-ipvpn
  # Forward: bindIpvpn → CreateBGPGlobals for VRF
  # Reverse: RemoveService → unbindIpvpn → deleteBGPGlobals for VRF
  # =========================================================================

  - name: no-bgp-globals-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_GLOBALS_AF — VRF-level address-family from bind-ipvpn
  # Forward: bindIpvpn → CreateBGPGlobalsAF for VRF (ipv4_unicast + l2vpn_evpn)
  # Reverse: RemoveService → unbindIpvpn → delete AF entries
  # =========================================================================

  - name: no-bgp-af-vrf-irb-ipv4
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/Vrf_IRB%7Cipv4_unicast/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-af-vrf-irb-l2vpn
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/Vrf_IRB%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_GLOBALS_EVPN_RT — VRF route targets for EVPN
  # Forward: bindIpvpn → createBgpEvpnRT
  # Reverse: RemoveService → unbindIpvpn → deleteBgpEvpnRT
  # =========================================================================

  - name: no-bgp-evpn-rt-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_EVPN_RT/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # Baseline infrastructure (VXLAN_TUNNEL, VXLAN_EVPN_NVO, BGP_GLOBALS/default,
  # BGP_GLOBALS_AF/default, ROUTE_REDISTRIBUTE/default, BGP_NEIGHBOR, LOOPBACK_INTERFACE)
  # is NOT checked here — setup-device has no individual reverse.
  # Reprovisioning (CompositeOverwrite) is the collective reverse.

  # VRF-level redistribute from bind-ipvpn (overlay-irb services) —
  # cleaned up by RemoveService → destroyVrf → unbindIpvpn
  - name: no-route-redistribute-vrf-irb
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/configdb/ROUTE_REDISTRIBUTE/Vrf_IRB%7Cconnected%7Cbgp%7Cipv4/exists
    expect:
      jq: '.exists == false'
