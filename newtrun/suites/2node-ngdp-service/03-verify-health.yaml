name: verify-health
description: |
  Capstone: run intent-based health checks on both switches.
  Verifies CONFIG_DB matches topology-derived expected state including
  VLANs, VLAN members, SVIs, EVPN VNIs, ARP suppression, service
  bindings, BGP sessions, and interface oper-up status.
topology: 2node-ngdp-service
requires: [provision]

steps:
  # Ensure BGP sessions are established before running health checks.
  # The health check's BGP neighbor read is point-in-time (not polled),
  # so it races with convergence if run immediately after provision.
  - name: wait-bgp-established
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  # Brief pause after BGP poll passes — vtysh JSON output can lag behind
  # FRR's internal state, causing point-in-time health checks to miss peers
  # that the poll just confirmed as Established.
  - name: settle-after-bgp
    action: wait
    duration: 15s

  - name: verify-health-switch1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/health
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.oper_checks | all(.[]; .status == "pass" or .status == "warn")'

  - name: verify-health-switch2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/health
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.oper_checks | all(.[]; .status == "pass" or .status == "warn")'
