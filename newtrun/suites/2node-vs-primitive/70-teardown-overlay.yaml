name: teardown-overlay
description: |
  Reverse teardown of EVPN IRB + bridged + cross-switch using deprovision primitives.
  Removes SVI, unbinds IP-VPN, deletes VRF, unbinds MAC-VPN, removes VLAN members,
  deletes VLANs, and removes cross-switch IPs.
topology: 2node-vs
requires: [evpn-irb]

steps:
  # 1. Remove SVI from VLAN 300 on both switches
  - name: remove-svi-sw1
    action: remove-svi
    devices: [switch1]
    vlan_id: 300

  - name: remove-svi-sw2
    action: remove-svi
    devices: [switch2]
    vlan_id: 300

  - name: verify-svi-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: Vlan300
    expect:
      exists: false

  - name: verify-svi-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: VLAN_INTERFACE
    key: Vlan300
    expect:
      exists: false

  # 2. Unbind IP-VPN from Vrf_IRB
  - name: unbind-ipvpn-sw1
    action: unbind-ipvpn
    devices: [switch1]
    vrf: Vrf_IRB

  - name: unbind-ipvpn-sw2
    action: unbind-ipvpn
    devices: [switch2]
    vrf: Vrf_IRB

  - name: verify-vrf-vni-cleared-sw1
    action: verify-config-db
    devices: [switch1]
    table: VRF
    key: Vrf_IRB
    expect:
      fields:
        vni: ""

  # 3. Delete Vrf_IRB
  - name: delete-vrf-irb-sw1
    action: delete-vrf
    devices: [switch1]
    vrf: Vrf_IRB

  - name: delete-vrf-irb-sw2
    action: delete-vrf
    devices: [switch2]
    vrf: Vrf_IRB

  - name: verify-vrf-irb-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: VRF
    key: Vrf_IRB
    expect:
      exists: false

  - name: verify-vrf-irb-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: VRF
    key: Vrf_IRB
    expect:
      exists: false

  - name: verify-bgp-globals-vrf-removed
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS
    key: Vrf_IRB
    expect:
      exists: false

  # 4. Unbind MAC-VPN from VLAN 300
  - name: unbind-macvpn-sw1
    action: unbind-macvpn
    devices: [switch1]
    vlan_id: 300

  - name: unbind-macvpn-sw2
    action: unbind-macvpn
    devices: [switch2]
    vlan_id: 300

  - name: verify-tunnel-map-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_TUNNEL_MAP
    key: "vtep1|VNI50300_Vlan300"
    expect:
      exists: false

  - name: verify-tunnel-map-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: VXLAN_TUNNEL_MAP
    key: "vtep1|VNI50300_Vlan300"
    expect:
      exists: false

  # 5. Remove VLAN members
  - name: remove-member-sw1-eth2
    action: remove-vlan-member
    devices: [switch1]
    interface: Ethernet8
    vlan_id: 300

  - name: remove-member-sw2-eth2
    action: remove-vlan-member
    devices: [switch2]
    interface: Ethernet8
    vlan_id: 300

  # 6. Delete VLAN 300
  - name: delete-vlan300-sw1
    action: delete-vlan
    devices: [switch1]
    vlan_id: 300

  - name: delete-vlan300-sw2
    action: delete-vlan
    devices: [switch2]
    vlan_id: 300

  - name: verify-vlan300-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan300
    expect:
      exists: false

  - name: verify-vlan300-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: VLAN
    key: Vlan300
    expect:
      exists: false

  # 7. Remove cross-switch IPs from Ethernet4
  - name: remove-ip-eth1-sw1
    action: remove-ip
    devices: [switch1]
    interface: Ethernet4
    params:
      ip: "10.20.0.1/31"

  - name: remove-ip-eth1-sw2
    action: remove-ip
    devices: [switch2]
    interface: Ethernet4
    params:
      ip: "10.20.1.1/31"

  - name: verify-eth1-ip-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: INTERFACE
    key: "Ethernet4|10.20.0.1/31"
    expect:
      exists: false

  - name: verify-eth1-ip-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: INTERFACE
    key: "Ethernet4|10.20.1.1/31"
    expect:
      exists: false
