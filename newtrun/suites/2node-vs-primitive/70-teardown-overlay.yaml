name: teardown-overlay
description: |
  Reverse teardown of EVPN IRB + bridged + cross-switch using deprovision primitives.
  Removes SVI, unbinds IP-VPN, deletes VRF, unbinds MAC-VPN, removes VLAN members,
  deletes VLANs, and removes cross-switch IPs.
topology: 2node-vs
requires: [evpn-irb]

steps:
  # 1. Remove SVI from VLAN 300 on both switches
  - name: remove-svi-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/unconfigure-irb
    params: {vlan_id: 300}

  - name: remove-svi-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/unconfigure-irb
    params: {vlan_id: 300}

  - name: verify-svi-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-svi-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan300/exists
    expect:
      jq: '.exists == false'

  # 2. Unbind IP-VPN from Vrf_IRB
  - name: unbind-ipvpn-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/unbind-ipvpn
    params: {vrf: Vrf_IRB}

  - name: unbind-ipvpn-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/unbind-ipvpn
    params: {vrf: Vrf_IRB}

  - name: verify-vrf-vni-cleared-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB
    expect:
      jq: '(.vni // "") == ""'

  # 3. Delete Vrf_IRB
  - name: delete-vrf-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vrf
    params: {name: Vrf_IRB}

  - name: delete-vrf-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/delete-vrf
    params: {name: Vrf_IRB}

  - name: verify-vrf-irb-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  - name: verify-vrf-irb-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  - name: verify-bgp-globals-vrf-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/Vrf_IRB/exists
    expect:
      jq: '.exists == false'

  # 4. Unbind MAC-VPN from VLAN 300
  - name: unbind-macvpn-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/unbind-macvpn
    params: {vlan_id: 300}

  - name: unbind-macvpn-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/unbind-macvpn
    params: {vlan_id: 300}

  - name: verify-tunnel-map-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50300_Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-tunnel-map-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI50300_Vlan300/exists
    expect:
      jq: '.exists == false'

  # 5. Remove VLAN members
  - name: unconfigure-bridged-sw1-eth8
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/unconfigure-interface

  - name: unconfigure-bridged-sw2-eth8
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/unconfigure-interface

  # 6. Delete VLAN 300
  - name: delete-vlan300-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 300}

  - name: delete-vlan300-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 300}

  - name: verify-vlan300-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == false'

  - name: verify-vlan300-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VLAN/Vlan300/exists
    expect:
      jq: '.exists == false'

  # 7. Remove cross-switch IPs from Ethernet4
  - name: unconfigure-eth1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/unconfigure-interface

  - name: unconfigure-eth1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/unconfigure-interface

  - name: verify-eth1-ip-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-eth1-ip-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == false'
