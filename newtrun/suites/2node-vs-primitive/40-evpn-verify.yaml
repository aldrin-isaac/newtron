name: evpn-verify
description: |
  EVPN overlay verification: confirm VTEP, NVO, and L2VPN EVPN address-family
  are present (created by setup-device) and that EVPN BGP sessions reach
  Established.

  sonic-vs frrcfgd workaround: setup-device wrote overlay BGP_NEIGHBOR entries
  to CONFIG_DB, but frrcfgd doesn't process runtime notifications. A BGP restart
  is needed so frrcfgd startup replay processes the overlay entries. The underlay
  restart in 30-bgp-underlay.yaml may have already replayed them, but we restart
  again as a safety measure to ensure overlay peers are processed. See RCA-044.
topology: 2node-vs
requires: [bgp-underlay]

steps:
  # Restart BGP so frrcfgd startup replay processes overlay BGP_NEIGHBOR entries.
  - name: restart-bgp-for-overlay
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/restart-daemon
    params: {daemon: bgp}

  - name: wait-bgp-instance-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: wait-bgp-instance-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: verify-vxlan-tunnel-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.1"'

  - name: verify-vxlan-tunnel-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.2"'

  - name: verify-vxlan-nvo-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1
    expect:
      jq: '.source_vtep == "vtep1"'

  - name: verify-bgp-l2vpn-af
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == true'

  - name: verify-bgp-evpn-switch1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  - name: verify-bgp-evpn-switch2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
