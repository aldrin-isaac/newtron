name: setup-device
description: |
  Baseline device setup using setup-device (intent-producing composite).
  Creates: DEVICE_METADATA, LOOPBACK_INTERFACE, BGP_GLOBALS, BGP_GLOBALS_AF,
  ROUTE_REDISTRIBUTE, VXLAN_TUNNEL, VXLAN_EVPN_NVO, and NEWTRON_INTENT/device.
  Reconcile after setup ensures the device matches the projection — clears
  any stale CONFIG_DB entries from previous test runs.
topology: 2node-vs
requires: [boot-ssh]

steps:
  # Reconcile before setup to align device CONFIG_DB with any existing intents.
  # Clears stale entries from previous test runs so the drift guard doesn't
  # block the subsequent setup-device writes.
  - name: reconcile-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/intent/reconcile
    params:
      execute: true

  - name: reconcile-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/intent/reconcile
    params:
      execute: true

  - name: wait-for-reconcile
    action: wait
    duration: 3s

  - name: setup-device-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/setup-device
    params:
      fields:
        hostname: switch1
        bgp_asn: "65001"
        type: LeafRouter
        hwsku: Force10-S6000
        docker_routing_config_mode: unified
        frr_mgmt_framework_config: "true"
      source_ip: "10.0.0.1"

  - name: setup-device-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/setup-device
    params:
      fields:
        hostname: switch2
        bgp_asn: "65002"
        type: LeafRouter
        hwsku: Force10-S6000
        docker_routing_config_mode: unified
        frr_mgmt_framework_config: "true"
      source_ip: "10.0.0.2"

  # Second reconcile after setup to deliver the new projection (with device
  # intent infrastructure) to the device. This ensures subsequent tests see
  # a clean CONFIG_DB matching the full projection.
  - name: reconcile-after-setup-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/intent/reconcile
    params:
      execute: true

  - name: reconcile-after-setup-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/intent/reconcile
    params:
      execute: true

  - name: wait-for-reconcile-after-setup
    action: wait
    duration: 3s

  # Verify baseline infrastructure created by setup-device
  - name: verify-loopback-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == true'

  - name: verify-loopback-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == true'

  - name: verify-device-metadata-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/DEVICE_METADATA/localhost
    expect:
      jq: '.bgp_asn == "65001"'

  - name: verify-bgp-globals-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001"'

  - name: verify-bgp-globals-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65002"'

  - name: verify-vxlan-tunnel-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.1"'

  - name: verify-vxlan-tunnel-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.2"'

  - name: verify-vxlan-nvo-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1
    expect:
      jq: '.source_vtep == "vtep1"'

  - name: verify-bgp-l2vpn-af-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == true'

  - name: verify-intent-device-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/device/exists
    expect:
      jq: '.exists == true'

  - name: verify-intent-device-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/device/exists
    expect:
      jq: '.exists == true'
