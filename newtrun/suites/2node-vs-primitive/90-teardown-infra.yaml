name: teardown-infra
description: |
  Tear down all infrastructure using deprovision primitives: EVPN overlay,
  underlay BGP neighbors, interface IPs, BGP globals, and loopback.
topology: 2node-vs
requires: [service-lifecycle]

steps:
  # 1. Teardown EVPN overlay
  - name: teardown-evpn-sw1
    action: teardown-evpn
    devices: [switch1]

  - name: teardown-evpn-sw2
    action: teardown-evpn
    devices: [switch2]

  - name: verify-vxlan-tunnel-removed
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_TUNNEL
    key: vtep1
    expect:
      exists: false

  - name: verify-vxlan-nvo-removed
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_EVPN_NVO
    key: nvo1
    expect:
      exists: false

  - name: verify-bgp-l2vpn-af-removed
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS_AF
    key: "default|l2vpn_evpn"
    expect:
      exists: false

  # 2. Remove underlay BGP neighbors
  - name: bgp-remove-neighbor-sw1
    action: bgp-remove-neighbor
    devices: [switch1]
    params:
      neighbor_ip: "10.1.0.1"

  - name: bgp-remove-neighbor-sw2
    action: bgp-remove-neighbor
    devices: [switch2]
    params:
      neighbor_ip: "10.1.0.0"

  - name: verify-underlay-neighbor-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: BGP_NEIGHBOR
    key: "default|10.1.0.1"
    expect:
      exists: false

  - name: verify-underlay-neighbor-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: BGP_NEIGHBOR
    key: "default|10.1.0.0"
    expect:
      exists: false

  # 3. Remove underlay IPs from Ethernet0
  - name: remove-ip-eth0-sw1
    action: remove-ip
    devices: [switch1]
    interface: Ethernet0
    params:
      ip: "10.1.0.0/31"

  - name: remove-ip-eth0-sw2
    action: remove-ip
    devices: [switch2]
    interface: Ethernet0
    params:
      ip: "10.1.0.1/31"

  - name: verify-eth0-ip-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: INTERFACE
    key: "Ethernet0|10.1.0.0/31"
    expect:
      exists: false

  - name: verify-eth0-ip-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: INTERFACE
    key: "Ethernet0|10.1.0.1/31"
    expect:
      exists: false

  # 4. Remove BGP globals
  - name: remove-bgp-globals-sw1
    action: remove-bgp-globals
    devices: [switch1]

  - name: remove-bgp-globals-sw2
    action: remove-bgp-globals
    devices: [switch2]

  - name: verify-bgp-globals-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS
    key: default
    expect:
      exists: false

  - name: verify-bgp-globals-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: BGP_GLOBALS
    key: default
    expect:
      exists: false

  - name: verify-bgp-af-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS_AF
    key: "default|ipv4_unicast"
    expect:
      exists: false

  - name: verify-route-redistribute-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: ROUTE_REDISTRIBUTE
    key: "default|connected|bgp|ipv4"
    expect:
      exists: false

  # 5. Remove loopback
  - name: remove-loopback-sw1
    action: remove-loopback
    devices: [switch1]

  - name: remove-loopback-sw2
    action: remove-loopback
    devices: [switch2]

  - name: verify-loopback-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: LOOPBACK_INTERFACE
    key: "Loopback0"
    expect:
      exists: false

  - name: verify-loopback-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: LOOPBACK_INTERFACE
    key: "Loopback0"
    expect:
      exists: false
