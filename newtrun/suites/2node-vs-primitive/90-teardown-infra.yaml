name: teardown-infra
description: |
  Tear down infrastructure. Granular reverse operations handle per-interface
  config (BGP neighbors, interface IPs). Baseline infrastructure (setup-device)
  has no individual reverse — its collective reverse is reprovision
  (CompositeOverwrite), not config reload.
topology: 2node-vs
requires: [service-lifecycle]

steps:
  # 1. Remove underlay BGP neighbors (valid individual reverse)
  - name: bgp-remove-neighbor-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-peer
    params: {ip: "10.1.0.1"}

  - name: bgp-remove-neighbor-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-bgp-peer
    params: {ip: "10.1.0.0"}

  - name: verify-underlay-neighbor-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  - name: verify-underlay-neighbor-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == false'

  # 2. Remove underlay IPs from Ethernet0 (valid individual reverse)
  - name: unconfigure-eth0-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/unconfigure-interface

  - name: unconfigure-eth0-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/unconfigure-interface

  - name: verify-eth0-ip-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-eth0-ip-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == false'

  # 3. Verify no interface-level intent records remain for Ethernet0
  - name: verify-eth0-intent-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  - name: verify-eth0-intent-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  # Note: Baseline infrastructure (loopback, BGP globals, VTEP) from
  # setup-device persists — it has no individual reverse per CLAUDE.md.
  # Its collective reverse is reprovision (CompositeOverwrite).
