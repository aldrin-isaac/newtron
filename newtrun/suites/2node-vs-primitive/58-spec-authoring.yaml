name: spec-authoring
description: |
  Tests network-level spec authoring API: prefix list CRUD, route policy CRUD,
  service creation with routing referencing those objects, apply/remove on device,
  and full teardown in reverse dependency order.
topology: 2node-vs
requires: [boot-ssh]

steps:
  # --- Prefix list lifecycle ---
  - name: create-prefix-list
    action: newtron
    method: POST
    url: /prefix-list
    params:
      name: test-prefixes
      prefixes:
        - "10.100.0.0/16"

  - name: add-prefix-entry
    action: newtron
    method: POST
    url: /prefix-list/test-prefixes/entry
    params:
      prefix_list: test-prefixes
      prefix: "10.200.0.0/16"

  - name: create-route-policy
    action: newtron
    method: POST
    url: /route-policy
    params:
      name: test-import-policy
      description: "Import policy for spec-authoring test"

  - name: add-policy-rule-10
    action: newtron
    method: POST
    url: /route-policy/test-import-policy/rule
    params:
      policy: test-import-policy
      seq: 10
      action: permit
      prefix_list: test-prefixes
      set:
        local_pref: 200

  - name: add-policy-rule-20
    action: newtron
    method: POST
    url: /route-policy/test-import-policy/rule
    params:
      policy: test-import-policy
      seq: 20
      action: deny

  # --- Create service referencing the route policy ---
  - name: create-test-service
    action: newtron
    method: POST
    url: /service
    params:
      name: test-routed-svc
      type: routed
      description: "Routed service with import policy"
      routing:
        protocol: bgp
        peer_as: "65099"
        import_policy: test-import-policy

  # --- Apply service on switch1:Ethernet40 (unwired, config-only) ---
  - name: apply-service
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/apply-service
    params:
      service: test-routed-svc
      ip_address: "10.99.0.0/31"
      peer_as: 65099

  - name: wait-for-apply
    action: wait
    duration: 3s

  - name: verify-interface-configured
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet40%7C10.99.0.0%2F31/exists
    expect:
      jq: '.exists == true'

  - name: verify-bgp-neighbor
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.99.0.1
    expect:
      jq: '.asn == "65099"'

  - name: verify-route-map-created
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ROUTE_MAP
    expect:
      jq: 'length >= 1'

  - name: verify-prefix-set-created
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PREFIX_SET
    expect:
      jq: 'length >= 1'

  # --- Teardown: remove service, delete service, delete policy, delete prefix list ---
  - name: remove-service
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/remove-service

  - name: wait-for-remove
    action: wait
    duration: 3s

  - name: verify-interface-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet40%7C10.99.0.0%2F31/exists
    expect:
      jq: '.exists == false'

  - name: verify-bgp-neighbor-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.99.0.1/exists
    expect:
      jq: '.exists == false'

  - name: verify-route-map-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ROUTE_MAP
    expect:
      jq: 'length == 0'

  - name: verify-prefix-set-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PREFIX_SET
    expect:
      jq: 'length == 0'

  - name: verify-peer-group-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_PEER_GROUP
    expect:
      jq: 'length == 0'

  # --- Teardown specs in reverse dependency order ---
  - name: delete-test-service
    action: newtron
    method: DELETE
    url: /service/test-routed-svc

  - name: remove-policy-rule-20
    action: newtron
    method: DELETE
    url: /route-policy/test-import-policy/rule/20

  - name: remove-policy-rule-10
    action: newtron
    method: DELETE
    url: /route-policy/test-import-policy/rule/10

  - name: delete-route-policy
    action: newtron
    method: DELETE
    url: /route-policy/test-import-policy

  - name: remove-prefix-entry
    action: newtron
    method: DELETE
    url: /prefix-list/test-prefixes/entry/10.200.0.0/16

  - name: delete-prefix-list
    action: newtron
    method: DELETE
    url: /prefix-list/test-prefixes
