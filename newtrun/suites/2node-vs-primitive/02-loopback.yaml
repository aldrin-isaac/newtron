name: loopback
description: Configure Loopback0 IP on both switches using configure-loopback primitive.
topology: 2node-vs
requires: [boot-ssh]

steps:
  - name: configure-loopback
    action: newtron
    devices: all
    method: POST
    url: /node/{{device}}/configure-loopback

  - name: verify-loopback-switch1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == true'

  - name: verify-loopback-switch2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == true'
