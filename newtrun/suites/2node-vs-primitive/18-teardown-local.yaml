name: teardown-local
description: |
  Reverse teardown of local primitives (Phase 2) using newtron primitives.
  Removes SVI, VLAN members, VLAN, interface IPs, VRF interface binding, and VRF
  in reverse order of setup. Frees Ethernet4/Ethernet12 on sw1 and Ethernet4 on sw2
  for reuse in cross-switch routing phase.
topology: 2node-vs
requires: [irb, static-route]

steps:
  # 1. Remove SVI from VLAN 100
  - name: remove-svi-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-svi
    params: {vlan_id: 100}

  - name: verify-svi-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  # 2. Remove VLAN members
  - name: remove-member-ethernet2
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-vlan-member
    params: {id: 100, interface: Ethernet8}

  - name: remove-member-ethernet3
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-vlan-member
    params: {id: 100, interface: Ethernet12}

  - name: remove-member-ethernet1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-vlan-member
    params: {id: 100, interface: Ethernet4}

  - name: verify-member-eth1-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # 3. Delete VLAN 100
  - name: delete-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 100}

  - name: verify-vlan100-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  # 4. Remove IP from sw2:Ethernet4
  - name: remove-ip-ethernet1
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-ip
    params: {ip: "10.20.1.1/31"}

  - name: verify-ip-removed
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == false'

  # 5. Unbind sw2:Ethernet4 from Vrf_local
  - name: remove-vrf-interface
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-vrf-interface
    params: {vrf: Vrf_local, interface: Ethernet4}

  # 6. Delete Vrf_local
  - name: delete-vrf-local
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/delete-vrf
    params: {name: Vrf_local}

  - name: verify-vrf-removed
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_local/exists
    expect:
      jq: '.exists == false'
