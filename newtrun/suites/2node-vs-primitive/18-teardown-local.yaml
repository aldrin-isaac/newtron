name: teardown-local
description: |
  Reverse teardown of local primitives (Phase 2) using newtron primitives.
  Removes SVI, VLAN members, VLAN, interface IPs, VRF interface binding, and VRF
  in reverse order of setup. Frees Ethernet4/Ethernet12 on sw1 and Ethernet4 on sw2
  for reuse in cross-switch routing phase.
topology: 2node-vs
requires: [irb, static-route]

steps:
  # 1. Remove SVI from VLAN 100
  - name: remove-svi-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/unconfigure-irb
    params: {vlan_id: 100}

  - name: verify-svi-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  # 2. Remove VLAN members
  - name: unconfigure-bridged-ethernet8
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/unconfigure-interface

  - name: unconfigure-bridged-ethernet12
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/unconfigure-interface

  - name: unconfigure-bridged-ethernet4
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/unconfigure-interface

  - name: verify-member-eth1-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_MEMBER/Vlan100%7CEthernet4/exists
    expect:
      jq: '.exists == false'

  # 3. Delete VLAN 100
  - name: delete-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-vlan
    params: {id: 100}

  - name: verify-vlan100-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  # 4. Unconfigure sw2:Ethernet4 (removes IP + VRF binding via intent)
  - name: unconfigure-ethernet4
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/unconfigure-interface

  - name: verify-ip-removed
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == false'

  # 6. Delete Vrf_local
  - name: delete-vrf-local
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/delete-vrf
    params: {name: Vrf_local}

  - name: verify-vrf-removed
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_local/exists
    expect:
      jq: '.exists == false'
