name: acl-lifecycle
description: |
  Self-contained ACL lifecycle on sw1:Ethernet40 (config-only, no host wired).
  Tests create-acl-table, add-acl-rule, bind-acl, unbind-acl, delete-acl-rule,
  and delete-acl-table primitives with full CONFIG_DB verification.
topology: 2node-vs
requires: [boot-ssh]

steps:
  - name: create-acl-table
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/acl
    params:
      name: TEST_ACL
      type: L3
      stage: ingress

  - name: verify-acl-table-created
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_TABLE/TEST_ACL/exists
    expect:
      jq: '.exists == true'

  - name: add-acl-rule-10
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/acl/TEST_ACL/rule
    params:
      rule_name: RULE_10
      action: FORWARD
      priority: 10
      src_ip: "10.0.0.0/8"

  - name: verify-acl-rule-10
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_RULE/TEST_ACL%7CRULE_10
    expect:
      jq: '.PACKET_ACTION == "FORWARD" and .PRIORITY == "10" and .SRC_IP == "10.0.0.0/8"'

  - name: add-acl-rule-20
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/acl/TEST_ACL/rule
    params:
      rule_name: RULE_20
      action: DROP
      priority: 20
      dst_ip: "192.168.0.0/16"

  - name: verify-acl-rule-20
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_RULE/TEST_ACL%7CRULE_20
    expect:
      jq: '.PACKET_ACTION == "DROP" and .PRIORITY == "20"'

  - name: bind-acl-ethernet10
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/bind-acl
    params: {acl: TEST_ACL, direction: ingress}

  - name: verify-acl-bound
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_TABLE/TEST_ACL
    expect:
      jq: '.ports == "Ethernet40"'

  - name: unbind-acl-ethernet10
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/unbind-acl
    params: {acl: TEST_ACL}

  - name: delete-acl-rule-20
    action: newtron
    devices: [switch1]
    method: DELETE
    url: /node/{{device}}/acl/TEST_ACL/rule/RULE_20

  - name: verify-rule-20-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_RULE/TEST_ACL%7CRULE_20/exists
    expect:
      jq: '.exists == false'

  - name: delete-acl-rule-10
    action: newtron
    devices: [switch1]
    method: DELETE
    url: /node/{{device}}/acl/TEST_ACL/rule/RULE_10

  - name: verify-rule-10-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_RULE/TEST_ACL%7CRULE_10/exists
    expect:
      jq: '.exists == false'

  - name: delete-acl-table
    action: newtron
    devices: [switch1]
    method: DELETE
    url: /node/{{device}}/acl/TEST_ACL

  - name: verify-acl-table-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/ACL_TABLE/TEST_ACL/exists
    expect:
      jq: '.exists == false'
