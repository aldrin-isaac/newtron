name: interface-props
description: |
  Self-contained interface property lifecycle on sw1:Ethernet40 (CiscoVS has 32 ports,
  Ethernet40 exists but has no host wired). Tests mtu, admin_status, and description
  set/verify primitives.
topology: 2node-vs
requires: [boot-ssh]

steps:
  - name: set-mtu-9100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set
    params: {property: mtu, value: "9100"}

  - name: verify-mtu
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.mtu == "9100"'

  - name: set-admin-down
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set
    params: {property: admin_status, value: down}

  - name: verify-admin-down
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.admin_status == "down"'

  - name: set-admin-up
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set
    params: {property: admin_status, value: up}

  - name: verify-admin-up
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.admin_status == "up"'

  - name: set-description
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set
    params: {property: description, value: "test-interface-props"}

  - name: verify-description
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.description == "test-interface-props"'
