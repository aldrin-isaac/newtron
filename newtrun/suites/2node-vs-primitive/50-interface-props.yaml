name: interface-props
description: |
  Self-contained interface property lifecycle on sw1:Ethernet40.
  Tests mtu, admin_status, and description set/verify primitives.
  ConfigureInterface creates the interface intent anchor that property
  sub-resources attach to (I4 enforcement).
topology: 2node-vs
requires: [setup-device]

steps:
  # Create interface intent anchor (parent for property sub-resources)
  - name: configure-ethernet40
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/configure-interface

  - name: set-mtu-9100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set-property
    params: {property: mtu, value: "9100"}

  - name: verify-mtu
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.mtu == "9100"'

  - name: set-admin-down
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set-property
    params: {property: admin_status, value: down}

  - name: verify-admin-down
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.admin_status == "down"'

  - name: set-admin-up
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set-property
    params: {property: admin_status, value: up}

  - name: verify-admin-up
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.admin_status == "up"'

  - name: set-description
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/set-property
    params: {property: description, value: "test-interface-props"}

  - name: verify-description
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORT/Ethernet40
    expect:
      jq: '.description == "test-interface-props"'

  # Cleanup: clear sub-resource intents, then unconfigure interface
  - name: clear-mtu
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/clear-property
    params: {property: mtu}

  - name: clear-description
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/clear-property
    params: {property: description}

  - name: unconfigure-ethernet40
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet40/unconfigure-interface
