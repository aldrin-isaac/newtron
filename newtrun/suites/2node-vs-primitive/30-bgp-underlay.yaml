name: bgp-underlay
description: |
  BGP underlay bringup: configure BGP globals, set Ethernet0 IPs, add eBGP
  neighbors across the inter-switch link, and verify Established.
  Builds on loopback (Loopback0 IPs already set).

  Dependency ordering (sonic-vs frrcfgd workaround):
    1. Write BGP_GLOBALS and DEVICE_METADATA.bgp_asn.
    2. Set INTERFACE IPs on Ethernet0; poll for kernel IP (intfmgrd assignment).
    3. Write BGP_NEIGHBOR — BEFORE restart, so frrcfgd startup replay processes it.
    4. restart-bgp — frrcfgd replays all CONFIG_DB entries (BGP_GLOBALS + BGP_NEIGHBOR).
    5. poll-bgp-instance — wait for 'router bgp NNNNN' in show running-config.
    6. verify-bgp — poll until Established.

  Note: sonic-vs frrcfgd (unified mode) does not process runtime CONFIG_DB
  notifications — only startup replay works. All BGP entries must be in
  CONFIG_DB before the BGP restart. CiscoVS bgpcfgd (split mode) handles
  runtime notifications, so the CiscoVS suite can write BGP_NEIGHBOR after
  restart. See RCA-044 for details.
topology: 2node-vs
requires: [loopback]

steps:
  # Step 1: Write BGP_GLOBALS + DEVICE_METADATA.bgp_asn.
  - name: configure-bgp-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/configure-bgp

  - name: configure-bgp-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/configure-bgp

  - name: verify-bgp-globals-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001"'

  - name: verify-bgp-globals-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65002"'

  # Step 2: Set inter-switch link IPs on Ethernet0.
  - name: configure-eth0-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/configure-interface
    params: {ip: "10.1.0.0/31"}

  - name: configure-eth0-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/configure-interface
    params: {ip: "10.1.0.1/31"}

  - name: verify-ip-eth0-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == true'

  # Step 3: Poll for Ethernet0 IP in kernel on BOTH switches.
  - name: wait-eth0-ip-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show Ethernet0"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | contains("10.1.0.0")'

  - name: wait-eth0-ip-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show Ethernet0"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | contains("10.1.0.1")'

  # Step 4: Write BGP_NEIGHBOR BEFORE restart (frrcfgd startup replay workaround).
  - name: bgp-add-neighbor-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/add-bgp-peer
    params: {remote_as: 65002}

  - name: bgp-add-neighbor-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/add-bgp-peer
    params: {remote_as: 65001}

  - name: verify-bgp-neighbor-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == true'

  - name: verify-bgp-neighbor-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == true'

  # Step 5: Restart BGP — frrcfgd replays BGP_GLOBALS + BGP_NEIGHBOR from CONFIG_DB.
  - name: restart-bgp
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/restart-daemon
    params: {daemon: bgp}

  # Step 6: Poll for 'router bgp' in FRR running-config.
  - name: wait-bgp-instance-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: wait-bgp-instance-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  # Step 7: Verify underlay BGP sessions reach Established.
  - name: verify-bgp-underlay-switch1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  - name: verify-bgp-underlay-switch2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
