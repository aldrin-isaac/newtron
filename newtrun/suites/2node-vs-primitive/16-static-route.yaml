name: static-route
description: |
  Self-contained static route lifecycle: add a static route to Vrf_local,
  verify CONFIG_DB entry, then remove it and verify removal.
requires: [routed]

steps:
  - name: add-static-route
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/add-static-route
    params:
      vrf: Vrf_local
      prefix: "10.99.0.0/24"
      nexthop: "10.20.1.0"

  - name: verify-static-route-added
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/STATIC_ROUTE/Vrf_local%7C10.99.0.0%2F24
    expect:
      jq: '.nexthop == "10.20.1.0"'

  - name: remove-static-route
    action: newtron
    devices: [switch2]
    method: POST
    url: /nodes/{{device}}/remove-static-route
    params: {vrf: Vrf_local, prefix: "10.99.0.0/24"}

  - name: verify-static-route-removed
    action: newtron
    devices: [switch2]
    url: /nodes/{{device}}/configdb/STATIC_ROUTE/Vrf_local%7C10.99.0.0%2F24/exists
    expect:
      jq: '.exists == false'
