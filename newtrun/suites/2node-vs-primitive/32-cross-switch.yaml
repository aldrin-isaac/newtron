name: cross-switch
description: |
  Cross-switch L3 routing: assign IPs on sw1:Ethernet4 and sw2:Ethernet4 in
  the default VRF, verify BGP distributes connected routes, and test host-to-host
  reachability via routed path (host1 ↔ host4 across two switches).
  Requires teardown-local (frees Ethernet4 on both switches) and bgp-underlay.
topology: 2node-vs
requires: [teardown-local, bgp-underlay]

steps:
  - name: configure-eth1-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/configure-interface
    params: {ip: "10.20.0.1/31"}

  - name: configure-eth1-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/configure-interface
    params: {ip: "10.20.1.1/31"}

  - name: verify-ip-sw1-eth1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.0.1%2F31/exists
    expect:
      jq: '.exists == true'

  - name: verify-ip-sw2-eth1
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet4%7C10.20.1.1%2F31/exists
    expect:
      jq: '.exists == true'

  # Poll for kernel IPs (90s)
  - name: wait-eth1-ip-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show Ethernet4"}
    poll:
      timeout: 90s
      interval: 5s
    expect:
      jq: '.output | contains("10.20.0.1")'

  - name: wait-eth1-ip-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show Ethernet4"}
    poll:
      timeout: 90s
      interval: 5s
    expect:
      jq: '.output | contains("10.20.1.1")'

  # Verify BGP distributes connected routes (60s timeout)
  - name: verify-route-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/route/default/10.20.1.0/31
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.protocol == "bgp"'

  - name: verify-route-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/route/default/10.20.0.0/31
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.protocol == "bgp"'

  # Configure host IPs (before prime — hosts must have IPs for ARP to succeed)
  - name: host1-configure-ip
    action: host-exec
    devices: [host1]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 10.20.0.0/31 dev eth0; ip route add default via 10.20.0.1 dev eth0 2>/dev/null || true"

  - name: host4-configure-ip
    action: host-exec
    devices: [host4]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 10.20.1.0/31 dev eth0; ip route add default via 10.20.1.1 dev eth0 2>/dev/null || true"

  # Prime NGDP ARP
  - name: prime-arp-sw1-eth1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Ethernet4 10.20.0.0"}
    poll:
      timeout: 30s
      interval: 5s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-sw2-eth1
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Ethernet4 10.20.1.0"}
    poll:
      timeout: 30s
      interval: 5s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 3s

  # Host-to-host dataplane
  - name: host1-ping-host4
    action: host-exec
    devices: [host1]
    command: "ping -c 5 -W 2 10.20.1.0"
    expect:
      success_rate: 0.8

  - name: host4-ping-host1
    action: host-exec
    devices: [host4]
    command: "ping -c 5 -W 2 10.20.0.0"
    expect:
      success_rate: 0.8
