name: portchannel
description: |
  PortChannel lifecycle + dataplane: create PortChannel1 on both switches using
  Ethernet16+Ethernet20, assign IPs, add static routes to redirect host1↔host4
  traffic through the PortChannel, verify reachability, then clean up.
topology: 2node-vs
requires: [cross-switch]

steps:
  # 1. Create PortChannel on both switches
  - name: create-portchannel1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/create-portchannel
    params: {name: PortChannel1}

  - name: create-portchannel1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/create-portchannel
    params: {name: PortChannel1}

  # 2. Add members
  - name: add-member-eth4-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/add-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet16}

  - name: add-member-eth5-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/add-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet20}

  - name: add-member-eth4-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/add-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet16}

  - name: add-member-eth5-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/add-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet20}

  # 3. Verify CONFIG_DB entries
  - name: verify-portchannel-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == true'

  - name: verify-portchannel-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth4-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet16/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth5-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet20/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth4-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet16/exists
    expect:
      jq: '.exists == true'

  - name: verify-member-eth5-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL_MEMBER/PortChannel1%7CEthernet20/exists
    expect:
      jq: '.exists == true'

  # 4. Set IPs on PortChannel1
  - name: set-ip-portchannel1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/PortChannel1/set-ip
    params: {ip: "10.30.0.0/31"}

  - name: set-ip-portchannel1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/PortChannel1/set-ip
    params: {ip: "10.30.0.1/31"}

  # 5. Wait for kernel IPs
  - name: wait-portchannel1-ip-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show PortChannel1"}
    poll:
      timeout: 90s
      interval: 5s
    expect:
      jq: '.output | contains("10.30.0.0")'

  - name: wait-portchannel1-ip-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip addr show PortChannel1"}
    poll:
      timeout: 90s
      interval: 5s
    expect:
      jq: '.output | contains("10.30.0.1")'

  # 6. Prime ARP
  - name: prime-arp-portchannel1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I PortChannel1 10.30.0.1"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: prime-arp-portchannel1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I PortChannel1 10.30.0.0"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 3s

  # 7. Add static routes (AD=1 overrides BGP AD=20)
  - name: add-static-route-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/add-static-route
    params: {vrf: default, prefix: "10.20.1.0/31", nexthop: "10.30.0.1"}

  - name: add-static-route-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/add-static-route
    params: {vrf: default, prefix: "10.20.0.0/31", nexthop: "10.30.0.0"}

  - name: wait-routes-install
    action: wait
    duration: 5s

  # 8. Host-to-host ping through PortChannel
  - name: host1-ping-host4-via-portchannel
    action: host-exec
    devices: [host1]
    command: "ping -c 5 -W 2 10.20.1.0"
    expect:
      success_rate: 0.8

  - name: host4-ping-host1-via-portchannel
    action: host-exec
    devices: [host4]
    command: "ping -c 5 -W 2 10.20.0.0"
    expect:
      success_rate: 0.8

  # 9. Cleanup
  - name: remove-static-route-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-static-route
    params: {vrf: default, prefix: "10.20.1.0/31"}

  - name: remove-static-route-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-static-route
    params: {vrf: default, prefix: "10.20.0.0/31"}

  - name: remove-ip-portchannel1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/PortChannel1/remove-ip
    params: {ip: "10.30.0.0/31"}

  - name: remove-ip-portchannel1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/PortChannel1/remove-ip
    params: {ip: "10.30.0.1/31"}

  - name: remove-member-eth5-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet20}

  - name: remove-member-eth4-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/remove-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet16}

  - name: remove-member-eth5-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet20}

  - name: remove-member-eth4-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/remove-portchannel-member
    params: {portchannel: PortChannel1, interface: Ethernet16}

  - name: delete-portchannel1-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/delete-portchannel
    params: {name: PortChannel1}

  - name: delete-portchannel1-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/delete-portchannel
    params: {name: PortChannel1}

  # 10. Verify cleanup
  - name: verify-portchannel-removed-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == false'

  - name: verify-portchannel-removed-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/PORTCHANNEL/PortChannel1/exists
    expect:
      jq: '.exists == false'
