name: irb
description: |
  Integrated Routing and Bridging on switch1: configure SVI for VLAN 100
  (created by bridged) in global routing table, verify host1 can ping
  the gateway IP. Demonstrates L3 termination on a bridged VLAN.
topology: 2node-vs
requires: [bridged]

steps:
  - name: configure-svi-vlan100
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/svi
    params:
      vlan_id: 100
      ip_address: "10.100.1.1/24"

  - name: verify-vlan-interface-exists
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == true'

  - name: verify-svi-ip
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100%7C10.100.1.1%2F24/exists
    expect:
      jq: '.exists == true'

  - name: wait-svi-ready
    action: wait
    duration: 15s

  - name: prime-ngdp-arp-svi
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Vlan100 10.100.1.2"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 3s

  - name: host1-add-irb-ip
    action: host-exec
    devices: [host1]
    command: "ip addr add 10.100.1.2/24 dev eth0 2>/dev/null || true"

  - name: host1-ping-svi
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 10.100.1.1"
    expect:
      success_rate: 0.8
