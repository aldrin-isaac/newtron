name: evpn-setup
description: |
  EVPN overlay bringup: create VTEP, NVO, and loopback BGP neighbors with
  L2VPN EVPN address-family. Verify CONFIG_DB and EVPN BGP sessions reach
  Established.

  sonic-vs frrcfgd workaround: overlay BGP_NEIGHBOR entries are written to
  CONFIG_DB, then BGP is restarted so frrcfgd startup replay programs them
  into FRR. See RCA-044.
topology: 2node-vs
requires: [bgp-underlay]

steps:
  - name: setup-evpn-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/setup-evpn

  - name: setup-evpn-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/setup-evpn

  # Restart BGP so frrcfgd startup replay processes overlay BGP_NEIGHBOR entries.
  - name: restart-bgp-for-overlay
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/restart-service
    params: {service: bgp}

  - name: wait-bgp-instance-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: wait-bgp-instance-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: verify-vxlan-tunnel-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.1"'

  - name: verify-vxlan-tunnel-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.2"'

  - name: verify-vxlan-nvo-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1
    expect:
      jq: '.source_vtep == "vtep1"'

  - name: verify-bgp-l2vpn-af
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == true'

  - name: verify-bgp-evpn-switch1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  - name: verify-bgp-evpn-switch2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
