name: rollout-admin-status
description: |
  Parameterized rollout: set admin_status on every IP-bearing interface
  across both leaves, then verify each one took. Exercises the
  scenario-as-template shape — same step list, expanded across the
  cross-product of (devices × interfaces) drawn from the suite's
  targets block, with admin_status taken from the suite's parameters
  block (default "up", overridable per run via the POST /api/runs
  request body's parameters field).

  The IP-bearing interfaces (Ethernet0 transit, Ethernet4 local-irb)
  are listed at the suite level rather than discovered. Discovery
  would belong in a setup step that synthesizes the targets block —
  out of scope for this suite, in scope for newtrun's roadmap.

  Depends on verify-health: the set-property write fails if the
  device's interface intent records don't yet exist, so the rollout
  has to run after provisioning completes.

  Reversed by clear-admin-status at the end of the scenario per §15
  (Operational Symmetry) — without it the property intent persists
  as a child of the interface intent and deprovision can't tear the
  interface down.

requires: [verify-health]

steps:
  - name: set-admin-status
    action: newtron
    method: POST
    url: /nodes/{{target.device}}/interfaces/{{target.interface}}/set-property
    params:
      property: admin_status
      value: "{{param.admin_status}}"

  - name: verify-admin-status
    action: newtron
    method: GET
    url: /nodes/{{target.device}}/interfaces/{{target.interface}}
    expect:
      # No quotes around {{param.admin_status}} — the template engine
      # emits the value as a JQ-safe JSON-quoted form, so the
      # expanded expression reads `.admin_status == "up"`.
      jq: .admin_status == {{param.admin_status}}

  - name: clear-admin-status
    action: newtron
    method: POST
    url: /nodes/{{target.device}}/interfaces/{{target.interface}}/clear-property
    params:
      property: admin_status
