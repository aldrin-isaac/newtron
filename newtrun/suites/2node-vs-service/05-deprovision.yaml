name: deprovision
description: |
  Deprovision all services and infrastructure from both switches.
  Uses symmetric reverse actions for every forward action in the provisioner:
    ApplyService   → RemoveService    (per-interface, reverse dependency order)
    SetupEVPN      → TeardownEVPN     (VTEP, NVO, overlay peers)
    ConfigureBGP   → RemoveBGP (BGP globals, AF, redistribution)
    ConfigureLoopback → RemoveLoopback (loopback interface)
  Validates the "no config leak" principle: every CONFIG_DB entry written
  by a forward action is removed by its corresponding reverse action.
topology: 2node-vs-service
requires: [provision]
after: [dataplane]

steps:
  # =========================================================================
  # Reverse of ApplyService — per-interface, reverse dependency order
  # Forward:  iface.ApplyService(ctx, serviceName, opts)
  # Reverse:  iface.RemoveService(ctx)
  # =========================================================================

  # Remove EVPN overlay services first (have VXLAN dependencies)
  - name: remove-overlay-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-overlay-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-l2-extend-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  - name: remove-l2-extend-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  # Remove local services
  - name: remove-local-bridge-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-bridge-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  - name: remove-local-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  # Remove transit (underlay BGP) last
  - name: remove-transit-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  # =========================================================================
  # Reverse of SetupEVPN — VTEP, NVO, overlay peers
  # Forward:  node.SetupEVPN(ctx, loopbackIP)
  # Reverse:  node.TeardownEVPN(ctx)
  # =========================================================================

  - name: teardown-vtep
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/teardown-vtep

  # =========================================================================
  # Reverse of ConfigureBGP — BGP globals, AF, redistribution
  # Forward:  node.ConfigureBGP(ctx)
  # Reverse:  node.RemoveBGP(ctx)
  # =========================================================================

  - name: remove-bgp
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/remove-bgp

  # =========================================================================
  # Reverse of ConfigureLoopback — loopback interface
  # Forward:  node.ConfigureLoopback(ctx)
  # Reverse:  node.RemoveLoopback(ctx)
  # =========================================================================

  - name: remove-loopback
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/remove-loopback
