name: deprovision
description: |
  Deprovision all services and infrastructure from both switches.
  Services are removed with individual reverse actions (RemoveService per interface).
  Baseline infrastructure (setup-device) has no individual reverse — config reload
  restores CONFIG_DB to saved defaults, wiping loopback, BGP, and VTEP config.
topology: 2node-vs-service
requires: [provision]
after: [dataplane]

steps:
  # =========================================================================
  # Reverse of ApplyService — per-interface, reverse dependency order
  # Forward:  iface.ApplyService(ctx, serviceName, opts)
  # Reverse:  iface.RemoveService(ctx)
  # =========================================================================

  # Remove EVPN overlay services first (have VXLAN dependencies)
  - name: remove-overlay-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-overlay-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-l2-extend-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  - name: remove-l2-extend-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  # Remove local services
  - name: remove-local-bridge-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-bridge-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-irb-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  - name: remove-local-irb-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  # Remove transit (underlay BGP) last
  - name: remove-transit-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  # Baseline infrastructure (setup-device) has no individual reverse.
  # Reprovisioning (CompositeOverwrite) is the collective reverse.
  # config reload restores saved state (not factory) since every API write
  # calls config save — it cannot clean up baseline infrastructure.
