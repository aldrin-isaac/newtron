name: provision
description: |
  Provision both switches via topology provisioner, then restart BGP so
  frrcfgd startup replay processes all CONFIG_DB entries (RCA-045: sonic-vs
  frrcfgd runtime notifications are broken — only startup replay works).

  config reload is attempted first (handles vrfmgrd VRF_TABLE propagation),
  but may be skipped if SwSS isn't ready. The explicit BGP restart ensures
  frrcfgd processes BGP_GLOBALS and BGP_NEIGHBOR entries regardless.
topology: 2node-vs-service
requires: [boot-ssh]

steps:
  - name: provision-switches
    action: provision
    devices: [switch1, switch2]

  # config reload stops all daemons, re-reads config_db.json, restarts them.
  # May be skipped on sonic-vs if SwSS isn't ready within timeout.
  - name: reload-config
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/reload-config

  # Explicit BGP restart ensures frrcfgd startup replay processes all
  # BGP entries. Required on sonic-vs because:
  # 1. config reload may be skipped (SwSS not ready)
  # 2. frrcfgd runtime notifications are broken (RCA-045)
  - name: restart-bgp
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/restart-daemon
    params: {daemon: bgp}

  # Wait for FRR to fully restart after BGP service restart.
  - name: wait-bgp-instance
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  # BGP convergence gate — wait for all sessions to establish before
  # proceeding to health check and dataplane tests.
  - name: verify-bgp
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
