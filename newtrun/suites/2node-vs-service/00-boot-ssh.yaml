name: boot-ssh
description: |
  Verify SSH reachability and SwSS readiness on both switches, then
  verify all hosts. SwSS must be running before any SONiC operation
  (config reload, provision) can succeed.
topology: 2node-vs-service

steps:
  - name: ssh-echo-switch1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "echo ok"}
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: '.output | contains("ok")'

  - name: ssh-echo-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "echo ok"}
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: '.output | contains("ok")'

  # SwSS must be active for 120+ seconds before config-reload will succeed.
  # SONiC's _swss_ready() checks ActiveEnterTimestampMonotonic and rejects
  # if uptime < 120s. On fresh boot, this means ~4 minutes after power-on.
  - name: swss-ready
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params:
      command: >-
        up=$(systemctl show swss.service --property=ActiveEnterTimestampMonotonic --value);
        now=$(cat /proc/uptime | awk '{printf "%.0f", $1 * 1000000}');
        elapsed=$(( (now - up) / 1000000 ));
        [ "$elapsed" -ge 120 ] && echo "swss ready (${elapsed}s uptime)" || echo "swss not ready (${elapsed}s < 120s)"
    poll:
      timeout: 300s
      interval: 10s
    expect:
      jq: '.output | contains("swss ready")'

  - name: host1-echo
    action: host-exec
    devices: [host1]
    command: "echo ok"
    expect:
      contains: "ok"

  - name: host2-echo
    action: host-exec
    devices: [host2]
    command: "echo ok"
    expect:
      contains: "ok"

  - name: host3-echo
    action: host-exec
    devices: [host3]
    command: "echo ok"
    expect:
      contains: "ok"

  - name: host4-echo
    action: host-exec
    devices: [host4]
    command: "echo ok"
    expect:
      contains: "ok"

  - name: host5-echo
    action: host-exec
    devices: [host5]
    command: "echo ok"
    expect:
      contains: "ok"

  - name: host6-echo
    action: host-exec
    devices: [host6]
    command: "echo ok"
    expect:
      contains: "ok"
