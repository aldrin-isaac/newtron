name: provision
description: |
  Provision all switches (spine + leaves), config-reload to activate CONFIG_DB
  changes (BGP ASN, loopback, underlay peers), and verify BGP convergence.
topology: 3node
requires: [boot-ssh]

steps:
  - name: provision-switches
    action: provision
    devices: [spine, leaf1, leaf2]

  - name: config-reload
    action: config-reload
    devices: [spine, leaf1, leaf2]

  - name: wait-reload
    action: wait
    duration: 45s

  - name: verify-bgp
    action: verify-bgp
    devices: [spine, leaf1, leaf2]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 5s
