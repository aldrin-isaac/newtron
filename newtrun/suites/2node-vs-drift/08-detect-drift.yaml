name: detect-drift
description: |
  After injecting CONFIG_DB changes on switch1, verify that topology drift
  detection correctly identifies the specific drifted entries.

  Key assertions:
    - switch1: 3 drift entries (1 missing, 1 extra, 1 modified)
    - switch2: zero drift entries (per-device, no cross-contamination)

  Uses ?mode=topology so the projection is built from topology.json.
  The injected CONFIG_DB changes diverge from what the topology declares.
topology: 2node-vs-service
requires: [inject-drift]

steps:
  # Assert: switch1 has exactly 3 drift entries (1 per category)
  - name: verify-drift-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift?mode=topology
    expect:
      jq: >-
        length == 3
        and ([.[] | select(.type == "missing")] | length) == 1
        and ([.[] | select(.type == "extra")] | length) == 1
        and ([.[] | select(.type == "modified")] | length) == 1

  # Assert: switch2 is still clean — per-device isolation
  - name: verify-drift-sw2-still-clean
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/intent/drift?mode=topology
    expect:
      jq: 'length == 0'
