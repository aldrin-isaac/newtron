name: reprovision
description: |
  Re-provision switch1 to remediate drift.
  Provisioning (CompositeOverwrite) is the canonical remediation — it replaces
  CONFIG_DB atomically with the abstract Node's generated state.

  After re-provisioning:
    - Missing entry (INTERFACE|Ethernet0|10.1.0.0/31) must be restored
    - Extra entry (VLAN|Vlan999) must be removed
    - Modified entry (BGP_GLOBALS local_asn) must be corrected
    - Drift detection must report clean
topology: 2node-vs-service
requires: [detect-drift]

steps:
  # Re-provision only switch1 (switch2 was never drifted)
  - name: reprovision-sw1
    action: provision
    devices: [switch1]

  - name: reload-config
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/reload-config

  - name: restart-bgp
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/restart-daemon
    params: {daemon: bgp}

  - name: wait-bgp-instance
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo vtysh -c 'show running-config'"}
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.output | contains("router bgp")'

  - name: verify-bgp
    action: newtron
    devices: [switch1, switch2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  # Verify the missing entry was restored
  - name: verify-restored-transit-ip
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == true'

  # Verify the extra VLAN was removed
  - name: verify-extra-removed
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan999/exists
    expect:
      jq: '.exists == false'

  # Verify the modified BGP ASN was corrected
  - name: verify-asn-corrected
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001"'

  # Final drift check: must be clean on both devices
  - name: verify-drift-clean-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/drift
    expect:
      jq: '.status == "clean" and (.missing | length) == 0 and (.extra | length) == 0 and (.modified | length) == 0'

  - name: verify-drift-clean-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/drift
    expect:
      jq: '.status == "clean"'
