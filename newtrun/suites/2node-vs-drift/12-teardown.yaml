name: teardown
description: |
  Standard teardown: remove services, then deprovision infrastructure.
  Follows the service topology's reverse dependency order.
topology: 2node-vs-service
requires: [reprovision]

steps:
  # Remove services in reverse dependency order
  - name: remove-overlay-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-overlay-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet16/remove-service

  - name: remove-l2-extend-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  - name: remove-l2-extend-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet12/remove-service

  - name: remove-local-bridge-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-bridge-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet8/remove-service

  - name: remove-local-irb-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  - name: remove-local-irb-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet4/remove-service

  - name: remove-transit-sw1
    action: newtron
    devices: [switch1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-sw2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: teardown-vtep
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/teardown-vtep

  - name: remove-bgp
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/remove-bgp

  - name: remove-loopback
    action: newtron
    devices: [switch1, switch2]
    method: POST
    url: /node/{{device}}/remove-loopback
