name: verify-clean
description: |
  After provisioning, verify that topology drift detection reports zero entries.
  This proves the topology projection matches the physical CONFIG_DB exactly.

  Uses ?mode=topology so the projection is built from topology.json, not from
  device intents. This tests: "does the device match what topology declares?"

  Also spot-checks specific CONFIG_DB entries to prove they exist independently.
topology: 2node-vs-service
requires: [provision]

steps:
  # Core thesis test: topology projection == physical CONFIG_DB.
  # Drift returns []DriftEntry — empty array means clean.
  - name: verify-drift-clean-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/intent/drift?mode=topology
    expect:
      jq: 'length == 0'

  - name: verify-drift-clean-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/intent/drift?mode=topology
    expect:
      jq: 'length == 0'

  # Spot-check specific CONFIG_DB entries to prove they exist.

  # BGP_GLOBALS must have the correct ASN from the profile
  - name: verify-bgp-globals-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001" and .router_id == "10.0.0.1"'

  - name: verify-bgp-globals-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65002" and .router_id == "10.0.0.2"'

  # Transit interface IP (the entry we'll delete in inject-drift)
  - name: verify-transit-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == true'

  - name: verify-transit-ip-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == true'

  # VLAN 100 from local-irb service (the topology provisions this)
  - name: verify-vlan100-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100
    expect:
      jq: '.vlanid == "100"'

  # VLAN 999 must NOT exist yet (we'll inject it as "extra" drift)
  - name: verify-no-vlan999-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan999/exists
    expect:
      jq: '.exists == false'
