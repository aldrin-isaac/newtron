name: verify-clean
description: |
  After provisioning, verify that drift detection reports a clean state.
  This proves the abstract Node reconstruction matches the physical CONFIG_DB.

  The test verifies more than just a "clean" status — it also confirms that
  specific provisioned entries actually exist on the device (proving the
  abstract Node generated them and the device has them).
topology: 2node-vs-service
requires: [provision]

steps:
  # First: confirm drift detection returns clean status with zero counts.
  # This is the core thesis test — abstract == physical.
  - name: verify-drift-clean-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/drift
    expect:
      jq: '.status == "clean" and (.missing | length) == 0 and (.extra | length) == 0 and (.modified | length) == 0'

  - name: verify-drift-clean-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/drift
    expect:
      jq: '.status == "clean" and (.missing | length) == 0 and (.extra | length) == 0 and (.modified | length) == 0'

  # Second: spot-check specific CONFIG_DB entries to prove they exist.
  # If the abstract Node failed to generate these, drift would have caught
  # them as "missing" — but we verify independently to be thorough.

  # BGP_GLOBALS must have the correct ASN from the profile
  - name: verify-bgp-globals-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65001" and .router_id == "10.0.0.1"'

  - name: verify-bgp-globals-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default
    expect:
      jq: '.local_asn == "65002" and .router_id == "10.0.0.2"'

  # Transit interface IP (the entry we'll delete in inject-drift)
  - name: verify-transit-ip-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.0%2F31/exists
    expect:
      jq: '.exists == true'

  - name: verify-transit-ip-sw2
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0%7C10.1.0.1%2F31/exists
    expect:
      jq: '.exists == true'

  # VLAN 100 from local-irb service (the topology provisions this)
  - name: verify-vlan100-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan100
    expect:
      jq: '.vlanid == "100"'

  # VLAN 999 must NOT exist yet (we'll inject it as "extra" drift)
  - name: verify-no-vlan999-sw1
    action: newtron
    devices: [switch1]
    url: /node/{{device}}/configdb/VLAN/Vlan999/exists
    expect:
      jq: '.exists == false'
