name: l3-routing
description: |
  L3 routed connectivity test with self-cleanup. Configures interface IPs on
  host-facing ports, verifies cross-leaf routing via spine and dataplane
  (including MTU test), then removes the interface IPs so Ethernet1 is
  available as an L2 bridge port for subsequent EVPN scenarios.
  Note: "redistribute connected" is already active from provisioning —
  no vtysh manipulation needed.
topology: 3node-ngdp
requires: [provision]

steps:
  # =========================================================================
  # Setup: Configure L3 interfaces
  # =========================================================================

  - name: set-ip-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/set-ip
    params: {ip: "10.1.100.1/24"}

  - name: set-ip-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/set-ip
    params: {ip: "10.1.200.1/24"}

  # Verify interface IPs in CONFIG_DB
  - name: verify-ip-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1%7C10.1.100.1%2F24/exists
    expect:
      jq: '.exists == true'

  - name: verify-ip-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1%7C10.1.200.1%2F24/exists
    expect:
      jq: '.exists == true'

  # Redistribute connected is already active from provisioner's ConfigureBGP.
  # The new INTERFACE entries become connected routes and are automatically
  # advertised to spine, which relays them to the other leaf.
  - name: wait-routes
    action: wait
    duration: 10s

  # =========================================================================
  # Verify: Routes and dataplane
  # =========================================================================

  - name: verify-route-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/route/default/10.1.200.0/24
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.protocol == "bgp"'

  - name: verify-route-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/route/default/10.1.100.0/24
    poll:
      timeout: 30s
      interval: 3s
    expect:
      jq: '.protocol == "bgp"'

  # Gateway reachability
  - name: host1-gateway-ping
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 10.1.100.1"
    expect:
      success_rate: 0.8

  - name: host2-gateway-ping
    action: host-exec
    devices: [host2]
    command: "ping -c 3 -W 2 10.1.200.1"
    expect:
      success_rate: 0.8

  # Cross-leaf L3 routing (host1 → leaf1 → spine → leaf2 → host2)
  - name: ping-host1-to-host2
    action: host-exec
    devices: [host1]
    command: "ping -c 5 -W 2 10.1.200.20"
    expect:
      success_rate: 0.8

  - name: ping-host2-to-host1
    action: host-exec
    devices: [host2]
    command: "ping -c 5 -W 2 10.1.100.10"
    expect:
      success_rate: 0.8

  # MTU test: 1400-byte payload (fits default 1500 MTU)
  - name: mtu-test-1400
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 -s 1400 -M do 10.1.200.20"
    expect:
      success_rate: 0.8

  # =========================================================================
  # Self-cleanup: Remove L3 config so Ethernet1 is available as L2
  # =========================================================================
  # SONiC requires a port to be either L3 (router port) or L2 (bridge port),
  # not both. Subsequent EVPN scenarios need Ethernet1 as a VLAN member.
  # Note: we do NOT touch "redistribute connected" — the provisioner set it
  # up in CONFIG_DB and it must remain active for loopback reachability.

  - name: remove-l3-ip-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/remove-ip
    params: {ip: "10.1.100.1/24"}

  - name: remove-l3-ip-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/remove-ip
    params: {ip: "10.1.200.1/24"}

  - name: wait-port-mode-change
    action: wait
    duration: 5s
