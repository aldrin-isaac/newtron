name: evpn-l2-bridged
description: |
  EVPN L2 intra-subnet bridging: VLAN 100 with VNI 10100 across leaf1 and leaf2.
  Ethernet1 on both switches (→host1 and →host2) are access members.
  Hosts communicate via L2 bridged over VXLAN — verifies the complete EVPN L2
  control and data plane path. Self-cleaning: removes all config at end.
topology: 3node-ngdp
requires: [evpn-setup]

steps:
  # =========================================================================
  # Create L2 overlay
  # =========================================================================

  - name: create-vlan-100-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/vlan
    params: {id: 100}

  - name: create-vlan-100-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/vlan
    params: {id: 100}

  - name: add-vlan-member-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/vlan/100/member
    params: {interface: Ethernet1, tagged: false}

  - name: add-vlan-member-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/vlan/100/member
    params: {interface: Ethernet1, tagged: false}

  - name: bind-macvpn-100-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Vlan100/bind-macvpn
    params: {macvpn: servers-vlan100}

  - name: bind-macvpn-100-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Vlan100/bind-macvpn
    params: {macvpn: servers-vlan100}

  # =========================================================================
  # Verify CONFIG_DB
  # =========================================================================

  - name: verify-tunnel-map-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10100_Vlan100
    expect:
      jq: '.vlan == "Vlan100" and .vni == "10100"'

  - name: verify-tunnel-map-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10100_Vlan100
    expect:
      jq: '.vlan == "Vlan100" and .vni == "10100"'

  - name: verify-arp-suppress-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan100/exists
    expect:
      jq: '.exists == true'

  - name: wait-vxlan-convergence
    action: wait
    duration: 15s

  # =========================================================================
  # Configure hosts and test dataplane
  # =========================================================================

  - name: configure-host1-ip
    action: host-exec
    devices: [host1]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 192.168.100.10/24 dev eth0"

  - name: configure-host2-ip
    action: host-exec
    devices: [host2]
    command: "ip addr flush dev eth0 2>/dev/null; ip addr add 192.168.100.20/24 dev eth0"

  - name: wait-arp
    action: wait
    duration: 3s

  - name: ping-host1-to-host2
    action: host-exec
    devices: [host1]
    command: "ping -c 10 -W 5 192.168.100.20"
    expect:
      success_rate: 0.90

  - name: ping-host2-to-host1
    action: host-exec
    devices: [host2]
    command: "ping -c 10 -W 5 192.168.100.10"
    expect:
      success_rate: 0.90

  # =========================================================================
  # Cleanup: hosts
  # =========================================================================

  - name: cleanup-host1-ip
    action: host-exec
    devices: [host1]
    command: "ip addr del 192.168.100.10/24 dev eth0 2>/dev/null || true"
    expect:
      contains: ""

  - name: cleanup-host2-ip
    action: host-exec
    devices: [host2]
    command: "ip addr del 192.168.100.20/24 dev eth0 2>/dev/null || true"
    expect:
      contains: ""

  # =========================================================================
  # Cleanup: switch config (reverse order)
  # =========================================================================

  - name: unbind-macvpn-100-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Vlan100/unbind-macvpn

  - name: unbind-macvpn-100-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Vlan100/unbind-macvpn

  - name: remove-vlan-member-leaf1
    action: newtron
    devices: [leaf1]
    method: DELETE
    url: /node/{{device}}/vlan/100/member/Ethernet1

  - name: remove-vlan-member-leaf2
    action: newtron
    devices: [leaf2]
    method: DELETE
    url: /node/{{device}}/vlan/100/member/Ethernet1

  - name: delete-vlan-100-leaf1
    action: newtron
    devices: [leaf1]
    method: DELETE
    url: /node/{{device}}/vlan/100

  - name: delete-vlan-100-leaf2
    action: newtron
    devices: [leaf2]
    method: DELETE
    url: /node/{{device}}/vlan/100
