name: provision
description: |
  Provision all switches (spine + leaves), config-reload to activate CONFIG_DB
  changes (BGP ASN, loopback, underlay peers), and verify BGP convergence.
topology: 3node-ngdp
requires: [boot-ssh]

steps:
  - name: provision-switches
    action: provision
    devices: [spine, leaf1, leaf2]

  - name: config-reload
    action: newtron
    devices: [spine, leaf1, leaf2]
    method: POST
    url: /node/{{device}}/config-reload

  - name: wait-reload
    action: wait
    duration: 45s

  - name: verify-bgp
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
