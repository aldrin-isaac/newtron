name: provision
description: |
  Provision all switches (spine + leaves), config-reload to activate CONFIG_DB
  changes (BGP ASN, loopback, underlay peers), and verify BGP convergence.
requires: [boot-ssh]

steps:
  - name: provision-switches
    action: topology-reconcile
    devices: [spine, leaf1, leaf2]

  - name: reload-config
    action: newtron
    devices: [spine, leaf1, leaf2]
    method: POST
    url: /nodes/{{device}}/reload-config

  - name: wait-reload
    action: wait
    duration: 45s

  - name: verify-bgp
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /nodes/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
