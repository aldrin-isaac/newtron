name: teardown
description: |
  Structured reverse of infrastructure provisioning:
    ApplyService   → RemoveService    (transit interfaces — all switches)
    SetupEVPN      → TeardownEVPN     (VTEP, NVO, overlay peers — leafs only)
    ConfigureBGP   → RemoveBGPGlobals (BGP globals, AF, redistribution — all switches)
    ConfigureLoopback → RemoveLoopback (loopback interface — all switches)
  Uses newtron actions exclusively (no raw redis-cli).
topology: 3node-ngdp
requires: [evpn-irb]

steps:
  # =========================================================================
  # Reverse of ApplyService — transit interfaces (creates BGP underlay peers)
  # =========================================================================

  - name: remove-transit-spine-eth0
    action: newtron
    devices: [spine]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-spine-eth1
    action: newtron
    devices: [spine]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/remove-service

  - name: remove-transit-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  # =========================================================================
  # Reverse of SetupEVPN (leafs only — spine has no EVPN)
  # =========================================================================

  - name: teardown-evpn-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/teardown-evpn

  - name: teardown-evpn-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/teardown-evpn

  - name: verify-vtep-removed
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1/exists
    expect:
      jq: '.exists == false'

  - name: verify-nvo-removed
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1/exists
    expect:
      jq: '.exists == false'

  - name: verify-l2vpn-af-removed
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # Reverse of ConfigureBGP (all switches)
  # =========================================================================

  - name: remove-bgp-globals
    action: newtron
    devices: [spine, leaf1, leaf2]
    method: POST
    url: /node/{{device}}/remove-bgp-globals

  - name: verify-bgp-globals-removed
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # Reverse of ConfigureLoopback (all switches)
  # =========================================================================

  - name: remove-loopback
    action: newtron
    devices: [spine, leaf1, leaf2]
    method: POST
    url: /node/{{device}}/remove-loopback

  - name: verify-loopback-removed
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == false'
