name: teardown
description: |
  Teardown all services and infrastructure from the 3-node topology.
  Transit services are removed with individual reverse actions (RemoveService per interface).
  Baseline infrastructure (setup-device) has no individual reverse — config reload
  restores CONFIG_DB to saved defaults, wiping loopback, BGP, and VTEP config.
topology: 3node-ngdp
requires: [evpn-irb]

steps:
  # =========================================================================
  # Reverse of ApplyService — transit interfaces (creates BGP underlay peers)
  # =========================================================================

  - name: remove-transit-spine-eth0
    action: newtron
    devices: [spine]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-spine-eth1
    action: newtron
    devices: [spine]
    method: POST
    url: /node/{{device}}/interface/Ethernet1/remove-service

  - name: remove-transit-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  - name: remove-transit-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/interface/Ethernet0/remove-service

  # Baseline infrastructure (setup-device) has no individual reverse.
  # Reprovisioning (CompositeOverwrite) is the collective reverse.
  # config reload restores saved state (not factory) since every API write
  # calls config save — it cannot clean up baseline infrastructure.
