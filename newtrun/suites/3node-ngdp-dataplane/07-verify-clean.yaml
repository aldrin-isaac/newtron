name: verify-clean
description: |
  Verify that CONFIG_DB is clean after full teardown. For every forward action
  there must be a reverse action — this suite verifies that every CONFIG_DB
  entry written during provisioning or test scenarios has been removed.
  Organized by table to trace operational symmetry.
topology: 3node-ngdp
requires: [teardown]

steps:
  # =========================================================================
  # LOOPBACK_INTERFACE — loopback from provisioning
  # Forward: ConfigureLoopback
  # Reverse: RemoveLoopback
  # =========================================================================

  - name: no-loopback
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0/exists
    expect:
      jq: '.exists == false'

  - name: no-loopback-ip-spine
    action: newtron
    devices: [spine]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0%7C10.0.0.10%2F32/exists
    expect:
      jq: '.exists == false'

  - name: no-loopback-ip-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0%7C10.0.0.11%2F32/exists
    expect:
      jq: '.exists == false'

  - name: no-loopback-ip-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/LOOPBACK_INTERFACE/Loopback0%7C10.0.0.12%2F32/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_GLOBALS — global BGP configuration
  # Forward: ConfigureBGP
  # Reverse: RemoveBGP
  # =========================================================================

  - name: no-bgp-globals
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/BGP_GLOBALS/default/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_GLOBALS_AF — address-family configs
  # Forward: ConfigureBGP (ipv4) + SetupEVPN (l2vpn_evpn)
  # Reverse: RemoveBGP + TeardownEVPN
  # =========================================================================

  - name: no-bgp-af-ipv4
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cipv4_unicast/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-af-l2vpn
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # BGP_NEIGHBOR — underlay + overlay peers
  # =========================================================================

  # Spine underlay: peers with leaf1 (10.1.0.1) and leaf2 (10.1.0.3)
  - name: no-bgp-neighbor-spine-leaf1
    action: newtron
    devices: [spine]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.1/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-neighbor-spine-leaf2
    action: newtron
    devices: [spine]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.3/exists
    expect:
      jq: '.exists == false'

  # Leaf underlay: leaf1 peers with spine (10.1.0.0), leaf2 peers with spine (10.1.0.2)
  - name: no-bgp-neighbor-underlay-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.0/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-neighbor-underlay-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.1.0.2/exists
    expect:
      jq: '.exists == false'

  # Overlay: leaf1 peers with 10.0.0.12, leaf2 peers with 10.0.0.11
  - name: no-bgp-neighbor-overlay-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.0.0.12/exists
    expect:
      jq: '.exists == false'

  - name: no-bgp-neighbor-overlay-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/BGP_NEIGHBOR/default%7C10.0.0.11/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # ROUTE_REDISTRIBUTE — connected redistribution
  # Forward: ConfigureBGP
  # Reverse: RemoveBGP
  # =========================================================================

  - name: no-route-redistribute
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/ROUTE_REDISTRIBUTE/default%7Cconnected%7Cbgp%7Cipv4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # INTERFACE — L3 interface config (cleaned up by l3-routing + teardown)
  # =========================================================================

  - name: no-interface-eth0
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0/exists
    expect:
      jq: '.exists == false'

  - name: no-interface-eth1-leafs
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1/exists
    expect:
      jq: '.exists == false'

  - name: no-interface-eth1-spine
    action: newtron
    devices: [spine]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VXLAN_TUNNEL — VTEP infrastructure (leafs only)
  # Forward: SetupEVPN
  # Reverse: TeardownEVPN
  # =========================================================================

  - name: no-vtep
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VXLAN_EVPN_NVO — NVO infrastructure (leafs only)
  # Forward: SetupEVPN
  # Reverse: TeardownEVPN
  # =========================================================================

  - name: no-nvo
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VXLAN_TUNNEL_MAP — VNI-to-VLAN mappings (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-vni-map-10100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10100_Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-vni-map-10200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10200_Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SUPPRESS_VLAN_NEIGH — ARP suppression (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-arp-suppress-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-arp-suppress-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN_INTERFACE — SVIs from IRB (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-svi-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-svi-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SAG_GLOBAL — anycast gateway MAC (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-sag-global
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SAG_GLOBAL/IPv4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN — per-scenario VLANs (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # NEWTRON_INTENT — no service bindings should remain
  # =========================================================================

  - name: no-binding-eth0
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/Ethernet0/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth1
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/Ethernet1/exists
    expect:
      jq: '.exists == false'
