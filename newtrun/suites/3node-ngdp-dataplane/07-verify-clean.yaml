name: verify-clean
description: |
  Verify that CONFIG_DB is clean after full teardown. For every forward action
  there must be a reverse action — this suite verifies that every CONFIG_DB
  entry written during provisioning or test scenarios has been removed.
  Organized by table to trace operational symmetry.
topology: 3node-ngdp
requires: [teardown]

steps:
  # Baseline infrastructure (LOOPBACK_INTERFACE, BGP_GLOBALS/default,
  # BGP_GLOBALS_AF/default, BGP_NEIGHBOR, ROUTE_REDISTRIBUTE/default,
  # VXLAN_TUNNEL, VXLAN_EVPN_NVO) is NOT checked here — setup-device has
  # no individual reverse. Reprovisioning (CompositeOverwrite) is the
  # collective reverse.

  # =========================================================================
  # INTERFACE — L3 interface config (cleaned up by RemoveService on transit)
  # =========================================================================

  - name: no-interface-eth0
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet0/exists
    expect:
      jq: '.exists == false'

  - name: no-interface-eth1-leafs
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1/exists
    expect:
      jq: '.exists == false'

  - name: no-interface-eth1-spine
    action: newtron
    devices: [spine]
    url: /node/{{device}}/configdb/INTERFACE/Ethernet1/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VXLAN_TUNNEL_MAP — VNI-to-VLAN mappings (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-vni-map-10100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10100_Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-vni-map-10200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL_MAP/vtep1%7CVNI10200_Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SUPPRESS_VLAN_NEIGH — ARP suppression (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-arp-suppress-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-arp-suppress-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SUPPRESS_VLAN_NEIGH/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN_INTERFACE — SVIs from IRB (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-svi-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-svi-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN_INTERFACE/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # SAG_GLOBAL — anycast gateway MAC (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-sag-global
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/SAG_GLOBAL/IPv4/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # VLAN — per-scenario VLANs (cleaned up by per-scenario cleanup)
  # =========================================================================

  - name: no-vlan100
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN/Vlan100/exists
    expect:
      jq: '.exists == false'

  - name: no-vlan200
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/VLAN/Vlan200/exists
    expect:
      jq: '.exists == false'

  # =========================================================================
  # NEWTRON_INTENT — no service bindings should remain
  # =========================================================================

  - name: no-binding-eth0
    action: newtron
    devices: [spine, leaf1, leaf2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet0/exists
    expect:
      jq: '.exists == false'

  - name: no-binding-eth1
    action: newtron
    devices: [leaf1, leaf2]
    url: /node/{{device}}/configdb/NEWTRON_INTENT/interface%7CEthernet1/exists
    expect:
      jq: '.exists == false'
