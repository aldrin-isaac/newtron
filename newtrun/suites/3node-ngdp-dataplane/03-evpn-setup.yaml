name: evpn-setup
description: |
  EVPN overlay bringup: create VTEP, NVO, and loopback BGP neighbors with
  L2VPN EVPN address-family. Verify CONFIG_DB entries and BGP sessions
  reach Established. Matches 2node-ngdp-primitive evpn-setup pattern.
topology: 3node-ngdp
requires: [l3-routing]

steps:
  - name: setup-evpn-leaf1
    action: setup-evpn
    devices: [leaf1]

  - name: setup-evpn-leaf2
    action: setup-evpn
    devices: [leaf2]

  - name: verify-vxlan-tunnel-leaf1
    action: verify-config-db
    devices: [leaf1]
    table: VXLAN_TUNNEL
    key: vtep1
    expect:
      fields:
        src_ip: "10.0.0.11"

  - name: verify-vxlan-tunnel-leaf2
    action: verify-config-db
    devices: [leaf2]
    table: VXLAN_TUNNEL
    key: vtep1
    expect:
      fields:
        src_ip: "10.0.0.12"

  - name: verify-vxlan-nvo
    action: verify-config-db
    devices: [leaf1]
    table: VXLAN_EVPN_NVO
    key: nvo1
    expect:
      fields:
        source_vtep: vtep1

  - name: verify-bgp-l2vpn-af
    action: verify-config-db
    devices: [leaf1]
    table: BGP_GLOBALS_AF
    key: "default|l2vpn_evpn"
    expect:
      exists: true

  - name: wait-evpn-setup
    action: wait
    duration: 5s

  - name: verify-bgp-leaf1
    action: verify-bgp
    devices: [leaf1]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 5s

  - name: verify-bgp-leaf2
    action: verify-bgp
    devices: [leaf2]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 5s
