name: evpn-setup
description: |
  EVPN overlay bringup: create VTEP, NVO, and loopback BGP neighbors with
  L2VPN EVPN address-family. Verify CONFIG_DB entries and BGP sessions
  reach Established. Matches 2node-ngdp-primitive evpn-setup pattern.
topology: 3node-ngdp
requires: [l3-routing]

steps:
  - name: setup-vtep-leaf1
    action: newtron
    devices: [leaf1]
    method: POST
    url: /node/{{device}}/setup-vtep

  - name: setup-vtep-leaf2
    action: newtron
    devices: [leaf2]
    method: POST
    url: /node/{{device}}/setup-vtep

  - name: verify-vxlan-tunnel-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.11"'

  - name: verify-vxlan-tunnel-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/configdb/VXLAN_TUNNEL/vtep1
    expect:
      jq: '.src_ip == "10.0.0.12"'

  - name: verify-vxlan-nvo
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/VXLAN_EVPN_NVO/nvo1
    expect:
      jq: '.source_vtep == "vtep1"'

  - name: verify-bgp-l2vpn-af
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/configdb/BGP_GLOBALS_AF/default%7Cl2vpn_evpn/exists
    expect:
      jq: '.exists == true'

  - name: wait-evpn-setup
    action: wait
    duration: 5s

  - name: verify-bgp-leaf1
    action: newtron
    devices: [leaf1]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'

  - name: verify-bgp-leaf2
    action: newtron
    devices: [leaf2]
    url: /node/{{device}}/bgp/check
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: 'length > 0 and all(.[]; .status == "pass")'
