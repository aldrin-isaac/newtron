name: service-lifecycle
description: |
  Composite service operations: apply-service, refresh-service, remove-service.
  Tests svc-evpn-irb on sw1:Eth3 + sw2:Eth3 with dataplane verification,
  then svc-bridged on sw1:Eth1. Exercises the full service lifecycle API.
topology: 2node
requires: [teardown-overlay]

steps:
  # 8a: Apply svc-evpn-irb on Eth3 (both switches)
  - name: apply-svc-evpn-irb-sw1
    action: apply-service
    devices: [switch1]
    interface: Ethernet3
    service: svc-evpn-irb

  - name: apply-svc-evpn-irb-sw2
    action: apply-service
    devices: [switch2]
    interface: Ethernet3
    service: svc-evpn-irb

  # Verify service binding
  - name: verify-binding-sw1
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet3
    expect:
      exists: true

  - name: verify-binding-sw2
    action: verify-config-db
    devices: [switch2]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet3
    expect:
      exists: true

  # Verify VLAN 400 created
  - name: verify-vlan400-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan400
    expect:
      exists: true

  - name: verify-vlan400-sw2
    action: verify-config-db
    devices: [switch2]
    table: VLAN
    key: Vlan400
    expect:
      exists: true

  # Verify VLAN member (tagged for apply-service)
  - name: verify-vlan-member-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN_MEMBER
    key: "Vlan400|Ethernet3"
    expect:
      exists: true

  # Verify VXLAN tunnel map
  - name: verify-tunnel-map-400-sw1
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_TUNNEL_MAP
    key: "vtep1|map_50400_Vlan400"
    expect:
      fields:
        vlan: Vlan400
        vni: "50400"

  # Verify VLAN_INTERFACE (SVI with VRF)
  - name: verify-svi-vlan400-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: Vlan400
    expect:
      fields:
        vrf_name: Vrf_irb

  # Configure host sub-interfaces while waiting (overlap with EVPN convergence)
  - name: host3-configure-subintf
    action: host-exec
    devices: [host3]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.3/24 dev eth0.400; ip link set eth0.400 up"

  - name: host6-configure-subintf
    action: host-exec
    devices: [host6]
    command: "ip link add link eth0 name eth0.400 type vlan id 400 2>/dev/null || true; ip addr flush dev eth0.400 2>/dev/null; ip addr add 10.4.0.6/24 dev eth0.400; ip link set eth0.400 up"

  # Wait for EVPN VXLAN convergence. teardown-overlay's VRF deletion causes
  # frrcfgd to reconfigure FRR, which drops the overlay eBGP session. The
  # session needs ~60-90s to re-establish (TCP connect retry timer + BGP open),
  # then orchagent programs ASIC_DB, then BGP advertises VNIs to the peer.
  - name: wait-evpn-convergence
    action: wait
    duration: 90s

  # Verify EVPN BGP sessions re-established after overlay rebuild
  - name: verify-evpn-bgp-sessions
    action: verify-bgp
    devices: [switch1]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 10s

  # Prime NGDP ARP from SVI (retry loop handles stragglers)
  - name: prime-arp-svi-sw1
    action: ssh-command
    devices: [switch1]
    command: "for i in 1 2 3 4 5; do sudo ping -c 1 -W 1 -I Vlan400 10.4.0.3 && break; sleep 1; done || true"

  - name: prime-arp-svi-sw2
    action: ssh-command
    devices: [switch2]
    command: "for i in 1 2 3 4 5; do sudo ping -c 1 -W 1 -I Vlan400 10.4.0.6 && break; sleep 1; done || true"

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host3↔host6 EVPN IRB ping
  - name: host3-ping-host6
    action: host-exec
    devices: [host3]
    command: "ping -c 5 -W 2 10.4.0.6"
    expect:
      success_rate: 0.8

  - name: host6-ping-host3
    action: host-exec
    devices: [host6]
    command: "ping -c 5 -W 2 10.4.0.3"
    expect:
      success_rate: 0.8

  # 8b: Refresh service — verify no error, binding still present
  - name: refresh-svc-sw1
    action: refresh-service
    devices: [switch1]
    interface: Ethernet3

  - name: refresh-svc-sw2
    action: refresh-service
    devices: [switch2]
    interface: Ethernet3

  - name: verify-binding-after-refresh-sw1
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet3
    expect:
      exists: true

  # 8c: Remove service from both Eth3
  - name: remove-svc-sw1
    action: remove-service
    devices: [switch1]
    interface: Ethernet3

  - name: remove-svc-sw2
    action: remove-service
    devices: [switch2]
    interface: Ethernet3

  - name: verify-binding-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet3
    expect:
      exists: false

  - name: verify-binding-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet3
    expect:
      exists: false

  - name: verify-vlan400-removed-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan400
    expect:
      exists: false

  - name: verify-vlan400-removed-sw2
    action: verify-config-db
    devices: [switch2]
    table: VLAN
    key: Vlan400
    expect:
      exists: false

  # 8d: Apply svc-bridged on sw1:Eth1
  - name: apply-svc-bridged-sw1
    action: apply-service
    devices: [switch1]
    interface: Ethernet1
    service: svc-bridged

  - name: verify-bridged-binding-sw1
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet1
    expect:
      exists: true

  - name: verify-vlan200-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan200
    expect:
      exists: true

  # 8e: Remove svc-bridged from sw1:Eth1
  - name: remove-svc-bridged-sw1
    action: remove-service
    devices: [switch1]
    interface: Ethernet1

  - name: verify-bridged-binding-removed
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet1
    expect:
      exists: false

  - name: verify-vlan200-removed
    action: verify-config-db
    devices: [switch1]
    table: VLAN
    key: Vlan200
    expect:
      exists: false
