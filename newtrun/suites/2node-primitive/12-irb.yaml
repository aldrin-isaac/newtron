name: irb
description: |
  Integrated Routing and Bridging on switch1: configure SVI for VLAN 100
  (created by bridged) in global routing table, verify host1 can ping
  the gateway IP. Demonstrates L3 termination on a bridged VLAN.
topology: 2node
requires: [bridged]

steps:
  - name: configure-svi-vlan100
    action: configure-svi
    devices: [switch1]
    vlan_id: 100
    params:
      ip: "10.100.1.1/24"

  - name: verify-vlan-interface-exists
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: "Vlan100"
    expect:
      exists: true

  - name: verify-svi-ip
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: "Vlan100|10.100.1.1/24"
    expect:
      exists: true

  - name: wait-svi-ready
    action: wait
    duration: 15s

  - name: prime-ngdp-arp-svi
    action: ssh-command
    devices: [switch1]
    command: "for i in 1 2 3 4 5; do sudo ping -c 1 -W 1 -I Vlan100 10.100.1.2 && break; sleep 1; done || true"

  - name: wait-after-prime
    action: wait
    duration: 3s

  - name: host1-add-irb-ip
    action: host-exec
    devices: [host1]
    command: "ip addr add 10.100.1.2/24 dev eth0 2>/dev/null || true"

  - name: host1-ping-svi
    action: host-exec
    devices: [host1]
    command: "ping -c 3 -W 2 10.100.1.1"
    expect:
      success_rate: 0.8
