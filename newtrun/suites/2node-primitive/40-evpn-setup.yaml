name: evpn-setup
description: |
  EVPN overlay bringup: create VTEP, NVO, and loopback BGP neighbors with
  L2VPN EVPN address-family. Verify CONFIG_DB and EVPN BGP sessions reach
  Established.
topology: 2node
requires: [bgp-underlay]

steps:
  - name: setup-evpn-switch1
    action: setup-evpn
    devices: [switch1]

  - name: setup-evpn-switch2
    action: setup-evpn
    devices: [switch2]

  - name: verify-vxlan-tunnel-sw1
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_TUNNEL
    key: vtep1
    expect:
      fields:
        src_ip: "10.0.0.1"

  - name: verify-vxlan-tunnel-sw2
    action: verify-config-db
    devices: [switch2]
    table: VXLAN_TUNNEL
    key: vtep1
    expect:
      fields:
        src_ip: "10.0.0.2"

  - name: verify-vxlan-nvo-sw1
    action: verify-config-db
    devices: [switch1]
    table: VXLAN_EVPN_NVO
    key: nvo1
    expect:
      fields:
        source_vtep: vtep1

  - name: verify-bgp-l2vpn-af
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS_AF
    key: "default|l2vpn_evpn"
    expect:
      exists: true

  - name: verify-bgp-evpn-switch1
    action: verify-bgp
    devices: [switch1]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 5s

  - name: verify-bgp-evpn-switch2
    action: verify-bgp
    devices: [switch2]
    expect:
      state: Established
      timeout: 120s
      poll_interval: 5s
