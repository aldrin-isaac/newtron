name: evpn-irb
description: |
  EVPN IRB: create Vrf_irb with L3VNI, configure SVI for VLAN 300 as
  distributed anycast gateway. Verify IRB gateway reachability and L2
  bridging still works. Includes add/remove-vrf-interface sub-lifecycle.
topology: 2node
requires: [evpn-bridged]

steps:
  # Create IRB VRF on both
  - name: create-vrf-irb-sw1
    action: create-vrf
    devices: [switch1]
    vrf: Vrf_irb

  - name: create-vrf-irb-sw2
    action: create-vrf
    devices: [switch2]
    vrf: Vrf_irb

  # Bind IP-VPN
  - name: bind-ipvpn-irb-sw1
    action: bind-ipvpn
    devices: [switch1]
    vrf: Vrf_irb
    params:
      ipvpn: evpn-irb-vrf

  - name: bind-ipvpn-irb-sw2
    action: bind-ipvpn
    devices: [switch2]
    vrf: Vrf_irb
    params:
      ipvpn: evpn-irb-vrf

  # CONFIG_DB verification: VRF with VNI
  - name: verify-vrf-irb-vni
    action: verify-config-db
    devices: [switch1]
    table: VRF
    key: Vrf_irb
    expect:
      fields:
        vni: "50002"

  - name: verify-bgp-globals-vrf
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS
    key: Vrf_irb
    expect:
      fields:
        local_asn: "65001"

  - name: verify-bgp-af-l2vpn-evpn
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS_AF
    key: "Vrf_irb|l2vpn_evpn"
    expect:
      fields:
        advertise-ipv4-unicast: "true"

  - name: verify-evpn-rt
    action: verify-config-db
    devices: [switch1]
    table: BGP_GLOBALS_EVPN_RT
    key: "Vrf_irb|L2VPN_EVPN|65000:50002"
    expect:
      exists: true

  - name: verify-route-redistribute
    action: verify-config-db
    devices: [switch1]
    table: ROUTE_REDISTRIBUTE
    key: "Vrf_irb|connected|bgp|ipv4"
    expect:
      exists: true

  # Configure SVI with VRF and anycast gateway
  - name: configure-svi-sw1
    action: configure-svi
    devices: [switch1]
    vlan_id: 300
    params:
      ip: "10.3.0.1/24"
      vrf: Vrf_irb

  - name: configure-svi-sw2
    action: configure-svi
    devices: [switch2]
    vlan_id: 300
    params:
      ip: "10.3.0.1/24"
      vrf: Vrf_irb

  - name: verify-svi-vrf-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: Vlan300
    expect:
      fields:
        vrf_name: Vrf_irb

  - name: verify-svi-ip-sw1
    action: verify-config-db
    devices: [switch1]
    table: VLAN_INTERFACE
    key: "Vlan300|10.3.0.1/24"
    expect:
      exists: true

  - name: wait-svi-ready
    action: wait
    duration: 15s

  # Prime NGDP ARP
  - name: prime-arp-sw1-svi
    action: ssh-command
    devices: [switch1]
    command: "for i in 1 2 3 4 5; do sudo ping -c 1 -W 1 -I Vlan300 10.3.0.2 && break; sleep 1; done || true"

  - name: prime-arp-sw2-svi
    action: ssh-command
    devices: [switch2]
    command: "for i in 1 2 3 4 5; do sudo ping -c 1 -W 1 -I Vlan300 10.3.0.5 && break; sleep 1; done || true"

  - name: wait-after-prime
    action: wait
    duration: 5s

  # Dataplane: host→SVI gateway
  - name: host2-ping-svi-gateway
    action: host-exec
    devices: [host2]
    command: "ping -c 3 -W 2 10.3.0.1"
    expect:
      success_rate: 0.8

  - name: host5-ping-svi-gateway
    action: host-exec
    devices: [host5]
    command: "ping -c 3 -W 2 10.3.0.1"
    expect:
      success_rate: 0.8

  # L2 bridging still works
  - name: host2-ping-host5-l2
    action: host-exec
    devices: [host2]
    command: "ping -c 5 -W 2 10.3.0.5"
    expect:
      success_rate: 0.8

  - name: host5-ping-host2-l2
    action: host-exec
    devices: [host5]
    command: "ping -c 5 -W 2 10.3.0.2"
    expect:
      success_rate: 0.8

  # Sub-lifecycle: add-vrf-interface Eth3→Vrf_irb on sw1
  - name: add-vrf-interface-eth3
    action: add-vrf-interface
    devices: [switch1]
    vrf: Vrf_irb
    interface: Ethernet3

  - name: verify-eth3-in-vrf
    action: verify-config-db
    devices: [switch1]
    table: INTERFACE
    key: Ethernet3
    expect:
      fields:
        vrf_name: Vrf_irb

  - name: remove-vrf-interface-eth3
    action: remove-vrf-interface
    devices: [switch1]
    vrf: Vrf_irb
    interface: Ethernet3

  - name: verify-eth3-vrf-removed
    action: verify-config-db
    devices: [switch1]
    table: INTERFACE
    key: Ethernet3
    expect:
      fields:
        vrf_name: ""
