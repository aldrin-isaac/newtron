name: service-lifecycle
description: |
  Apply a transit service on Ethernet0, verify CONFIG_DB entries, then remove
  and verify cleanup. Exercises the full service apply/remove lifecycle on a
  single switch.
topology: 1node
requires: [boot-ssh]

steps:
  # Apply transit service on Ethernet0
  - name: apply-transit
    action: apply-service
    devices: [switch1]
    interface: Ethernet0
    service: transit
    params:
      ip: "10.1.0.0/31"
      peer_as: "65002"

  # Verify service binding created
  - name: verify-binding
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet0
    expect:
      exists: true

  # Verify INTERFACE entry (IP routing enabled on port)
  - name: verify-interface
    action: verify-config-db
    devices: [switch1]
    table: INTERFACE
    key: Ethernet0
    expect:
      exists: true

  # Verify BGP neighbor with correct ASN
  - name: verify-bgp-neighbor
    action: verify-config-db
    devices: [switch1]
    table: BGP_NEIGHBOR
    key: "default|10.1.0.1"
    expect:
      fields:
        asn: "65002"

  # Remove service
  - name: remove-transit
    action: remove-service
    devices: [switch1]
    interface: Ethernet0

  # Verify binding removed
  - name: verify-binding-removed
    action: verify-config-db
    devices: [switch1]
    table: NEWTRON_SERVICE_BINDING
    key: Ethernet0
    expect:
      exists: false

  # Verify BGP neighbor removed
  - name: verify-bgp-neighbor-removed
    action: verify-config-db
    devices: [switch1]
    table: BGP_NEIGHBOR
    key: "default|10.1.0.1"
    expect:
      exists: false
