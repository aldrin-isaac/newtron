name: host-reachability
description: >
  Verify host5→switch2:Ethernet2 (CUSTOMER VRF) reachability.
  Primes NGDP ARP responder from switch side (RCA-033), then verifies host can ping.
topology: 2node-ngdp
requires: [bind-interface]

steps:
  # Configure host5's IP and default route (host5:eth0 → switch2:Ethernet2).
  - name: host5-configure-ip
    action: host-exec
    devices: [host5]
    command: "ip addr add 10.10.1.0/31 dev eth0 2>/dev/null || true"

  - name: host5-configure-default-route
    action: host-exec
    devices: [host5]
    command: "ip route add default via 10.10.1.1 dev eth0 2>/dev/null || true"

  # Verify host5 has the expected IP.
  - name: host5-has-ip
    action: host-exec
    devices: [host5]
    command: "ip addr show dev eth0"
    expect:
      contains: "10.10.1.0"

  # Prime NGDP ARP responder (CiscoVS requirement, RCA-033).
  # Retry — NGDP may take time to process the new VRF interface.
  - name: prime-ngdp-arp
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "sudo ping -c 1 -W 2 -I Ethernet2 10.10.1.0"}
    poll:
      timeout: 10s
      interval: 2s
    expect:
      jq: '.output | contains("1 received")'

  - name: wait-after-prime
    action: wait
    duration: 3s

  # Verify: host5 can ping switch2's CUSTOMER VRF gateway.
  - name: host5-ping-gateway
    action: host-exec
    devices: [host5]
    command: "ping -c 3 -W 2 10.10.1.1"
    expect:
      success_rate: 0.8
