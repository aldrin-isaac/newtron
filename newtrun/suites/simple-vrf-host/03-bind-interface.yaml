name: bind-interface
description: >
  Step 2 of incremental VRF setup: bind switch2:Ethernet2 to Vrf_CUSTOMER,
  assign IP 10.10.1.1/31, and wait for intfmgrd + orchagent to process.
topology: 2node
requires: [create-vrf]

steps:
  # Bind Ethernet2 to Vrf_CUSTOMER via newtron primitive.
  - name: bind-ethernet2-to-customer-vrf
    action: set-interface
    devices: [switch2]
    interface: Ethernet2
    params:
      property: vrf
      value: Vrf_CUSTOMER

  # Assign IP to Ethernet2 (already bound to Vrf_CUSTOMER in CONFIG_DB).
  - name: set-ip-ethernet2
    action: set-interface
    devices: [switch2]
    interface: Ethernet2
    params:
      property: ip
      value: "10.10.1.1/31"

  # Verify CONFIG_DB.
  - name: verify-vrf-binding-config-db
    action: verify-config-db
    devices: [switch2]
    table: INTERFACE
    key: Ethernet2
    expect:
      fields:
        vrf_name: Vrf_CUSTOMER

  - name: verify-ip-config-db
    action: verify-config-db
    devices: [switch2]
    table: INTERFACE
    key: "Ethernet2|10.10.1.1/31"
    expect:
      exists: true

  # Wait for intfmgrd to process VRF binding and IP assignment. Up to 90s.
  - name: wait-ethernet2-ip
    action: ssh-command
    devices: [switch2]
    command: "for i in $(seq 1 18); do ip addr show Ethernet2 | grep -q '10.10.1.1' && break; sleep 5; done; ip addr show Ethernet2 | grep -q '10.10.1.1'"

  # Verify kernel state.
  - name: verify-ethernet2-master-customer
    action: ssh-command
    devices: [switch2]
    command: "ip link show Ethernet2"
    expect:
      contains: "master Vrf_CUSTOMER"

  - name: verify-ethernet2-ip
    action: ssh-command
    devices: [switch2]
    command: "ip addr show Ethernet2"
    expect:
      contains: "10.10.1.1"

  # Wait for orchagent to process APP_DB INTF_TABLE and program SAI route.
  - name: wait-orchagent-route
    action: ssh-command
    devices: [switch2]
    command: "for i in $(seq 1 24); do redis-cli -n 1 keys 'ASIC_STATE:SAI_OBJECT_TYPE_ROUTE_ENTRY:*' | grep -q '10.10.1.0' && break; sleep 5; done; true"
