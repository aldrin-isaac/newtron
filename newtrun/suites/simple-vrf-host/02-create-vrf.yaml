name: create-vrf
description: >
  Step 1 of incremental VRF setup: create Vrf_CUSTOMER on switch2, then verify it
  is programmed in the kernel (vrfmgrd) AND in ASIC_DB (orchagent/SAI).
  Uses polling instead of fixed waits since CiscoVS Silicon One SAI is slow.
  VRF name uses Vrf_ prefix (required by CiscoVS intfmgrd — see RCA-044).
topology: 2node-ngdp
requires: [setup-device]

steps:
  # Create Vrf_CUSTOMER via newtron primitive.
  # Writes VRF|Vrf_CUSTOMER to CONFIG_DB. vrfmgrd processes → kernel VRF device →
  # writes APP_DB VRF_TABLE. orchagent processes APP_DB → SAI virtual router → ASIC_DB.
  - name: create-customer-vrf
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/create-vrf
    params: {name: Vrf_CUSTOMER}

  # Verify VRF|Vrf_CUSTOMER is in CONFIG_DB.
  - name: verify-vrf-config-db
    action: newtron
    devices: [switch2]
    url: /node/{{device}}/configdb/VRF/Vrf_CUSTOMER/exists
    expect:
      jq: '.exists == true'

  # Verify vrfmgrd created Vrf_CUSTOMER in kernel.
  - name: verify-vrf-in-kernel
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "ip vrf show"}
    poll:
      timeout: 60s
      interval: 5s
    expect:
      jq: '.output | contains("Vrf_CUSTOMER")'

  # Verify Vrf_CUSTOMER SAI object exists in ASIC_DB (count ≥2: default + Vrf_CUSTOMER).
  # CiscoVS Silicon One SAI is slow — can take 30-60s on warm start, longer on cold.
  - name: verify-vrf-in-asicdb
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "redis-cli -n 1 keys 'ASIC_STATE:SAI_OBJECT_TYPE_VIRTUAL_ROUTER:*' | wc -l"}
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: '.output | gsub("[\\n\\s]";"") | tonumber >= 2'
