name: boot-ssh
description: Verify SSH connectivity to switch2
topology: 2node-ngdp

steps:
  - name: ssh-echo-switch2
    action: newtron
    devices: [switch2]
    method: POST
    url: /node/{{device}}/ssh-command
    params: {command: "echo ok"}
    poll:
      timeout: 120s
      interval: 5s
    expect:
      jq: '.output | contains("ok")'
