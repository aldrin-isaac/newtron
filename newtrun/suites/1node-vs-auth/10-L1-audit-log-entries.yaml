name: L1-audit-log-entries
description: |
  auth-design.md L1: every mutation hits the audit middleware. This
  scenario fires a small batch of writes as different callers; the
  operator verifies the audit log file (path passed to the server via
  --audit-log) gained one entry per request, each carrying the
  X-Newtron-Caller value as the user field.

  Direct log-file inspection from a scenario step isn't possible
  without a local-exec step action (deferred). The README documents
  the post-suite verification command (tail -n 20 /path/to/log).

requires: [L0-secret-store-resolves]

steps:
  # As alice — emits one auditcheck:spec.author allow event + the
  # request-level POST event.
  - name: alice-creates-qos-policy
    action: newtron
    method: POST
    url: /create-qos-policy
    params: {name: qos-test-l1-alice}
    headers:
      X-Newtron-Caller: alice

  # As bob — ops group has qos.create grant; same shape, different
  # user field in the audit log.
  - name: bob-creates-qos-policy
    action: newtron
    method: POST
    url: /create-qos-policy
    params: {name: qos-test-l1-bob}
    headers:
      X-Newtron-Caller: bob

  # Cleanup. spec-team has qos.delete; bob's policy created above
  # gets deleted by alice (spec-team is broader than ops here).
  - name: alice-deletes-qos-policy-a
    action: newtron
    method: POST
    url: /delete-qos-policy
    params: {name: qos-test-l1-alice}
    headers:
      X-Newtron-Caller: alice

  - name: alice-deletes-qos-policy-b
    action: newtron
    method: POST
    url: /delete-qos-policy
    params: {name: qos-test-l1-bob}
    headers:
      X-Newtron-Caller: alice
