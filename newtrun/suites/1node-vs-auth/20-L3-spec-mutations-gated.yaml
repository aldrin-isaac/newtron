name: L3-spec-mutations-gated-mallory
description: |
  auth-design.md L3: spec-mutation endpoints reject callers without the
  matching grant. Mallory's portion of this split-per-identity scenario:
  mallory (not in any group) is denied on spec.author, qos.create, and
  filter.create families. Tests the enforcement contract per permission
  family.

  Pre-L3 (or without --enforce-authorization), every step would
  succeed for both callers — the expect_failure assertions would
  fail. This scenario only makes sense with enforcement engaged.

requires: [L0-secret-store-resolves]
as: mallory

steps:
  # spec.author family — denied caller (mallory: not in any group)
  - name: mallory-create-service-denied
    action: newtron
    method: POST
    url: /create-service
    params: {name: svc-mallory, type: routed}
    expect_failure: true

  # qos.create family — denied caller
  - name: mallory-create-qos-denied
    action: newtron
    method: POST
    url: /create-qos-policy
    params: {name: qos-mallory}
    expect_failure: true

  # filter.create family — denied caller
  - name: mallory-create-filter-denied
    action: newtron
    method: POST
    url: /create-filter
    params: {name: filter-mallory, type: ip}
    expect_failure: true

---
name: L3-spec-mutations-gated-alice
description: |
  auth-design.md L3: spec-mutation endpoints accept callers in the
  granted group. Alice's portion of this split-per-identity scenario:
  alice (spec-team) is allowed on spec.author and filter.create families,
  and cleans up resources. Also covers the no-identity fail-closed
  contract.

  Pre-L3 (or without --enforce-authorization), every step would
  succeed for both callers — the expect_failure assertions would
  fail. This scenario only makes sense with enforcement engaged.

requires: [L3-spec-mutations-gated-mallory]
as: alice

steps:
  # spec.author family — allowed caller (alice: spec-team)
  - name: alice-create-service-allowed
    action: newtron
    method: POST
    url: /create-service
    params: {name: svc-alice-l3, type: routed}

  - name: alice-cleans-up-svc
    action: newtron
    method: POST
    url: /delete-service
    params: {name: svc-alice-l3}

  # qos.create family cleanup (bob's resource — alice as spec-team has qos.delete)
  - name: alice-cleans-up-qos
    action: newtron
    method: POST
    url: /delete-qos-policy
    params: {name: qos-bob-l3}

  # filter.create family — allowed caller
  - name: alice-create-filter-allowed
    action: newtron
    method: POST
    url: /create-filter
    params: {name: filter-alice-l3, type: ip}

  - name: alice-cleans-up-filter
    action: newtron
    method: POST
    url: /delete-filter
    params: {name: filter-alice-l3}

  # No-identity request — fails closed even on an allowed permission.
  # Verifies the fail-closed contract from TestAuthorization_EmptyCallerDenied.
  # alice's Bearer is the default credential for the operator; omitting
  # as: on a step would use it. This step explicitly sends no caller.
  - name: no-caller-fails-closed
    action: newtron
    method: POST
    url: /create-service
    params: {name: svc-no-caller, type: routed}
    expect_failure: true

---
name: L3-spec-mutations-gated-bob
description: |
  auth-design.md L3: spec-mutation endpoints accept callers in the
  granted group. Bob's portion of this split-per-identity scenario:
  bob (ops, which has qos.create) is allowed on the qos.create family.

  Pre-L3 (or without --enforce-authorization), every step would
  succeed for both callers — the expect_failure assertions would
  fail. This scenario only makes sense with enforcement engaged.

requires: [L3-spec-mutations-gated-alice]
as: bob

steps:
  # qos.create family — allowed caller (bob: ops, which has qos.create)
  - name: bob-create-qos-allowed
    action: newtron
    method: POST
    url: /create-qos-policy
    params: {name: qos-bob-l3}
