name: L2c-disabled-routes
description: |
  auth-design.md §L2c: when L2b (PAM) is not configured on the server,
  the session-key store is not constructed and the /auth/login and
  /auth/logout routes return 404. This is the disabled-path safety
  contract — operators flipping the server between header-mode and
  PAM-mode get an honest 404 from the route rather than a 500 or a
  successful no-op.

  Why we don't exercise the full L2c round-trip here:

    - newt-server in this suite runs in header mode (no
      --auth-pam-service flag). L2c auto-engages only with L2b. Even
      if newt-server gained a --auth-pam-service flag, exercising the
      round-trip needs real OS accounts the PAM stack can authenticate
      — out of scope for an integration suite that has to run in CI.
    - newtrun has no response-capture mechanism today, so a "POST
      /auth/login → use returned key on next step" round-trip cannot
      be expressed as a static suite. Operators run the round-trip
      manually with curl per the README "Manual verifications" section.

  What this scenario does verify is that the route gate is correct.
  Without it, a deployment that disabled L2b but left old client code
  pointing at /auth/login could silently mint nothing and the client
  would get confusing 200s with empty bodies.

requires: [L0-secret-store-resolves]
as: alice

steps:
  # /auth/login returns 404 because L2b (PAM) is not configured on
  # this server. The session-key store is nil; the handler returns
  # 404 (not 500, not silent success). The scenario's `as: alice`
  # injects alice's Bearer on this call; that's harmless — the 404
  # is route-driven, the handler short-circuits before reading
  # identity.
  - name: auth-login-route-404-when-l2c-disabled
    action: newtron
    method: POST
    url: /auth/login
    expect_failure: true

  # /auth/logout returns 404 for the same reason. Even with a Bearer
  # attached (alice's via scenario.As), the handler short-circuits
  # on the nil store.
  - name: auth-logout-route-404-when-l2c-disabled
    action: newtron
    method: POST
    url: /auth/logout
    expect_failure: true

  # Sanity: a regular mutation under L2c-disabled still works.
  # sessionkey.Middleware passes through (nil store) and the
  # request's verified Bearer reaches caller_middleware via the
  # session-key context as usual. Proves the L2c plumbing — store
  # init, route mount, middleware wire-up — didn't break the
  # default request path when disabled.
  - name: zone-create-succeeds-under-l2c-disabled
    action: newtron
    method: POST
    url: /create-zone
    params: {name: zone-l2c-disabled-probe}

  - name: cleanup-zone-l2c-disabled-probe
    action: newtron
    method: POST
    url: /delete-zone
    params: {name: zone-l2c-disabled-probe}
