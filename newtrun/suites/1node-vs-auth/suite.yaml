name: 1node-vs-auth
description: |
  End-to-end exercise of the auth arc (L0+L1+L3+L4+L5+L6) against a
  newt-server running with the full auth flag set. Requires its own
  topology dir (newtrun/topologies/1node-vs-auth/) with the grant
  table the scenarios expect. See README.md in this suite for the
  operator setup commands.
topology: 1node-vs-auth
platform: sonic-vs
