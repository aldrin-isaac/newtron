name: L5-dimensions-arch-anna
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Arch-anna's portion of this
  split-per-identity scenario covers the field dimension (meta-authorization
  §3 criterion 9): arch-anna in architects is scoped to
  !permissions,!user_groups,!super_users. Creating a service
  (field=services) matches the !-exclusion — allowed.

requires: [L4-node-mutations-gated-bob, L4-node-mutations-gated-mallory]
as: arch-anna

steps:
  # FIELD dimension — meta-authorization.
  # arch-anna in architects: scoped to !permissions,!user_groups,!super_users.
  # Creating a service (field=services) → matches the !-exclusion.
  - name: architect-creates-service-allowed
    action: newtron
    method: POST
    url: /create-service
    params: {name: svc-architect, type: routed}

  - name: architect-cleans-up-service
    action: newtron
    method: POST
    url: /delete-service
    params: {name: svc-architect}

---
name: L5-dimensions-iam-ian
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Iam-ian's portion of this
  split-per-identity scenario covers the field dimension (meta-authorization
  §3 criterion 9): iam-ian in iam-team is scoped to
  permissions,user_groups,super_users. Creating a service (field=services)
  is NOT in the include list — denied.

requires: [L5-dimensions-arch-anna]
as: iam-ian

steps:
  # iam-ian in iam-team: scoped to permissions,user_groups,super_users
  # (exact OR list). Creating a service (field=services) → NOT in the
  # include list → denied.
  - name: iam-creates-service-denied
    action: newtron
    method: POST
    url: /create-service
    params: {name: svc-iam, type: routed}
    expect_failure: true

---
name: L5-dimensions-bob
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Bob's portion of this
  split-per-identity scenario: bob (ops, has acl.create) creates the
  ACL fixture used by intf-isaac's bind tests, then cleans it up after.

requires: [L5-dimensions-iam-ian]
as: bob

steps:
  # INTERFACE dimension — intf-ops grant on acl.modify scoped to
  # interface=Ethernet0. First need an ACL to bind.
  - name: bob-create-acl-for-bind
    action: newtron
    method: POST
    url: /nodes/switch1/create-acl?mode=topology
    params: {name: acl-l5, type: L3, stage: ingress}

---
name: L5-dimensions-intf-isaac
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Intf-isaac's portion of this
  split-per-identity scenario covers the interface dimension: intf-isaac's
  grant on acl.modify is scoped to interface=Ethernet0. Binding on Eth0
  is allowed; binding on Eth4 is denied. Unbind on Eth0 is also
  within scope and handled in this scenario.

requires: [L5-dimensions-bob]
as: intf-isaac

steps:
  # intf-isaac scoped to Ethernet0 — bind on Ethernet0 allowed.
  - name: intf-isaac-binds-on-eth0-allowed
    action: newtron
    method: POST
    url: /nodes/switch1/interfaces/Ethernet0/bind-acl?mode=topology&no_save=true
    params: {acl: acl-l5, direction: ingress}

  - name: intf-isaac-unbinds-on-eth0
    action: newtron
    method: POST
    url: /nodes/switch1/interfaces/Ethernet0/unbind-acl?mode=topology&no_save=true
    params: {acl: acl-l5}

  # intf-isaac trying Ethernet4 → his grant's interface=Ethernet0 doesn't
  # match. Denied.
  - name: intf-isaac-binds-on-eth4-denied
    action: newtron
    method: POST
    url: /nodes/switch1/interfaces/Ethernet4/bind-acl?mode=topology&no_save=true
    params: {acl: acl-l5, direction: ingress}
    expect_failure: true

---
name: L5-dimensions-bob-cleanup
description: |
  Bob cleans up the ACL fixture intf-isaac unbound. Bob (ops) is
  the only identity in this suite with `acl.delete`; dev-dora
  (device-team) and mallory (no group) don't qualify. Runs between
  intf-isaac and dev-dora so the dev-dora scenario starts with a
  clean ACL_TABLE state.

requires: [L5-dimensions-intf-isaac]
as: bob

steps:
  - name: bob-cleans-up-acl
    action: newtron
    method: POST
    url: /nodes/switch1/delete-acl?mode=topology
    params: {name: acl-l5}

---
name: L5-dimensions-dev-dora
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Dev-dora's portion of this
  split-per-identity scenario covers the device dimension: dev-dora
  in device-team is scoped to device=switch1 and can hit switch1
  endpoints.

requires: [L5-dimensions-bob-cleanup]
as: dev-dora

steps:
  # DEVICE dimension — dev-dora in device-team scoped to device=switch1
  # can hit switch1 endpoints; the scope-clause matches. setup-device
  # is the device.write representative that works in topology mode.
  - name: dev-dora-setup-allowed
    action: newtron
    method: POST
    url: /nodes/switch1/setup-device?mode=topology
    params: {bgp_asn: "65001", hostname: switch1, source_ip: "10.0.0.1"}

---
name: L5-dimensions-mallory
description: |
  Coverage expansion: the original 40-L5-resource-scoping scenario
  only exercises the resource dimension. Mallory's portion of this
  split-per-identity scenario: mallory is not in any group at all, so
  no grant entry matches — denied regardless of device dimension.

requires: [L5-dimensions-dev-dora]
as: mallory

steps:
  # mallory still denied regardless of device dimension (she's not in
  # any group at all, so no grant entry matches).
  - name: mallory-setup-denied
    action: newtron
    method: POST
    url: /nodes/switch1/setup-device?mode=topology
    params: {bgp_asn: "65001", hostname: switch1, source_ip: "10.0.0.1"}
    expect_failure: true
